  else if (currentTab === 'ucty') html += renderFinUcty();
  else html += renderFinMoje();

  html += '</div>';
  return html;
}

function setFinTab(t) {
  currentTab = t;
  vibrate(8);
  renderScreen();
}

// ----- MEZI NAMI -----
function renderFinMezi() {
  const led = computeLedger();
  const partnerName = getPartnerName();
  const myName = getMyName();

  let html = '';

  // Hero
  html += '<div class="section-content">';
  let amount, sub;
  if (Math.abs(led.myCredit) < 1) {
    amount = '0';
    sub = '<em>vyrovnáno</em> · žádné dluhy';
  } else if (led.myCredit < 0) {
    amount = fmtNumOnly(Math.abs(led.myCredit));
    sub = 'dlužíš <em>' + escapeHtml(partnerName || 'partnerovi') + '</em>';
  } else {
    amount = fmtNumOnly(led.myCredit);
    sub = '<em>' + escapeHtml(partnerName || 'partner') + '</em> dluží tobě';
  }
  html += '<div class="big-number">' + amount + '<span class="currency">Kč</span></div>';
  html += '<div class="big-sub">' + sub + '</div>';

  if (Math.abs(led.myCredit) > 1) {
    const direction = led.myCredit < 0 ? 'Já posílám' : (partnerName + ' posílá');
    html += '<button class="btn" style="margin-top: 16px;" onclick="showSettleSheet()">Vyrovnat — ' + fmtMoney(Math.abs(led.myCredit)) + '</button>';
  }
  html += '</div>';

  // KARTA: Příští platba nájmu
  const nextRent = computeNextRentInfo();
  if (nextRent) {
    const dateStr = formatMonthYearCZ(nextRent.date);
    let daysTxt;
    if (nextRent.daysUntil === 0) daysTxt = 'dnes';
    else if (nextRent.daysUntil === 1) daysTxt = 'zítra';
    else if (nextRent.daysUntil < 0) daysTxt = 'po termínu';
    else if (nextRent.daysUntil < 30) daysTxt = 'za ' + nextRent.daysUntil + (nextRent.daysUntil < 5 ? ' dny' : ' dní');
    else {
      const months = Math.round(nextRent.daysUntil / 30);
      daysTxt = 'za ' + nextRent.daysUntil + ' dní';
    }

    // Borderový styl podle naléhavosti
    const isUrgent = nextRent.daysUntil <= 3 && nextRent.daysUntil >= 0;
    const borderColor = isUrgent ? 'var(--danger)' : 'var(--accent)';

    html += '<div style="margin: 16px; padding: 16px; background: var(--surface-2); border: 1px solid ' + borderColor + '; border-radius: 16px;">';
    html += '<div style="font-size: 11px; letter-spacing: 1.5px; color: var(--accent); font-weight: 600; margin-bottom: 8px;">📅 PŘÍŠTÍ PLATBA NÁJMU</div>';

    // Datum
    html += '<div style="font-family: var(--font-display, serif); font-size: 22px; color: var(--text); line-height: 1.2;">' + escapeHtml(dateStr) + '</div>';
    html += '<div style="font-size: 13px; color: var(--muted); margin-top: 2px;">' + escapeHtml(daysTxt) + '</div>';

    // Částka + směr
    html += '<div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(212, 168, 71, 0.2);">';
    html += '<div style="display: flex; align-items: baseline; justify-content: space-between; gap: 12px;">';
    html += '<div style="font-size: 13px; color: var(--muted);">' + escapeHtml(nextRent.payer) + ' → ' + escapeHtml(nextRent.receiver) + '</div>';
    html += '<div style="font-family: var(--font-display, serif); font-size: 24px; color: var(--accent); font-weight: 600;">' + fmtMoney(nextRent.amount) + '</div>';
    html += '</div>';

    // Pokud je částečně pokryto
    if (nextRent.partial) {
      html += '<div style="margin-top: 8px; font-size: 12px; color: var(--muted); font-style: italic; line-height: 1.4;">';
      html += 'Z plného nájmu ' + fmtMoney(nextRent.fullAmount) + ' bude ' + fmtMoney(nextRent.coveredFromCredit) + ' pokryto z kreditu, doplatek ' + fmtMoney(nextRent.amount) + '.';
      html += '</div>';
    }

    // Pokud nějaké nájmy byly přeskočené před tímhle (díky kreditu)
    if (nextRent.skippedCount > 0) {
      html += '<div style="margin-top: 8px; padding: 8px 10px; background: rgba(212, 168, 71, 0.08); border-radius: 8px; font-size: 12px; color: var(--accent); line-height: 1.4;">';
      const slovo = nextRent.skippedCount === 1 ? 'nájem' : (nextRent.skippedCount < 5 ? 'nájmy' : 'nájmů');
      html += '↻ Do té doby <strong>' + nextRent.skippedCount + ' ' + slovo + '</strong> pokryto z výdajů (' + fmtMoney(nextRent.skippedTotal) + ')';
      html += '</div>';
    }

    html += '</div>';  // konec sekce s částkou
    html += '</div>';  // konec karty
  }

  html += '<hr class="hairline">';

  // Transactions
  const txns = getList('txns').sort((a,b) => (b.at || 0) - (a.at || 0));

  if (txns.length === 0) {
    html += '<div class="section-label">B E Z &nbsp; T R A N S A K C Í</div>';
    html += '<div class="empty">Zatím žádné transakce mezi vámi.<br><br>Zmáčkni + a přidej.</div>';
  } else {
    html += '<div class="section-label">P O S L E D N Í</div>';
    html += '<div class="section-content">';
    txns.slice(0, 30).forEach(t => {
      const d = new Date(t.at);
      const dateStr = d.getDate() + '. ' + (d.getMonth() + 1) + '.';
      const kind = t.kind || 'payment';
      const isSkipped = !!t.skipped;
      const isPaidByPayment = (kind === 'rent' && !isSkipped && t.paidByPayment);
      const isCovering = (kind === 'expense' && t.coverFutureRent);
      const isPartiallyCovered = (kind === 'rent' && !isSkipped && !isPaidByPayment && t.coveredAmount && t.coveredAmount > 0);

      // Znaménko podle dopadu na MOJE saldo:
      //   rent:    'from' má zaplatit → 'from' v mínusu, 'to' v plusu
      //   payment: 'from' poslal peníze (vyrovnání) → 'from' SI POMOHL (plus), 'to' dostal a tím snížil svůj kredit (mínus)
      //   expense: 'from' zaplatil za 'to' → 'from' v plusu (má dostat zpátky), 'to' v mínusu
      let isMyPlus;
      if (kind === 'expense') {
        isMyPlus = (t.from === myName);
      } else if (kind === 'payment') {
        isMyPlus = (t.from === myName);  // posílám peníze = vyrovnávám si dluh = pro mě plus
      } else {
        // rent
        isMyPlus = (t.to === myName);    // mám dostat = plus
      }
      const sign = isMyPlus ? '+' : '−';

      // Vizuální stav: skipped > paidByPayment > klasický
      const dimmed = isSkipped || isPaidByPayment;
      const rowStyle = dimmed ? ' style="opacity: 0.5;"' : '';
      const titleStyle = dimmed ? ' style="text-decoration: line-through;"' : '';
      const amtColor = dimmed ? 'var(--muted)' : (isMyPlus ? 'var(--positive)' : 'var(--danger)');
      const amtStyle = dimmed ? 'color: ' + amtColor + '; text-decoration: line-through;' : 'color: ' + amtColor + ';';

      // Štítek vedle názvu
      let badge = '';
      if (isSkipped) {
        badge = ' <span style="font-size:11px; color:var(--accent); text-decoration:none; font-weight:600;">⊘ PŘESKOČENO</span>';
      } else if (isPaidByPayment) {
        badge = ' <span style="font-size:11px; color:var(--positive); text-decoration:none; font-weight:600;">✓ ZAPLACENO</span>';
      } else if (isPartiallyCovered) {
        badge = ' <span style="font-size:11px; color:var(--accent); font-weight:600;">◐ ČÁSTEČNĚ POKRYTO</span>';
      } else if (isCovering) {
        badge = ' <span style="font-size:11px; color:var(--accent); font-weight:600;">↻ POKRÝVÁ NÁJMY</span>';
      }

      html += '<div class="row" onclick="editTxn(\'' + t.id + '\')"' + rowStyle + '>';
      html += '<div class="row-time">' + dateStr + '</div>';
      html += '<div class="row-content">';
      html += '<div class="row-title"' + titleStyle + '>' + escapeHtml(t.title || 'Platba') + badge + '</div>';
      const fromTo = (t.from || '?') + ' → ' + (t.to || '?');
      let metaTxt = fromTo;
      if (kind === 'rent') metaTxt = 'Nájem · ' + metaTxt;
      else if (kind === 'expense') metaTxt = 'Výdaj · ' + metaTxt;
      else metaTxt = 'Platba · ' + metaTxt;
      html += '<div class="row-meta">' + escapeHtml(metaTxt) + '</div>';

      // Detail řádku — důvod přeskočení, info o pokrytí
      if (isSkipped && t.skipReason) {
        html += '<div class="row-meta" style="color: var(--accent); font-style: italic; margin-top: 2px;">' + escapeHtml(t.skipReason) + '</div>';
      } else if (isPartiallyCovered) {
        const remaining = (t.amount || 0) - t.coveredAmount;
        html += '<div class="row-meta" style="color: var(--accent); margin-top: 2px;">Pokryto ' + fmtMoney(t.coveredAmount) + ' · doplatek ' + fmtMoney(remaining) + '</div>';
      } else if (isCovering && t.remainingCredit && t.remainingCredit > 0) {
        html += '<div class="row-meta" style="color: var(--accent); margin-top: 2px;">Zbývá kredit ' + fmtMoney(t.remainingCredit) + '</div>';
      }

      html += '</div>';
      html += '<div class="row-amount" style="' + amtStyle + '">' + sign + fmtMoney(t.amount) + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  return html;
}

// Add/edit transaction
function showAddFinanceSheet() {
  if (currentTab === 'mezi') showAddTxnSheet();
  else if (currentTab === 'ucty') showAddUcetSheet();
  else if (currentTab === 'moje') showAddMojeSheet();
}

function showAddTxnSheet() {
  const myName = getMyName();
  const partnerName = getPartnerName();
  if (!partnerName) { showToast('Nejprve potřebuješ partnera', true); return; }

  const formHtml = `
    <div class="field"><label>Co se stalo</label><input type="text" id="x-title" placeholder="Pračka / Nájem / Splátka..." autofocus></div>
    <div class="field"><label>Kdo platil</label>
      <div class="field-row" style="margin-bottom: 0;">
        <button class="btn secondary" id="x-from-me" onclick="selectFrom('${escapeHtml(myName)}')">${escapeHtml(myName)}</button>
        <button class="btn secondary" id="x-from-partner" onclick="selectFrom('${escapeHtml(partnerName)}')">${escapeHtml(partnerName)}</button>
      </div>
    </div>
    <div class="field"><label>Komu / pro koho</label>
      <div class="field-row" style="margin-bottom: 0;">
        <button class="btn secondary" id="x-to-me" onclick="selectTo('${escapeHtml(myName)}')">${escapeHtml(myName)}</button>
        <button class="btn secondary" id="x-to-partner" onclick="selectTo('${escapeHtml(partnerName)}')">${escapeHtml(partnerName)}</button>
      </div>
    </div>
    <div class="field"><label>Částka (Kč)</label><input type="number" inputmode="decimal" id="x-amount" placeholder="4500" min="1"></div>
    <div class="field">
      <label>Typ</label>
      <div class="field-row" style="margin-bottom: 0;">
        <button class="btn secondary" id="x-kind-payment" onclick="selectKind('payment')">Platba</button>
        <button class="btn secondary" id="x-kind-rent" onclick="selectKind('rent')">Nájem</button>
        <button class="btn secondary" id="x-kind-expense" onclick="selectKind('expense')">Výdaj za druhého</button>
      </div>
      <div id="x-kind-hint" style="margin-top: 8px; font-size: 12px; color: var(--muted); font-style: italic; line-height: 1.4;"></div>
    </div>
    <div id="x-cover-wrap" class="field" style="display: none;">
      <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 12px; background: var(--surface-2); border-radius: 12px; border: 1px solid transparent;" id="x-cover-label">
        <input type="checkbox" id="x-cover-future-rent" style="width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer;">
        <div style="flex: 1;">
          <div style="font-size: 14px; font-weight: 600; color: var(--text);">Strhávat z budoucích nájmů</div>
          <div style="font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.3;">Tento výdaj automaticky pokryje další nájmy (i částečně).</div>
        </div>
      </label>
    </div>
    <button class="btn" style="margin-top: 16px;" onclick="addTxn()">Přidat</button>
  `;
  openSheet('<div class="sheet-title">Nová transakce</div><div class="sheet-subtitle">peníze mezi vámi</div>' + formHtml);
  // defaults
  window._txnFrom = myName;
  window._txnTo = partnerName;
  window._txnKind = 'payment';
  setTimeout(() => {
    selectFrom(myName);
    selectTo(partnerName);
    selectKind('payment');
  }, 50);
}

function selectFrom(name) {
  window._txnFrom = name;
  const myBtn = document.getElementById('x-from-me');
  const ptBtn = document.getElementById('x-from-partner');
  if (myBtn && ptBtn) {
    [myBtn, ptBtn].forEach(b => { b.classList.remove('btn'); b.classList.add('btn', 'secondary'); b.style.background = 'var(--surface-2)'; b.style.color = 'var(--text)'; });
    const target = name === getMyName() ? myBtn : ptBtn;
    target.style.background = 'var(--accent)';
    target.style.color = 'var(--bg)';
  }
}

function selectTo(name) {
  window._txnTo = name;
  const myBtn = document.getElementById('x-to-me');
  const ptBtn = document.getElementById('x-to-partner');
  if (myBtn && ptBtn) {
    [myBtn, ptBtn].forEach(b => { b.style.background = 'var(--surface-2)'; b.style.color = 'var(--text)'; });
    const target = name === getMyName() ? myBtn : ptBtn;
    target.style.background = 'var(--accent)';
    target.style.color = 'var(--bg)';
  }
}

function selectKind(kind) {
  window._txnKind = kind;
  ['payment', 'rent', 'expense'].forEach(k => {
    const b = document.getElementById('x-kind-' + k);
    if (b) {
      b.style.background = k === kind ? 'var(--accent)' : 'var(--surface-2)';
      b.style.color = k === kind ? 'var(--bg)' : 'var(--text)';
    }
  });
  // Vysvětlivka pod tlačítky
  const hint = document.getElementById('x-kind-hint');
  if (hint) {
    const hints = {
      payment: 'Někdo někomu poslal peníze (vyrovnání dluhu nebo dárek).',
      rent: 'Měsíční nájem — kdo platí za bydlení.',
      expense: 'Zaplatil jsi za druhého → on ti to dluží zpátky. (Např. nakoupil jsi věci do bytu z vlastního.)'
    };
    hint.textContent = hints[kind] || '';
  }
  // Checkbox "Strhávat z budoucích nájmů" jen pro expense
  const coverWrap = document.getElementById('x-cover-wrap');
  if (coverWrap) {
    coverWrap.style.display = (kind === 'expense') ? 'block' : 'none';
  }
}

async function addTxn() {
  const title = document.getElementById('x-title').value.trim();
  const amount = parseFloat(document.getElementById('x-amount').value);
  const from = window._txnFrom;
  const to = window._txnTo;
  const kind = window._txnKind || 'payment';
  if (!title || !amount || amount <= 0) { showToast('Vyplň všechno', true); return; }
  if (from === to) { showToast('Plátce a příjemce musí být různí', true); return; }

  // Volitelný flag pro výdaj: pokrýt budoucí nájmy
  const coverEl = document.getElementById('x-cover-future-rent');
  const coverFutureRent = (kind === 'expense' && coverEl && coverEl.checked) ? true : false;

  const data = {
    title, amount, from, to, kind,
    at: Date.now(),
    createdBy: currentUser.uid
  };
  if (coverFutureRent) data.coverFutureRent = true;

  await fb.ref('households/' + userData.householdId + '/txns').push(data);
  await logActivity('txn_added', { title, amount });
  closeSheet();
  showToast(coverFutureRent ? 'Přidáno · pokryje další nájmy' : 'Přidáno');

  // Po přidání výdaje s flagem rovnou aplikuj pokrytí
  if (coverFutureRent) {
    setTimeout(() => applyRentCoverage(), 600);
  }
  // Po přidání payment zkus napárovat na nezaplacený nájem
  if (kind === 'payment') {
    setTimeout(() => autoMarkRentsPaid(), 400);
  }
}

function editTxn(id) {
  const txns = householdData.txns || {};
  const t = txns[id];
  if (!t) return;
  const isRent = t.kind === 'rent';
  const isExpense = t.kind === 'expense';
  const isSkipped = !!t.skipped;
  const isPartiallyCovered = (isRent && !isSkipped && t.coveredAmount && t.coveredAmount > 0);
  const isCovering = (isExpense && t.coverFutureRent);

  let extraButtons = '';
  let statusBanner = '';

  if (isRent) {
    if (isSkipped) {
      // Plně pokrytý nebo manuálně přeskočený nájem
      let detailHtml = '';
      if (t.autoCovered && Array.isArray(t.coveredBy) && t.coveredBy.length > 0) {
        detailHtml = '<div style="margin-top: 8px; font-size: 12px; color: var(--muted);">Pokryto z výdajů:<br>';
        t.coveredBy.forEach(cb => {
          detailHtml += '• ' + escapeHtml(cb.title || 'Výdaj') + ' (' + fmtMoney(cb.used) + ')<br>';
        });
        detailHtml += '</div>';
      }
      statusBanner = `
        <div style="background: var(--surface-2); border: 1px solid var(--accent); border-radius: 12px; padding: 12px; margin-bottom: 16px;">
          <div style="font-size: 14px; color: var(--accent); font-weight: 600; margin-bottom: 4px;">⊘ Přeskočeno</div>
          <div style="font-size: 13px; color: var(--muted); line-height: 1.4;">${escapeHtml(t.skipReason || 'Tento nájem se nepočítá do salda.')}</div>
          ${detailHtml}
        </div>`;
      // Pokud bylo pokryto automaticky, neukazuj ruční Obnovit (musí se vypnout u výdaje)
      if (!t.autoCovered) {
        extraButtons = `<button class="btn secondary" style="margin-top: 8px;" onclick="unskipRent('${id}')">Obnovit (zrušit přeskočení)</button>`;
      } else {
        extraButtons = `<div style="margin-top: 8px; font-size: 12px; color: var(--muted); text-align: center; line-height: 1.4;">Auto-pokrytí. Pro zrušení uprav nebo smaž odpovídající výdaj.</div>`;
      }
    } else if (t.paidByPayment) {
      // Zaplaceno platbou (peníze fakticky poslány)
      statusBanner = `
        <div style="background: var(--surface-2); border: 1px solid var(--positive); border-radius: 12px; padding: 12px; margin-bottom: 16px;">
          <div style="font-size: 14px; color: var(--positive); font-weight: 600; margin-bottom: 4px;">✓ Zaplaceno</div>
          <div style="font-size: 13px; color: var(--muted); line-height: 1.4;">Pokryto platbou. Tento nájem se nepočítá do salda.</div>
        </div>`;
      extraButtons = `<button class="btn secondary" style="margin-top: 8px;" onclick="togglePaidByPayment('${id}', false)">Označit jako nezaplaceno</button>`;
    } else if (isPartiallyCovered) {
      const remaining = (t.amount || 0) - t.coveredAmount;
      let detailHtml = '';
      if (Array.isArray(t.coveredBy) && t.coveredBy.length > 0) {
        detailHtml = '<div style="margin-top: 8px; font-size: 12px; color: var(--muted);">Pokryto z výdajů:<br>';
        t.coveredBy.forEach(cb => {
          detailHtml += '• ' + escapeHtml(cb.title || 'Výdaj') + ' (' + fmtMoney(cb.used) + ')<br>';
        });
        detailHtml += '</div>';
      }
      statusBanner = `
        <div style="background: var(--surface-2); border: 1px solid var(--accent); border-radius: 12px; padding: 12px; margin-bottom: 16px;">
          <div style="font-size: 14px; color: var(--accent); font-weight: 600; margin-bottom: 4px;">◐ Částečně pokryto</div>
          <div style="font-size: 13px; color: var(--text); line-height: 1.4;">Pokryto <strong>${fmtMoney(t.coveredAmount)}</strong> · doplatek <strong>${fmtMoney(remaining)}</strong></div>
          ${detailHtml}
        </div>`;
      extraButtons = `
        <button class="btn secondary" style="margin-top: 8px;" onclick="togglePaidByPayment('${id}', true)">✓ Označit jako zaplaceno</button>
        <button class="btn secondary" style="margin-top: 8px;" onclick="showSkipRentSheet('${id}')">Přeskočit i tak (ručně)</button>`;
    } else {
      extraButtons = `
        <button class="btn secondary" style="margin-top: 8px;" onclick="togglePaidByPayment('${id}', true)">✓ Označit jako zaplaceno</button>
        <button class="btn secondary" style="margin-top: 8px;" onclick="showSkipRentSheet('${id}')">Přeskočit tento nájem</button>`;
    }
  }

  // U výdaje s coverFutureRent: ukázat info o pokrytí + checkbox na zrušení flagu
  let coverSection = '';
  if (isExpense) {
    if (isCovering) {
      let detailHtml = '';
      if (Array.isArray(t.coveredRents) && t.coveredRents.length > 0) {
        const allTxns = householdData.txns || {};
        detailHtml = '<div style="margin-top: 8px; font-size: 12px; color: var(--muted);">Pokrylo nájmy:<br>';
        t.coveredRents.forEach(cr => {
          const rent = allTxns[cr.rentId];
          const rentTitle = rent ? (rent.title || 'Nájem') : 'Nájem (smazaný)';
          detailHtml += '• ' + escapeHtml(rentTitle) + ' (' + fmtMoney(cr.used) + ')<br>';
        });
        detailHtml += '</div>';
      }
      const remainingTxt = (t.remainingCredit && t.remainingCredit > 0)
        ? `<div style="font-size: 13px; color: var(--text); margin-top: 4px;">Zbývá kredit: <strong>${fmtMoney(t.remainingCredit)}</strong></div>`
        : `<div style="font-size: 13px; color: var(--muted); margin-top: 4px;">Plně využito.</div>`;
      coverSection = `
        <div style="background: var(--surface-2); border: 1px solid var(--accent); border-radius: 12px; padding: 12px; margin-bottom: 16px;">
          <div style="font-size: 14px; color: var(--accent); font-weight: 600;">↻ Pokrývá nájmy</div>
          ${remainingTxt}
          ${detailHtml}
          <button class="btn secondary" style="margin-top: 12px; width: 100%;" onclick="toggleCoverFlag('${id}', false)">Zrušit pokrývání nájmů</button>
        </div>`;
    } else {
      coverSection = `
        <div style="margin-bottom: 16px;">
          <button class="btn secondary" style="width: 100%;" onclick="toggleCoverFlag('${id}', true)">↻ Zapnout pokrývání nájmů</button>
        </div>`;
    }
  }

  const formHtml = `
    ${statusBanner}
    ${coverSection}

// Automaticky označí nejstarší nezaplacený nájem jako paid, pokud pro něj existuje pokrývající platba
// Princip: spočítej součet všech 'payment' (od plátce nájmu k příjemci) a postupně jimi "pokrývej"
// nezaplacené nájmy chronologicky (FIFO).
async function autoMarkRentsPaid() {
  const config = householdData.config || {};
  if (!config.rentEnabled || !config.rentPayer || !config.rentReceiver) return;

  const allTxns = getList('txns');
  const rentPayer = config.rentPayer;
  const rentReceiver = config.rentReceiver;

  // Suma všech platebních (payment) transakcí ve směru plátce → příjemce
  let paymentPool = 0;
  allTxns.forEach(t => {
    if (t.kind === 'payment' && t.from === rentPayer && t.to === rentReceiver) {
      paymentPool += (t.amount || 0);
    }
  });

  // Nájmy chronologicky (od nejstarších) — pokrývej platebním poolem
  const rents = allTxns
    .filter(t => t.kind === 'rent' && t.from === rentPayer && t.to === rentReceiver && !t.skipped)
    .sort((a, b) => (a.at || 0) - (b.at || 0));

  const updates = {};
  for (const r of rents) {
    const need = (r.amount || 0) - (r.coveredAmount || 0);  // doplatek po případném pokrytí výdaji
    if (need <= 0) continue;
    if (paymentPool >= need) {
      // Pokryto platbami
      paymentPool -= need;
      const path = 'households/' + userData.householdId + '/txns/' + r.id;
      if (!r.paidByPayment) {
        updates[path + '/paidByPayment'] = true;
      }
    } else {
      // Tady už platby nestačí — tenhle a další jsou nezaplacené
      const path = 'households/' + userData.householdId + '/txns/' + r.id;
      if (r.paidByPayment) {
        updates[path + '/paidByPayment'] = null;  // zrušit pokud už není pokryt
      }
    }
  }

  if (Object.keys(updates).length > 0) {
    await fb.ref().update(updates);
  }
}

// Compute ledger
// myCredit > 0 → partner mi dluží (jsem v plusu)
// myCredit < 0 → já dlužím partnerovi
//
// Logika podle typu transakce:
//   payment (Platba)            — 'from' poslal peníze 'to' (např. vyrovnání). 'to' je příjemce → 'to' kredit klesá.
//   rent (Nájem)                — 'from' má zaplatit 'to' (závazek). Stejné chování jako payment: 'from' kredit -, 'to' kredit +.
//                                  Nájem se generuje jako DLUŽNÉ — 'from' (plátce) má kredit -, 'to' (příjemce) má kredit +.
//   expense (Výdaj za druhého)  — 'from' utratil za 'to' → 'to' teď dluží 'from'. OPAČNÝ směr!
function computeLedger() {
  const txns = getList('txns');
  const myName = getMyName();
  let myCredit = 0;

  txns.forEach(t => {
    const amt = t.amount || 0;
    const kind = t.kind || 'payment';

    // Přeskočené nájmy (např. pokryté výdajem za druhého) se nepočítají
    if (t.skipped) return;

    if (kind === 'expense') {
      // VÝDAJ ZA DRUHÉHO: from zaplatil za to → to teď dluží from
      // Speciální případ: pokud má coverFutureRent, nezapočítává se přímo —
      // místo toho pokrývá nájmy přes applyRentCoverage(). Do salda jde jen nevyčerpaný kredit.
      if (t.coverFutureRent) {
        const credit = (typeof t.remainingCredit === 'number') ? t.remainingCredit : amt;
        if (credit > 0) {
          if (t.from === myName) myCredit += credit;
          else if (t.to === myName) myCredit -= credit;
        }
        return;
      }
      // Klasický výdaj
      if (t.from === myName) myCredit += amt;       // já jsem zaplatil za partnera → on mi dluží
      else if (t.to === myName) myCredit -= amt;    // partner zaplatil za mě → já mu dlužím

    } else if (kind === 'payment') {
      // PLATBA (vyrovnání): from skutečně poslal peníze to → snižuje dluh from u to
      // (Tj. opačný efekt na saldo než rent — payment NEVYTVÁŘÍ dluh, ale ho VYROVNÁVÁ.)
      if (t.from === myName) myCredit += amt;       // já jsem zaplatil → snížil jsem si dluh / získal kredit
      else if (t.to === myName) myCredit -= amt;    // partner mi zaplatil → snížil svůj dluh / získal kredit

    } else if (kind === 'rent') {
      // NÁJEM: 'from' má zaplatit 'to' (vzniká závazek). Pokud je částečně pokrytý, počítá se jen doplatek.
      // Pokud je už zaplacený platbou (paidByPayment), nezapočítává se vůbec — tu platbu sám započítáme jako payment.
      if (t.paidByPayment) return;

      let effectiveAmt = amt;
      if (t.coveredAmount && t.coveredAmount > 0) {
        effectiveAmt = Math.max(0, amt - t.coveredAmount);
      }
      if (effectiveAmt > 0) {
        if (t.from === myName) myCredit -= effectiveAmt;  // já mám zaplatit → vznikl dluh
        else if (t.to === myName) myCredit += effectiveAmt;  // partner mi má zaplatit
      }
    }
  });

  return { myCredit, txns };
}

// =============================================================
// PŘÍŠTÍ PLATBA NÁJMU
// =============================================================
// Spočítá info o nejbližší platbě nájmu, kterou je třeba reálně zaplatit
// (bere v úvahu pokrytí z výdajů + budoucí auto-vygenerované nájmy).
//
// Vrací: { date, daysUntil, amount, fullAmount, partial, payer, receiver,
//          skippedCount, skippedTotal, generated } nebo null pokud není co počítat.
function computeNextRentInfo() {
  const config = householdData.config || {};
  if (!config.rentEnabled || !config.rentAmount || !config.rentPayer || !config.rentReceiver) {
    return null;
  }

  const rentPayer = config.rentPayer;
  const rentReceiver = config.rentReceiver;
  const rentAmount = config.rentAmount;
  const dayOfMonth = config.rentDayOfMonth || 1;

  // 1) Kolik kreditu zbývá z výdajů s coverFutureRent (od plátce směrem k příjemci)
  const allTxns = getList('txns');
  let availableCredit = 0;
  allTxns.forEach(t => {
    if (t.kind === 'expense' && t.coverFutureRent && t.from === rentPayer && t.to === rentReceiver) {
      // Použij remainingCredit pokud je nastaven (po applyRentCoverage), jinak celou částku
      if (typeof t.remainingCredit === 'number') {
        availableCredit += Math.max(0, t.remainingCredit);
      } else {
        // Backup: pokud applyRentCoverage ještě neběžel, použij plnou částku
        availableCredit += (t.amount || 0);
      }
    }
  });

  // 2) Najdi všechny budoucí (nezaplacené) auto-rent transakce, které jsou plánované
  //    Zaměříme se na ty, kterým ještě nepřišel termín, nebo přišel ale ještě neexistuje záznam
  //    Jednodušší: spočítej termín od dnešního dne, projdi měsíce dopředu, simuluj pokrytí
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  // Existující rent transakce (i ty co už existují) — chronologicky
  const existingRents = allTxns
    .filter(t => t.kind === 'rent')
    .sort((a, b) => (a.at || 0) - (b.at || 0));

  // Najdi nejbližší PŘÍŠTÍ termín nájmu (ten, který je v budoucnu nebo dnes)
  // Zahrnuje: existující budoucí rent (datum >= dnes) + virtuální budoucí termíny
  // Postup: zjisti nejvyšší existující rent month, a pak iteruj dál.

  // Sestav seznam plánovaných termínů (existujících i virtuálních) na 24 měsíců dopředu
  const horizonMonths = 24;
  const planned = [];

  // Začni od aktuálního měsíce
  let y = now.getFullYear();
  let m = now.getMonth();
  for (let i = 0; i < horizonMonths; i++) {
    const monthKey = y + '-' + String(m + 1).padStart(2, '0');
    const dueDate = new Date(y, m, dayOfMonth);
    const existing = existingRents.find(t => t.monthKey === monthKey);
    planned.push({
      date: dueDate,
      monthKey,
      existing,
      amount: existing ? (existing.amount || rentAmount) : rentAmount
    });
    m++;
    if (m > 11) { m = 0; y++; }
  }

  // 3) Simuluj postupné pokrývání — projdi měsíce, použij kredit, najdi první NEZAPLACENÝ
  //    "Nezaplacený" = (a) už existuje a není skipped, (b) virtuální (ještě nevytvořený)
  //    Pro každý plánovaný měsíc spočítej kolik kreditu by spolykal, a kolik zbude k zaplacení
  let creditLeft = availableCredit;
  let skippedCount = 0;
  let skippedTotal = 0;
  let nextPayment = null;  // první měsíc kde reálně něco doplácíme

  for (const p of planned) {
    // Pokud existuje a je už ručně přeskočený (ne auto), ber to v úvahu — neplatí se
    if (p.existing && p.existing.skipped && !p.existing.autoCovered) {
      // Manuálně přeskočený — taky neplatí
      continue;
    }
    // Pokud je už zaplacený platbou (autoMarkRentsPaid), neukazuj
    if (p.existing && p.existing.paidByPayment) {
      continue;
    }

    const amt = p.amount;
    const used = Math.min(creditLeft, amt);
    creditLeft -= used;
    const remaining = amt - used;

    if (remaining <= 0) {
      // Plně pokryto kreditem — přeskočí se (auto)
      skippedCount++;
      skippedTotal += amt;
      continue;
    }

    // Tady je první měsíc, kde se reálně doplácí (částečně nebo plně)
    const daysUntil = Math.ceil((p.date - today) / (1000 * 60 * 60 * 24));
    nextPayment = {
      date: p.date,
      daysUntil,
      amount: remaining,        // kolik se reálně zaplatí
      fullAmount: amt,          // plná částka nájmu
      partial: used > 0,        // bude částečně pokryto
      coveredFromCredit: used,  // kolik z toho je z kreditu
      payer: rentPayer,
      receiver: rentReceiver,
      generated: !!p.existing,
      skippedCount,             // kolik nájmů před tímhle bylo přeskočeno
      skippedTotal,
      monthKey: p.monthKey
    };
    break;
  }

  return nextPayment;
}

// Hezky naformátuj měsíc + rok v češtině (pro zobrazení nájmu)
function formatMonthYearCZ(d) {
  const months = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
  return d.getDate() + '. ' + months[d.getMonth()] + ' ' + d.getFullYear();
}


// ----- ÚČTY (Splitwise-like) -----
function renderFinUcty() {
  const ucty = getList('ucets');
  const open = ucty.filter(u => !u.closed);
  const closed = ucty.filter(u => u.closed);

  let html = '';

  if (open.length === 0 && closed.length === 0) {
    html += '<div class="empty">Žádné účty zatím.<br><br>Účet = společné výdaje na dovolené, oslavě, rekonstrukci...<br><br>Zmáčkni + a vytvoř první.</div>';
    return html;
  }

  if (open.length > 0) {
    html += '<div class="section-label">O T E V Ř E N É</div>';
    open.forEach(u => html += renderUcetCard(u));
  }

  if (closed.length > 0) {
    html += '<div class="section-label">U Z A V Ř E N É</div>';
    closed.forEach(u => html += renderUcetCard(u, true));
  }

  return html;
}

function renderUcetCard(u, dimmed) {
  const total = computeUcetTotal(u);
  const myDebt = computeUcetDebtFor(u, currentUser.uid);
  const peopleCount = (u.people || []).length;
  const peopleStr = peopleCount + ' ' + (peopleCount === 1 ? 'osoba' : peopleCount < 5 ? 'lidi' : 'lidí');

  let html = '<div class="ucet" onclick="goDetail(\'ucet\', \'' + u.id + '\')"';
  if (dimmed) html += ' style="opacity: 0.65;"';
  html += '>';
  html += '<div class="ucet-head">';
  html += '<div class="ucet-name">' + escapeHtml(u.name) + '</div>';
  html += '<span class="chip' + (dimmed ? ' muted' : '') + '">' + (dimmed ? 'uzavřen' : 'otevřen') + '</span>';
  html += '</div>';

  if (u.dateFrom || u.dateTo) {
    let metaParts = [];
    if (u.dateFrom) metaParts.push(formatDateCZ(new Date(u.dateFrom)));
    if (u.dateTo && u.dateTo !== u.dateFrom) metaParts.push(formatDateCZ(new Date(u.dateTo)));
    html += '<div class="ucet-meta">' + metaParts.join(' – ') + ' · ' + peopleStr + '</div>';
  } else {
    html += '<div class="ucet-meta">' + peopleStr + '</div>';
  }

  html += '<div class="ucet-stats">';
  html += '<div><div class="ucet-stat-label">Utraceno</div><div class="ucet-stat-value">' + fmtMoney(total) + '</div></div>';
  if (Math.abs(myDebt) > 1) {
    html += '<div><div class="ucet-stat-label">' + (myDebt > 0 ? 'Tobě dluží' : 'Dlužíš') + '</div><div class="ucet-stat-value accent">' + fmtMoney(Math.abs(myDebt)) + '</div></div>';
  } else {
    html += '<div><div class="ucet-stat-label">Tvůj stav</div><div class="ucet-stat-value">vyrovnáno</div></div>';
  }
  html += '</div>';
  html += '</div>';
  return html;
}

function computeUcetTotal(u) {
  const exps = (u && u.expenses) ? Object.values(u.expenses) : [];
  return exps.reduce((s, e) => s + (e.amount || 0), 0);
}

// Compute how much OTHERS owe to ME (positive) or I owe to others (negative)
function computeUcetDebtFor(u, myUid) {
  const exps = (u && u.expenses) ? Object.values(u.expenses) : [];
  const people = u.people || [];
  let net = 0;

  exps.forEach(e => {
    const amt = e.amount || 0;
    const splitFor = e.splitFor || people.map(p => p.uid);
    const perPerson = amt / splitFor.length;
    if (e.paidBy === myUid) net += amt; // I paid the whole thing
    if (splitFor.includes(myUid)) net -= perPerson; // I owe my share
  });

  return net;
}

async function addUcet() {
  const name = document.getElementById('u-name').value.trim();

  const dateTo = document.getElementById('u-to').value;
  const extra = document.getElementById('u-extra').value.trim();
  if (!name) { showToast('Zadej název', true); return; }

  // Build people list
  const myUid = currentUser.uid;
  const myName = getMyName();
  const partnerUid = getPartnerUid();
  const partnerName = getPartnerName();

  const people = [
    { uid: myUid, name: myName, type: 'household' }
  ];
  if (partnerUid) people.push({ uid: partnerUid, name: partnerName, type: 'household' });

  if (extra) {
    extra.split(',').map(s => s.trim()).filter(s => s).forEach(n => {
      people.push({ uid: 'guest_' + Math.random().toString(36).substring(2, 9), name: n, type: 'guest' });
    });
  }

  const data = {
    name,
    closed: false,
    createdAt: Date.now(),
    createdBy: currentUser.uid,
    people,
    expenses: {}
  };
  if (dateFrom) data.dateFrom = dateFrom;
  if (dateTo) data.dateTo = dateTo;

  const ref = await fb.ref('households/' + userData.householdId + '/ucets').push(data);
  await logActivity('ucet_added', { name });
  closeSheet();
  showToast('Účet vytvořen');
  // Open it directly
  setTimeout(() => goDetail('ucet', ref.key), 200);

// Compute who pays whom (simplified — minimize transfers)
function computeUcetSettlements(u) {
  const people = u.people || [];
  if (people.length < 2) return [];
  const expenses = u.expenses ? Object.values(u.expenses) : [];

  // Net balance per person: positive = they paid more than spent (others owe them)
  const balance = {};
  people.forEach(p => balance[p.uid] = 0);

  expenses.forEach(e => {
    const splitFor = e.splitFor || people.map(p => p.uid);
    const perPerson = (e.amount || 0) / splitFor.length;
    if (balance[e.paidBy] !== undefined) balance[e.paidBy] += (e.amount || 0);
    splitFor.forEach(uid => { if (balance[uid] !== undefined) balance[uid] -= perPerson; });
  });

  // Build settlements: people with negative balance pay people with positive
  const debtors = [];
  const creditors = [];
  Object.keys(balance).forEach(uid => {
    if (balance[uid] < -0.5) debtors.push({ uid, amount: -balance[uid] });
    else if (balance[uid] > 0.5) creditors.push({ uid, amount: balance[uid] });
  });

  debtors.sort((a, b) => b.amount - a.amount);
  creditors.sort((a, b) => b.amount - a.amount);

  const settlements = [];
  let i = 0, j = 0;
  while (i < debtors.length && j < creditors.length) {
    const pay = Math.min(debtors[i].amount, creditors[j].amount);
    if (pay > 0.5) {
      const fromP = people.find(p => p.uid === debtors[i].uid);
      const toP = people.find(p => p.uid === creditors[j].uid);
      settlements.push({
        from: fromP ? fromP.name : '?',
        to: toP ? toP.name : '?',
        amount: pay
      });
    }
    debtors[i].amount -= pay;
    creditors[j].amount -= pay;
    if (debtors[i].amount < 0.5) i++;
    if (creditors[j].amount < 0.5) j++;
  }

  return settlements;
}

// =============================================================
// AUTO-POKRÝVÁNÍ NÁJMŮ Z VÝDAJŮ
// =============================================================
// Logika: Vezmi všechny expense transakce s coverFutureRent === true,
// ve směru kde 'from' = ten kdo platí nájem (rentPayer).
// Pak je páruj s budoucími rent transakcemi (od data výdaje dál) — chronologicky.
// Pokrývej přesně, i částečně. Ulož do nájmů info o pokrytí.
async function applyRentCoverage() {
  const config = householdData.config || {};
  if (!config.rentEnabled || !config.rentPayer) return;

  const allTxns = getList('txns');
  const rentPayer = config.rentPayer;

  // 1) Najdi VŠECHNY použitelné výdaje (expense, coverFutureRent, from = plátce nájmu, ne smazané)
  //    Seřaď podle data vzestupně (starší se použijí dřív)
  const credits = allTxns
    .filter(t => t.kind === 'expense' && t.coverFutureRent && t.from === rentPayer)
    .sort((a, b) => (a.at || 0) - (b.at || 0))
    .map(t => ({
      id: t.id,
      title: t.title,
      total: t.amount || 0,
      remaining: t.amount || 0,  // zatím nealokováno
      coveredRents: []           // bude se plnit
    }));

  if (credits.length === 0) {
    // Žádné výdaje s pokrytím — vyčisti případné předchozí pokrytí na nájmech
    await clearAllRentCoverage();
    return;
  }

  // 2) Najdi všechny rent transakce, seřaď chronologicky (od nejstarší)
  //    Pokrývat lze jen nájem, který je K DATU >= nejstaršího výdaje
  const earliestCreditAt = credits[0] ? (allTxns.find(t => t.id === credits[0].id)?.at || 0) : 0;
  const rents = allTxns
    .filter(t => t.kind === 'rent' && (t.at || 0) >= earliestCreditAt)
    .sort((a, b) => (a.at || 0) - (b.at || 0));

  // 3) Postupně přiřazuj kredit k nájmům
  const updates = {};  // batch firebase updates
  let creditIdx = 0;

  for (const rent of rents) {
    const rentAmount = rent.amount || 0;
    let needed = rentAmount;
    const coveredBy = [];  // pole {id, title, used} výdajů, které tento nájem pokryly

    while (needed > 0 && creditIdx < credits.length) {
      const credit = credits[creditIdx];
      if (credit.remaining <= 0) {
        creditIdx++;
        continue;
      }
      const use = Math.min(credit.remaining, needed);
      credit.remaining -= use;
      needed -= use;
      coveredBy.push({ id: credit.id, title: credit.title, used: use });
      credit.coveredRents.push({ rentId: rent.id, used: use });
      if (credit.remaining <= 0) creditIdx++;
    }

    const totalCovered = rentAmount - needed;  // kolik z tohoto nájmu je pokryto
    const fullyCovered = (totalCovered >= rentAmount && rentAmount > 0);

    // Připrav update pro tento nájem
    const rentPath = 'households/' + userData.householdId + '/txns/' + rent.id;
    updates[rentPath + '/coveredAmount'] = totalCovered > 0 ? totalCovered : null;
    updates[rentPath + '/coveredBy'] = coveredBy.length > 0 ? coveredBy : null;
    updates[rentPath + '/skipped'] = fullyCovered ? true : null;
    updates[rentPath + '/skipReason'] = fullyCovered ? 'Pokryto z výdajů' : null;
    updates[rentPath + '/autoCovered'] = (coveredBy.length > 0) ? true : null;
  }

  // 4) Pro každý kredit ulož info o tom, co pokryl
  for (const credit of credits) {
    const creditPath = 'households/' + userData.householdId + '/txns/' + credit.id;
    updates[creditPath + '/coveredRents'] = credit.coveredRents.length > 0 ? credit.coveredRents : null;
    updates[creditPath + '/remainingCredit'] = credit.remaining > 0 ? credit.remaining : null;
  }

  // 5) Aplikuj dávkově do Firebase
  if (Object.keys(updates).length > 0) {
    await fb.ref().update(updates);
  }
}

// Vyčistí pokrytí na všech nájmech (když uživatel zruší poslední výdaj s coverFutureRent)
async function clearAllRentCoverage() {
  const allTxns = getList('txns');
  const updates = {};
  allTxns.filter(t => t.kind === 'rent' && t.autoCovered).forEach(t => {
    const path = 'households/' + userData.householdId + '/txns/' + t.id;
    updates[path + '/coveredAmount'] = null;
    updates[path + '/coveredBy'] = null;
    updates[path + '/skipped'] = null;
    updates[path + '/skipReason'] = null;
    updates[path + '/autoCovered'] = null;
  });
  if (Object.keys(updates).length > 0) {
    await fb.ref().update(updates);
  }
}

async function ensureRentTxns() {
  const config = householdData.config || {};
  if (!config.rentEnabled) return;
  if (!config.rentPayer || !config.rentReceiver || !config.rentAmount) return;

  const txns = getList('txns');
  const now = new Date();
  const dayOfMonth = config.rentDayOfMonth || 1;
  const monthNames = ['leden','únor','březen','duben','květen','červen','červenec','srpen','září','říjen','listopad','prosinec'];

  // If rentStartMonth is set, generate from there. Otherwise just current month.
  let startYear, startMonthIdx;
  if (config.rentStartMonth) {
    const parts = config.rentStartMonth.split('-');
    startYear = parseInt(parts[0], 10);
    startMonthIdx = parseInt(parts[1], 10) - 1;
  } else {
    startYear = now.getFullYear();
    startMonthIdx = now.getMonth();
  }

  // Iterate from start month to current month
  let y = startYear;
  let m = startMonthIdx;
  let created = 0;
  while (y < now.getFullYear() || (y === now.getFullYear() && m <= now.getMonth())) {
    // Only create if the dayOfMonth has already passed (don't create future rent)
    const isCurrentMonth = (y === now.getFullYear() && m === now.getMonth());
    if (isCurrentMonth && now.getDate() < dayOfMonth) {
      // Day hasn't passed yet, skip
      break;
    }

    const monthKey = y + '-' + String(m + 1).padStart(2, '0');
    const exists = txns.some(t => t.kind === 'rent' && t.monthKey === monthKey);
    if (!exists) {
      const at = new Date(y, m, dayOfMonth).getTime();
      await fb.ref('households/' + userData.householdId + '/txns').push({
        title: 'Nájem · ' + monthNames[m] + (y !== now.getFullYear() ? ' ' + y : ''),
        amount: config.rentAmount,
        from: config.rentPayer,
        to: config.rentReceiver,
        kind: 'rent',
        monthKey,
        at,
        createdBy: currentUser.uid,
        auto: true
      });
      created++;
    }

    // Next month
    m++;
    if (m > 11) { m = 0; y++; }
  }

  if (created > 0) {
    await logActivity('rent_auto', { month: monthNames[now.getMonth()], count: created });
    if (created === 1) {
      showToast('Automatický nájem přidán');
    } else if (created > 1) {
      showToast('Doplněno ' + created + ' nájmů');
    }
  }

  // Po vytvoření nájmů (nebo i bez vytvoření) přepočítej pokrytí
  // — výdaje s coverFutureRent se nasměrují na budoucí nájmy.
  setTimeout(() => applyRentCoverage(), 300);
  // A taky napáruj případné platby na nezaplacené nájmy
  setTimeout(() => autoMarkRentsPaid(), 600);
}

function renderPetDetail() {
  if (!detailContext || detailContext.type !== 'pet') return renderMore();
  const pets = householdData.pets || {};
  const p = pets[detailContext.id];
  if (!p) return renderMore();
  p.id = detailContext.id;

  const careItems = getCareItemsForPet(p);
  const records = p.records ? Object.keys(p.records).map(k => ({ id: k, ...p.records[k] })) : [];
  records.sort((a, b) => (b.at || 0) - (a.at || 0));
  const contacts = getList('contacts');

  let html = '<div class="app">';
  html += '<div class="page-header with-back">';
  html += '<button class="btn-back" onclick="goBack()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>';
  html += '<div class="page-title">' + escapeHtml(p.name) + '</div>';
  html += '<button class="btn-icon" onclick="showEditPetSheet(\'' + p.id + '\')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>';
  html += '</div>';

  // Hero
  html += '<div class="pet-hero">';
  html += '<div class="avatar size-xl" style="margin: 0 auto;">' + escapeHtml(getInitial(p.name)) + '</div>';
  html += '<div class="pet-name">' + escapeHtml(p.name) + '</div>';
  let tagline = [];
  if (p.breed) tagline.push(p.breed);
  if (p.birthYear) {
    const age = new Date().getFullYear() - p.birthYear;
    tagline.push(age + (age === 1 ? ' rok' : age < 5 ? ' roky' : ' let'));
  }
  if (tagline.length) html += '<div class="pet-tagline">' + escapeHtml(tagline.join(' · ')) + '</div>';
  html += '</div>';

  html += '<hr class="hairline">';

  // PÉČE — types of care with countdowns
  html += '<div class="section-label">P É Č E</div>';
  if (careItems.length === 0) {
    html += '<div style="padding: 0 24px 16px;"><div class="row-empty">Zatím nic. Přidej tlačítkem +</div></div>';
    html += '<div style="padding: 0 24px 12px;"><div style="font-family: Fraunces, serif; font-style: italic; color: var(--text-3); font-size: 12px; line-height: 1.5;">Očkování, odčervení, salon, hlídání... appka spočítá další termín a upozorní tě dopředu.</div></div>';
  } else {
    html += '<div class="section-content">';
    careItems.forEach(c => {
      const daysLeft = c.nextAt ? Math.ceil((c.nextAt - Date.now()) / (24*60*60*1000)) : null;
      let statusText = '';
      let statusColor = 'var(--text-3)';
      if (daysLeft !== null) {
        if (daysLeft < 0) {
          statusText = 'zpoždění ' + Math.abs(daysLeft) + ' ' + (Math.abs(daysLeft) === 1 ? 'den' : Math.abs(daysLeft) < 5 ? 'dny' : 'dní');
          statusColor = 'var(--danger)';
        } else if (daysLeft === 0) {
          statusText = 'dnes!';
          statusColor = 'var(--accent)';
        } else if (daysLeft <= (c.notifyDaysBefore || 14)) {
          statusText = 'za ' + daysLeft + ' ' + (daysLeft === 1 ? 'den' : daysLeft < 5 ? 'dny' : 'dní');
          statusColor = 'var(--accent)';
        } else {
          const d = new Date(c.nextAt);
          statusText = formatDateCZ(d);
        }
      }

      // Find linked contact
      const contact = c.contactId ? contacts.find(ct => ct.id === c.contactId) : null;

      html += '<div class="row" style="cursor: default;" onclick="showEditCareSheet(\'' + p.id + '\', \'' + c.id + '\')">';
      html += '<div class="row-bullet" style="background: ' + statusColor + ';"></div>';
      html += '<div class="row-content">';
      html += '<div class="row-title">' + escapeHtml(c.title || '?') + '</div>';
      const freqStr = formatFrequency(c.frequencyValue, c.frequencyUnit);
      let metaParts = [freqStr];
      if (statusText) metaParts.push(statusText);
      if (contact) metaParts.push(contact.name);
      html += '<div class="row-meta" style="color: ' + statusColor + ';">' + escapeHtml(metaParts.join(' · ')) + '</div>';
      html += '</div>';
      // Action: Hotovo button (record done now, recompute next)
      html += '<button onclick="event.stopPropagation(); markCareDone(\'' + p.id + '\', \'' + c.id + '\')" style="background: rgba(212, 168, 71, 0.12); border: 1px solid var(--hairline); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;" title="Označit jako hotovo">';
      html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      html += '</button>';
      // Action: Contact icons
      if (contact && contact.phone) {
        const phoneClean = contact.phone.replace(/[^+\d]/g, '');
        html += '<a href="tel:' + escapeHtml(phoneClean) + '" onclick="event.stopPropagation()" style="background: rgba(212, 168, 71, 0.12); border: 1px solid var(--hairline); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 4px; text-decoration: none;" title="Zavolat">';
        html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';
        html += '</a>';
      }
      html += '</div>';
    });
    html += '</div>';
  }
  html += '<div style="padding: 12px 24px;"><button class="btn secondary" onclick="showAddCareSheet(\'' + p.id + '\')" style="width: auto; padding: 10px 16px; font-size: 12px;">+ Přidat péči</button></div>';

  html += '<hr class="hairline">';

  // ZÁZNAMY — ad-hoc historical records
  html += '<div class="section-label">Z Á Z N A M Y</div>';
  if (records.length === 0) {
    html += '<div style="padding: 0 24px 12px;"><div class="row-empty">Žádné záznamy</div></div>';
  } else {
    html += '<div class="section-content">';
    records.slice(0, 30).forEach(r => {
      const d = new Date(r.at);
      html += '<div class="row">';
      html += '<div class="row-time">' + d.getDate() + '. ' + (d.getMonth() + 1) + '.</div>';
      html += '<div class="row-content">';
      html += '<div class="row-title">' + escapeHtml(r.title) + '</div>';
      if (r.note) html += '<div class="row-meta">' + escapeHtml(r.note) + '</div>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  html += '<div style="padding: 12px 24px 32px;">';
  html += '<button class="btn secondary" onclick="showAddPetRecordSheet(\'' + p.id + '\')" style="width: auto; padding: 10px 16px; font-size: 12px;">+ Vlastní záznam</button>';
  html += '</div>';

  // Override FAB → adds care
  setTimeout(() => {
    const fab = document.getElementById('fab');
    if (fab) fab.onclick = () => showAddCareSheet(p.id);
  }, 100);

  html += '</div>';
  return html;
}

function showAddCareSheet(petId) {

  formHtml += '<select id="c-freq-unit">';
  formHtml += '<option value="day">den/dní</option>';
  formHtml += '<option value="week">týden/týdnů</option>';
  formHtml += '<option value="month">měsíc/měsíců</option>';
  formHtml += '<option value="year" selected>rok/let</option>';
  formHtml += '</select>';

  formHtml += '<div class="field"><label>Upozornit kolik dní dopředu</label><input type="number" inputmode="numeric" id="c-notify" value="14" min="1" max="60"></div>';

async function addCare(petId) {
  const title = document.getElementById('c-title').value.trim();
  const freqVal = parseInt(document.getElementById('c-freq-val').value, 10);
  const freqUnit = document.getElementById('c-freq-unit').value;
  const lastDate = document.getElementById('c-last').value;
  const notify = parseInt(document.getElementById('c-notify').value, 10) || 14;
  const contactSel = document.getElementById('c-contact');
  const contactId = contactSel ? contactSel.value : '';

  if (!title) { showToast('Zadej název', true); return; }
  if (!freqVal || freqVal < 1) { showToast('Zadej frekvenci', true); return; }
  if (!lastDate) { showToast('Zadej kdy bylo naposledy', true); return; }

  const lastAt = new Date(lastDate + 'T12:00:00').getTime();
  const data = {
    title,
    frequencyValue: freqVal,
    frequencyUnit: freqUnit,
    lastAt,
    notifyDaysBefore: notify,
    createdAt: Date.now(),
    createdBy: currentUser.uid
  };
  if (contactId) data.contactId = contactId;

  await fb.ref('households/' + userData.householdId + '/pets/' + petId + '/care').push(data);
  const pets = householdData.pets || {};
  await logActivity('care_added', { title, petName: (pets[petId] || {}).name || '' });
  closeSheet();
  showToast('Přidáno');
}

function showEditCareSheet(petId, careId) {
  const pets = householdData.pets || {};
  const p = pets[petId];
  if (!p || !p.care || !p.care[careId]) return;
  const c = p.care[careId];
  const contacts = getList('contacts');
  const lastDate = c.lastAt ? dateKey(new Date(c.lastAt)) : '';

  let formHtml = '<div class="field"><label>Co</label><input type="text" id="c-title" value="' + escapeHtml(c.title || '') + '"></div>';
  formHtml += '<div class="field"><label>Frekvence</label>';
  formHtml += '<div class="field-row" style="gap: 8px;">';
  formHtml += '<input type="number" inputmode="numeric" id="c-freq-val" value="' + (c.frequencyValue || 1) + '" min="1" style="flex: 0 0 80px;">';
  formHtml += '<select id="c-freq-unit">';
  ['day', 'week', 'month', 'year'].forEach(u => {
    const labels = { day: 'den/dní', week: 'týden/týdnů', month: 'měsíc/měsíců', year: 'rok/let' };
    const sel = c.frequencyUnit === u ? ' selected' : '';
    formHtml += '<option value="' + u + '"' + sel + '>' + labels[u] + '</option>';
  });
  formHtml += '</select></div></div>';
  formHtml += '<div class="field"><label>Naposledy</label><input type="date" id="c-last" value="' + lastDate + '"></div>';
  formHtml += '<div class="field"><label>Upozornit dní dopředu</label><input type="number" inputmode="numeric" id="c-notify" value="' + (c.notifyDaysBefore || 14) + '" min="1" max="60"></div>';

  if (contacts.length > 0) {
    formHtml += '<div class="field"><label>Kdo to dělá</label>';
    formHtml += '<select id="c-contact"><option value="">— žádný —</option>';
    contacts.forEach(ct => {
      const sel = c.contactId === ct.id ? ' selected' : '';
      formHtml += '<option value="' + escapeHtml(ct.id) + '"' + sel + '>' + escapeHtml(ct.name) + (ct.category ? ' (' + escapeHtml(ct.category) + ')' : '') + '</option>';
    });
    formHtml += '</select></div>';
  }

  formHtml += '<div class="field-row" style="margin-top: 16px;">';
  formHtml += '<button class="btn" onclick="updateCare(\'' + petId + '\', \'' + careId + '\')">Uložit</button>';
  formHtml += '<button class="btn danger" onclick="deleteCare(\'' + petId + '\', \'' + careId + '\')">Smazat</button>';
  formHtml += '</div>';

  openSheet('<div class="sheet-title">' + escapeHtml(c.title) + '</div>' + formHtml);
}

async function updateCare(petId, careId) {
  const title = document.getElementById('c-title').value.trim();
  const freqVal = parseInt(document.getElementById('c-freq-val').value, 10);
  const freqUnit = document.getElementById('c-freq-unit').value;
  const lastDate = document.getElementById('c-last').value;
  const notify = parseInt(document.getElementById('c-notify').value, 10) || 14;
  const contactSel = document.getElementById('c-contact');
  const contactId = contactSel ? contactSel.value : '';

  if (!title) { showToast('Zadej název', true); return; }
  const lastAt = new Date(lastDate + 'T12:00:00').getTime();

  await fb.ref('households/' + userData.householdId + '/pets/' + petId + '/care/' + careId).update({
    title,
    frequencyValue: freqVal,
    frequencyUnit: freqUnit,
    lastAt,
    notifyDaysBefore: notify,

  });

  showToast('Uloženo');

async function deleteCare(petId, careId) {
  await fb.ref('households/' + userData.householdId + '/pets/' + petId + '/care/' + careId).remove();
  closeSheet();
  showToast('Smazáno', true);
}

async function markCareDone(petId, careId) {
  const pets = householdData.pets || {};
  const p = pets[petId];
  if (!p || !p.care || !p.care[careId]) return;
  const c = p.care[careId];

  vibrate([10, 20, 10]);
  // Set lastAt to now, recompute will happen on read
  await fb.ref('households/' + userData.householdId + '/pets/' + petId + '/care/' + careId + '/lastAt').set(Date.now());

  // Add a record
  await fb.ref('households/' + userData.householdId + '/pets/' + petId + '/records').push({
    title: c.title + ' ✓',
    note: 'Provedeno',
    at: Date.now()
  });

  await logActivity('care_done', { title: c.title, petName: p.name });
  showToast('✓ ' + c.title + ' hotovo');
}

// ============================================================
// SWIPE HANDLERS
// ============================================================
function attachSwipeHandlers() {
  document.querySelectorAll('.swipeable').forEach(row => {
    if (row.dataset.swipeAttached) return;
    row.dataset.swipeAttached = '1';

    let startX = 0, startY = 0, currentX = 0;
    let dragging = false, vibrated = false, horizontal = null;

    function start(x, y) {
      startX = x;
      startY = y;
      currentX = 0;
      dragging = true;
      vibrated = false;
      horizontal = null;
      row.classList.add('dragging');
    }

    function move(x, y) {
      if (!dragging) return;
      const dx = x - startX;
      const dy = y - startY;
      if (horizontal === null && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
        horizontal = Math.abs(dx) > Math.abs(dy);
      }
      if (horizontal === false) return;
      currentX = Math.max(-180, Math.min(180, dx));
      row.style.transform = 'translateX(' + currentX + 'px)';
      if (Math.abs(currentX) > 80 && !vibrated) {
        vibrate(15);
        vibrated = true;
      }
      if (Math.abs(currentX) < 80 && vibrated) vibrated = false;
    }

    function end() {
      if (!dragging) return;
      dragging = false;
      row.classList.remove('dragging');
      row.classList.add('completing');

      const id = row.dataset.id;
      const name = row.dataset.name;

      if (currentX > 100) {
        row.style.transform = 'translateX(400px)';
        row.style.opacity = '0';
        vibrate([10, 20, 10]);
        setTimeout(() => {
          if (id) toggleTask(id);
        }, 200);
      } else if (currentX < -100) {
        row.style.transform = 'translateX(-400px)';
        row.style.opacity = '0';
        vibrate([10, 20, 10]);
        setTimeout(() => {
          if (id) {
            deleteTask(id);
            showToast((name || 'Úkol') + ' smazán', true);
          }
        }, 200);
      } else {
        row.style.transform = 'translateX(0)';
      }
      currentX = 0;
      setTimeout(() => row.classList.remove('completing'), 400);
    }

    row.addEventListener('touchstart', e => start(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    row.addEventListener('touchmove', e => move(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    row.addEventListener('touchend', end);
    row.addEventListener('touchcancel', end);

    // Mouse fallback
    let mouseDown = false;
    row.addEventListener('mousedown', e => {
      if (e.target.closest('.check-circle')) return;
      mouseDown = true;
      start(e.clientX, e.clientY);
    });
    document.addEventListener('mousemove', e => {
      if (mouseDown) move(e.clientX, e.clientY);
    });
    document.addEventListener('mouseup', () => {
      if (mouseDown) {
        mouseDown = false;
        end();
      }
    });
  });
}
