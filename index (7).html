<style>
/* ============================================================
   DOMOV — Martin Kováč style luxury app
   Espresso (dark) + Crème (light)
   ============================================================ */

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root, body, body.theme-espresso {
  --bg: #2A1810;
  --surface: #3D2817;
  --surface-2: #4A3220;
  --surface-3: #5C3F28;
  --text: #F5EFE0;
  --text-2: #C9B89A;
  --text-3: #8B7A5C;
  --accent: #D4A847;
  --accent-soft: #B8923A;
  --hairline: rgba(212, 168, 71, 0.18);
  --hairline-strong: rgba(212, 168, 71, 0.35);
  --positive: #7A8B5C;
  --warning: #D4A847;
  --danger: #C8553D;
  --nav-bg: rgba(42, 24, 16, 0.92);
}

body.theme-creme {
  --bg: #F5EFE0;
  --surface: #FFFFFF;
  --surface-2: #F0E8D4;
  --surface-3: #E8DEC4;
  --text: #2A1810;
  --text-2: #6B4F35;
  --text-3: #8B7A5C;
  --accent: #B8923A;
  --accent-soft: #9A7A2E;
  --hairline: rgba(184, 146, 58, 0.22);
  --hairline-strong: rgba(184, 146, 58, 0.4);
  --positive: #6B7A4D;
  --warning: #B8923A;
  --danger: #B5462E;
  --nav-bg: rgba(245, 239, 224, 0.85);
}

html, body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  transition: background 0.4s ease, color 0.4s ease;
}

body { padding-bottom: env(safe-area-inset-bottom, 0); }

h1, h2, h3, h4 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  letter-spacing: -0.5px;
  color: var(--text);
}

input, textarea, select, button { font-family: inherit; }

::-webkit-scrollbar { width: 0; display: none; }
* { scrollbar-width: none; }

.hidden { display: none !important; }

/* ============== APP ============== */
.app { padding-bottom: 100px; min-height: 100vh; }

/* ============== HEADER ============== */
.page-header {
  padding: env(safe-area-inset-top, 12px) 24px 12px;
  padding-top: max(env(safe-area-inset-top, 12px), 12px);
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 30;
  backdrop-filter: blur(10px);
}

.page-header.with-back { padding-bottom: 20px; }

.btn-back, .btn-icon {
  width: 40px;
  height: 40px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.15s, background 0.2s;
  flex-shrink: 0;
}

.btn-back:active, .btn-icon:active { transform: scale(0.94); }

.btn-back svg, .btn-icon svg {
  width: 18px;
  height: 18px;
  stroke: var(--text);
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.btn-icon svg { stroke: var(--text-2); }

.page-title {
  font-family: 'Fraunces', serif;
  font-size: 26px;
  font-weight: 400;
  letter-spacing: -0.5px;
  color: var(--text);
  flex: 1;
}

/* ============== HOME ============== */
.home-top { padding: 20px 24px 0; }

.home-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 4px;
}

.greeting-date {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--text-3);
  margin-bottom: 6px;
}

.greeting-text {
  font-family: 'Fraunces', serif;
  font-size: 32px;
  font-weight: 400;
  letter-spacing: -0.8px;
  line-height: 1.1;
  color: var(--text);
}

.greeting-text .name {
  color: var(--accent);
  font-style: italic;
}

.together {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--text-3);
  margin-top: 6px;
}

.together em {
  color: var(--text-2);
  font-style: italic;
}

/* Avatar with initial */
.avatar {
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--hairline-strong);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fraunces', serif;
  font-style: italic;
  color: var(--accent);
  flex-shrink: 0;
  cursor: pointer;
}

.avatar.size-sm { width: 28px; height: 28px; font-size: 13px; }
.avatar.size-md { width: 44px; height: 44px; font-size: 18px; }
.avatar.size-lg { width: 56px; height: 56px; font-size: 24px; }
.avatar.size-xl { width: 96px; height: 96px; font-size: 44px; }

/* ============== HAIRLINE ============== */
.hairline {
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--hairline-strong) 20%, var(--hairline) 50%, var(--hairline-strong) 80%, transparent 100%);
  margin: 28px 24px;
  border: none;
}

/* ============== SECTION ============== */
.section-label {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 4px;
  text-transform: uppercase;
  padding: 0 24px;
  margin-bottom: 14px;
  margin-top: 8px;
}

.section-content { padding: 0 24px; }

/* ============== ROWS (universal pattern) ============== */
.row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--hairline);
  cursor: pointer;
}

.row:last-child { border-bottom: none; }

.row-bullet {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

.row-time {
  font-family: 'Fraunces', serif;
  font-feature-settings: "tnum";
  font-size: 13px;
  color: var(--text-2);
  min-width: 50px;
}

.row-content { flex: 1; min-width: 0; }

.row-title {
  font-size: 15px;
  color: var(--text);
  letter-spacing: -0.2px;
  line-height: 1.4;
}

.row-title.done {
  color: var(--text-3);
  text-decoration: line-through;
  text-decoration-color: var(--text-3);
}

.row-meta {
  font-size: 12px;
  color: var(--text-3);
  font-family: 'Fraunces', serif;
  font-style: italic;
  margin-top: 2px;
}

.row-amount {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  color: var(--accent);
  font-weight: 500;
  flex-shrink: 0;
}

.row-arrow {
  font-family: 'Fraunces', serif;
  color: var(--text-3);
  font-size: 18px;
  flex-shrink: 0;
}

.row-empty {
  font-family: 'Fraunces', serif;
  font-style: italic;
  color: var(--text-3);
  font-size: 14px;
  padding: 12px 0;
}

/* ============== BIG NUMBER (mezi námi hero) ============== */
.big-number {
  font-family: 'Fraunces', serif;
  font-size: 48px;
  font-weight: 300;
  letter-spacing: -1.8px;
  line-height: 1;
  color: var(--accent);
  margin-bottom: 8px;
}

.big-number .currency {
  font-size: 22px;
  color: var(--text-3);
  margin-left: 6px;
  font-weight: 400;
}

.big-sub {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--text-2);
  margin-bottom: 14px;
}

.big-sub em {
  color: var(--text);
  font-style: italic;
}

.link {
  display: inline-block;
  font-size: 12px;
  color: var(--accent);
  border-bottom: 1px solid var(--hairline-strong);
  padding-bottom: 3px;
  cursor: pointer;
  letter-spacing: 0.3px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
}

.link:active { color: var(--accent-soft); }

/* ============== CARD ============== */
.card {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 16px;
  padding: 18px;
  margin: 0 24px 12px;
  transition: border-color 0.2s, transform 0.15s;
}

.card.clickable { cursor: pointer; }
.card.clickable:active { transform: scale(0.99); border-color: var(--hairline-strong); }

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}

.card-title {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.3px;
}

.card-meta {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 12px;
  color: var(--text-3);
}

.chip {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(212, 168, 71, 0.12);
  color: var(--accent);
  font-family: 'Inter', sans-serif;
}

.chip.muted { background: var(--surface-2); color: var(--text-3); }

/* ============== SWIPEABLE ROWS ============== */
.swipe-wrapper {
  position: relative;
  overflow: hidden;
  margin: 0 24px;
  border-bottom: 1px solid var(--hairline);
}

.swipe-wrapper:last-child { border-bottom: none; }

.swipe-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  pointer-events: none;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.5px;
}

.swipe-bg.right {
  background: linear-gradient(90deg, transparent 0%, var(--accent) 100%);
  justify-content: flex-end;
  padding-right: 24px;
  color: var(--bg);
}

.swipe-bg.left {
  background: linear-gradient(270deg, transparent 0%, var(--danger) 100%);
  justify-content: flex-start;
  padding-left: 24px;
  color: white;
}

.swipe-bg svg { width: 16px; height: 16px; margin: 0 6px; stroke: currentColor; fill: none; stroke-width: 2; }

.swipeable {
  background: var(--bg);
  position: relative;
  z-index: 1;
  transition: transform 0.05s ease;
  touch-action: pan-y;
  padding: 14px 0;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
}

.swipeable.dragging { transition: none; }
.swipeable.completing { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s; }

/* Checkbox circle */
.check-circle {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--text-3);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  background: transparent;
}

.check-circle.done {
  background: var(--accent);
  border-color: var(--accent);
}

.check-circle svg {
  width: 12px;
  height: 12px;
  stroke: var(--bg);
  stroke-width: 3;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  opacity: 0;
  transition: opacity 0.2s;
}

.check-circle.done svg { opacity: 1; }

/* Type icon for tasks (small SVG outline) */
.type-icon {
  width: 16px;
  height: 16px;
  color: var(--text-3);
  opacity: 0.7;
  flex-shrink: 0;
}

.type-icon svg { width: 100%; height: 100%; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

/* ============== TABS ============== */
.tabs {
  display: flex;
  padding: 0 24px;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--hairline);
}

.tab {
  flex: 1;
  text-align: center;
  padding: 14px 0;
  color: var(--text-3);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.2s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* Filter chips */
.chips {
  display: flex;
  gap: 8px;
  padding: 0 24px 20px;
  overflow-x: auto;
}

.chip-filter {
  padding: 8px 16px;
  border-radius: 999px;
  background: transparent;
  border: 1px solid var(--hairline-strong);
  color: var(--text-2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
}

.chip-filter.active {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

/* ============== BUTTONS ============== */
.btn {
  font-family: 'Inter', sans-serif;
  border: none;
  border-radius: 14px;
  padding: 14px 22px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  background: var(--accent);
  color: var(--bg);
  letter-spacing: 0.2px;
  transition: transform 0.15s;
  width: 100%;
}

.btn:active { transform: scale(0.98); }

.btn.secondary {
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--hairline-strong);
}

.btn.danger {
  background: transparent;
  color: var(--danger);
  border: 1px solid rgba(200, 85, 61, 0.3);
}

.btn-text {
  background: none;
  border: none;
  color: var(--text-3);
  font-size: 12px;
  cursor: pointer;
  padding: 4px 8px;
  text-decoration: underline;
  text-decoration-color: var(--hairline);
  text-underline-offset: 3px;
  font-family: 'Inter', sans-serif;
}

.btn-text:active { color: var(--accent); }

/* ============== INPUTS ============== */
input, textarea, select {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--hairline-strong);
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 14px;
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
  font-family: 'Inter', sans-serif;
}

body.theme-creme input,
body.theme-creme textarea,
body.theme-creme select {
  background: var(--surface);
}

input:focus, textarea:focus, select:focus { border-color: var(--accent); }

input::placeholder, textarea::placeholder {
  color: var(--text-3);
  font-family: 'Fraunces', serif;
  font-style: italic;
}

input[type="date"], input[type="time"], input[type="number"] { color-scheme: dark; }
body.theme-creme input[type="date"],
body.theme-creme input[type="time"],
body.theme-creme input[type="number"] { color-scheme: light; }

textarea { resize: vertical; min-height: 80px; }

label, .field-label {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 6px;
  display: block;
}

.field { margin-bottom: 12px; }

.field-row { display: flex; gap: 8px; }
.field-row > * { flex: 1; }

/* ============== FAB ============== */
.fab {
  position: fixed;
  bottom: 96px;
  right: 24px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  cursor: pointer;
  z-index: 50;
  box-shadow:
    0 1px 2px rgba(0, 0, 0, 0.1),
    0 8px 24px rgba(212, 168, 71, 0.3),
    0 24px 48px rgba(212, 168, 71, 0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.fab:active { transform: scale(0.92); }

.fab svg {
  width: 22px;
  height: 22px;
  stroke: var(--bg);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ============== BOTTOM NAV ============== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: var(--nav-bg);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  border-top: 1px solid var(--hairline);
  display: flex;
  justify-content: space-around;
  align-items: flex-start;
  padding-top: 12px;
  padding-bottom: env(safe-area-inset-bottom, 0);
  z-index: 40;
  transition: background 0.4s;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--text-3);
  cursor: pointer;
  padding: 6px 8px;
  background: none;
  border: none;
  flex: 1;
  transition: color 0.2s;
}

.nav-item.active { color: var(--accent); }

.nav-item svg {
  width: 22px;
  height: 22px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.nav-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.5px;
  font-family: 'Inter', sans-serif;
}

/* ============== TOAST ============== */
.toast {
  position: fixed;
  bottom: 180px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent);
  color: var(--bg);
  padding: 14px 22px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 200;
  box-shadow: 0 8px 32px rgba(212, 168, 71, 0.35);
  white-space: nowrap;
  max-width: 90%;
  font-family: 'Inter', sans-serif;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.danger {
  background: var(--danger);
  color: white;
  box-shadow: 0 8px 32px rgba(200, 85, 61, 0.4);
}

/* ============== MODAL / SHEET ============== */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.sheet-backdrop.show { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-radius: 28px 28px 0 0;
  padding: 12px 24px 32px;
  z-index: 110;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  max-height: 92vh;
  overflow-y: auto;
  padding-bottom: max(32px, env(safe-area-inset-bottom, 32px));
}

.sheet.show { transform: translateY(0); }

.sheet-handle {
  width: 36px;
  height: 4px;
  background: var(--surface-3);
  border-radius: 2px;
  margin: 0 auto 16px;
}

.sheet-title {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.4px;
  color: var(--text);
  text-align: center;
  margin-bottom: 8px;
}

.sheet-subtitle {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--text-3);
  text-align: center;
  margin-bottom: 24px;
}

.sheet-action {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px;
  background: var(--bg);
  border: 1px solid var(--hairline);
  border-radius: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: transform 0.15s;
  width: 100%;
  text-align: left;
}

<script>
// Firebase compat shim
window.fb = {

<script>
// ============================================================
// CONFIG & STATE
// ============================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCufsar6Lpump_qaq9w9G68jzP1xisuass",
  authDomain: "domacnost-5ecc8.firebaseapp.com",
  databaseURL: "https://domacnost-5ecc8-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "domacnost-5ecc8",
  storageBucket: "domacnost-5ecc8.firebasestorage.app",
  messagingSenderId: "615390227950",
  appId: "1:615390227950:web:ec30ad213c196137c2f2ff"
};

let currentUser = null;
let userData = null;
let householdData = {};
let currentScreen = 'home';
let currentFilter = 'all';
let currentTab = 'mezi'; // for Finance: mezi | ucty | moje
let calendarSelectedDate = null;
let detailContext = null; // { type: 'pet'|'ucet', id }

// ============================================================
// INIT FIREBASE
// ============================================================
window.addEventListener('load', () => {
  try {
    fb.init(FIREBASE_CONFIG);
    fb.auth().onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        loadUserData();
      } else {
        currentUser = null;
        userData = null;
        showScreen('login');
      }
    });
  } catch (e) {
    alert('Chyba Firebase: ' + e.message);
    showScreen('login');
  }

  // Online/offline detection
  window.addEventListener('online', () => document.getElementById('conn-status').classList.add('hidden'));
  window.addEventListener('offline', () => document.getElementById('conn-status').classList.remove('hidden'));
});

function showScreen(name) {
  ['login-screen', 'household-screen', 'main-app'].forEach(s => {
    document.getElementById(s).classList.add('hidden');
  });
  if (name === 'login') document.getElementById('login-screen').classList.remove('hidden');
  else if (name === 'household') document.getElementById('household-screen').classList.remove('hidden');
  else if (name === 'main') document.getElementById('main-app').classList.remove('hidden');
}

// ============================================================
// AUTH
// ============================================================
function switchAuthTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('login-panel').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-panel').classList.toggle('hidden', tab !== 'register');
  document.getElementById('login-error').textContent = '';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Vyplň email a heslo'; return; }
  try {
    await fb.auth().signInWithEmailAndPassword(email, pass);
  } catch (e) {
    err.textContent = translateAuthErr(e.code);
  }
}

async function doRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-password').value;
  const pass2 = document.getElementById('reg-password2').value;
  const err = document.getElementById('login-error');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Vyplň email a heslo'; return; }
  if (pass.length < 6) { err.textContent = 'Heslo musí mít alespoň 6 znaků'; return; }
  if (pass !== pass2) { err.textContent = 'Hesla se neshodují'; return; }
  try {
    await fb.auth().createUserWithEmailAndPassword(email, pass);
  } catch (e) {
    err.textContent = translateAuthErr(e.code);
  }
}

async function resetPassword() {
  const email = document.getElementById('login-email').value.trim();
  const err = document.getElementById('login-error');
  if (!email) { err.textContent = 'Zadej email pro reset'; return; }
  try {
    await fb.auth().sendPasswordResetEmail(email);
    err.textContent = 'Odkaz na reset hesla byl odeslán';
    err.style.color = 'var(--accent)';
    setTimeout(() => { err.style.color = ''; err.textContent = ''; }, 4000);
  } catch (e) {
    err.textContent = translateAuthErr(e.code);
  }
}

function translateAuthErr(code) {
  const map = {
    'auth/invalid-email': 'Neplatný email',
    'auth/user-not-found': 'Uživatel neexistuje',
    'auth/wrong-password': 'Špatné heslo',
    'auth/invalid-credential': 'Špatný email nebo heslo',
    'auth/email-already-in-use': 'Tento email je už zaregistrovaný',
    'auth/weak-password': 'Slabé heslo (min. 6 znaků)',
    'auth/network-request-failed': 'Chyba připojení k internetu',
    'auth/too-many-requests': 'Příliš mnoho pokusů, zkus později'
  };
  return map[code] || 'Chyba: ' + code;
}

async function logout() {
  try { await fb.auth().signOut(); } catch (e) {}
}

// ============================================================
// USER DATA & HOUSEHOLD
// ============================================================
async function loadUserData() {
  try {
    const snap = await fb.ref('users/' + currentUser.uid).once('value');
    userData = snap.val();
    if (!userData || !userData.householdId) {
      showScreen('household');
    } else {
      subscribeToHousehold();
      showScreen('main');
      renderScreen();
    }
  } catch (e) {
    console.error('loadUserData error', e);
    showScreen('household');
  }
}

function subscribeToHousehold() {
  if (!userData || !userData.householdId) return;
  let firstLoad = true;
  fb.ref('households/' + userData.householdId).on('value', snap => {
    householdData = snap.val() || {};
    if (currentScreen) renderScreen();
    // On first load after data sync, ensure auto-rent if needed
    if (firstLoad) {
      firstLoad = false;
      setTimeout(() => ensureRentTxns(), 1000);
    }
  });
}

function generateHouseholdCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
  return code;
}

async function createHousehold() {
  const name = document.getElementById('new-name').value.trim();
  const err = document.getElementById('household-error');
  err.textContent = '';
  if (!name) { err.textContent = 'Zadej své jméno'; return; }

  const code = generateHouseholdCode();
  const householdId = 'h_' + code;
  try {
    await fb.ref('households/' + householdId).set({
      createdAt: Date.now(),
      members: { [currentUser.uid]: name },
      profiles: {},
      tasks: {},
      events: {},
      txns: {},
      ucets: {},
      mineExpenses: {},
      pets: {},
      config: { rentEnabled: false, rentAmount: 10000 }
    });

// ============================================================
// HELPERS
// ============================================================
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function getList(name) {
  const v = householdData[name];
  if (!v) return [];
  return Object.keys(v).map(k => ({ id: k, ...v[k] }));
}

function getMembers() { return householdData.members || {}; }

function getMyName() {
  if (!currentUser) return '';
  return getMembers()[currentUser.uid] || (userData && userData.name) || '';
}

function getPartnerUid() {
  const m = getMembers();
  return Object.keys(m).find(u => u !== currentUser.uid);
}

function getPartnerName() {
  const uid = getPartnerUid();
  return uid ? getMembers()[uid] : '';
}

function getInitial(name) {
  if (!name) return '·';
  return String(name).trim().charAt(0).toUpperCase() || '·';
}

function getMyTheme() {
  if (!currentUser) return 'espresso';
  const profiles = householdData.profiles || {};
  return (profiles[currentUser.uid] && profiles[currentUser.uid].theme) || 'espresso';
}

function applyTheme() {
  const theme = getMyTheme();
  document.body.classList.remove('theme-espresso', 'theme-creme');
  document.body.classList.add('theme-' + theme);
}

async function setMyTheme(theme) {
  if (!currentUser || !userData || !userData.householdId) return;
  await fb.ref('households/' + userData.householdId + '/profiles/' + currentUser.uid).update({ theme });
  applyTheme();
  vibrate(10);
}

function fmtMoney(n) {
  if (n === null || n === undefined || isNaN(n)) return '0 Kč';
  return Math.round(n).toLocaleString('cs-CZ').replace(/,/g, ' ') + ' Kč';
}

function fmtNumOnly(n) {
  if (n === null || n === undefined || isNaN(n)) return '0';
  return Math.round(n).toLocaleString('cs-CZ').replace(/,/g, ' ');
}

function dateKey(d) {
  if (!d) return '';
  if (typeof d === 'string') d = new Date(d);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function formatDateCZ(d) {
  if (!d) return '';
  if (typeof d === 'string') d = new Date(d);
  const months = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
  return d.getDate() + '. ' + months[d.getMonth()];
}

function formatTimeCZ(d) {
  if (!d) return '';
  if (typeof d === 'string') d = new Date(d);
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

function vibrate(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) {}
}

function showToast(msg, danger) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('danger', !!danger);
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// Log an activity event (for the activity feed on home screen)
async function logActivity(action, details) {
  if (!currentUser || !userData || !userData.householdId) return;
  try {
    const data = {
      action: action,
      by: currentUser.uid,
      at: Date.now(),
      details: details || {}
    };
    await fb.ref('households/' + userData.householdId + '/activity').push(data);

    // Auto-cleanup: keep only last 50 activities
    const snap = await fb.ref('households/' + userData.householdId + '/activity').orderByChild('at').once('value');
    if (snap.exists()) {
      const all = [];
      snap.forEach(child => { all.push({ id: child.key, ...child.val() }); });
      all.sort((a, b) => (b.at || 0) - (a.at || 0));
      if (all.length > 50) {
        const toDelete = all.slice(50);
        for (const item of toDelete) {
          await fb.ref('households/' + userData.householdId + '/activity/' + item.id).remove();
        }
      }
    }
  } catch (e) {
    // Silent fail — activity log is non-critical
    console.error('logActivity error', e);
  }
}

// Format relative time (e.g. "před 2 hodinami")
function timeAgo(timestamp) {
  if (!timestamp) return '';
  const diff = Date.now() - timestamp;
  const min = Math.floor(diff / 60000);
  const hour = Math.floor(diff / 3600000);
  const day = Math.floor(diff / 86400000);
  if (min < 1) return 'před chvílí';
  if (min < 60) return 'před ' + min + (min === 1 ? ' min' : ' min');
  if (hour < 24) return 'před ' + hour + (hour === 1 ? ' h' : hour < 5 ? ' h' : ' h');
  if (day < 7) return 'před ' + day + (day === 1 ? ' dnem' : day < 5 ? ' dny' : ' dny');
  // Older: format date
  const d = new Date(timestamp);
  return d.getDate() + '. ' + (d.getMonth() + 1) + '.';
}

// Get human label for activity action
function activityLabel(activity) {

    case 'rent_auto': return 'Automatický nájem za ' + (d.month || 'měsíc');

// ============================================================
// PET CARE HELPERS
// ============================================================
// Compute next due date for a care item based on lastAt + frequency
function computeNextCareDate(care) {
  if (!care || !care.lastAt) return null;
  const last = new Date(care.lastAt);
  const next = new Date(last);
  const interval = care.frequencyValue || 1;
  const unit = care.frequencyUnit || 'year';
  switch (unit) {
    case 'day': next.setDate(next.getDate() + interval); break;
    case 'week': next.setDate(next.getDate() + interval * 7); break;
    case 'month': next.setMonth(next.getMonth() + interval); break;
    case 'year': next.setFullYear(next.getFullYear() + interval); break;
    default: next.setFullYear(next.getFullYear() + 1);
  }
  return next.getTime();
}

// Get all care items for a pet, sorted by next due date
function getCareItemsForPet(pet) {
  if (!pet || !pet.care) return [];
  return Object.keys(pet.care).map(k => {
    const c = pet.care[k];
    return Object.assign({ id: k }, c, {
      nextAt: computeNextCareDate(c)
    });
  }).sort((a, b) => (a.nextAt || 0) - (b.nextAt || 0));
}

// Get the most urgent upcoming care for a pet (within notify window)
function getNextCareForPet(pet) {
  const items = getCareItemsForPet(pet);
  const now = Date.now();
  // First find overdue items
  const overdue = items.find(c => c.nextAt && c.nextAt < now);
  if (overdue) return overdue;
  // Then nearest upcoming
  return items.find(c => c.nextAt && c.nextAt >= now) || null;
}

// Format frequency human-readably
function formatFrequency(value, unit) {
  const v = value || 1;
  const labels = {
    day: v === 1 ? 'denně' : (v < 5 ? 'každé ' + v + ' dny' : 'každých ' + v + ' dní'),
    week: v === 1 ? 'týdně' : (v < 5 ? 'každé ' + v + ' týdny' : 'každých ' + v + ' týdnů'),
    month: v === 1 ? 'měsíčně' : (v < 5 ? 'každé ' + v + ' měsíce' : 'každých ' + v + ' měsíců'),
    year: v === 1 ? 'ročně' : (v < 5 ? 'každé ' + v + ' roky' : 'každých ' + v + ' let')
  };
  return labels[unit] || 'občas';
}

// ============================================================
// HOME / DNES
// ============================================================
function renderHome() {
  const myName = getMyName();
  const partnerName = getPartnerName();
  const myInitial = getInitial(myName);
  const now = new Date();

  const days = ['neděle','pondělí','úterý','středa','čtvrtek','pátek','sobota'];
  const dateStr = days[now.getDay()] + ' ' + formatDateCZ(now);

  const hour = now.getHours();
  let greeting = 'Dobré ráno';
  if (hour >= 11 && hour < 17) greeting = 'Dobré odpoledne';
  else if (hour >= 17 && hour < 22) greeting = 'Dobrý večer';
  else if (hour >= 22 || hour < 5) greeting = 'Dobrou noc';

  // Today items
  const todayKey = dateKey(now);
  const tasks = getList('tasks');
  const events = expandRecurringEvents(getList('events'), now);

  const myUid = currentUser.uid;
  const partnerUid = getPartnerUid();

  // Helper: should I see this item on Home/Dnes?
  // Show: tasks/events without assignedTo (shared) OR assignedTo === me
  // Hide: items assignedTo === partner only
  function isMine(item) {
    return !item.assignedTo || item.assignedTo === myUid;
  }

  const todayTasks = tasks.filter(t => !t.done && t.dueDate === todayKey && isMine(t));
  const todayEvents = events.filter(e => {
    const d = new Date(e.start);
    return dateKey(d) === todayKey && isMine(e);
  });

  // Bills due this month — find those with dueDay between today and end of month
  const dayOfMonth = now.getDate();
  const billsDueSoon = tasks.filter(t => !t.done && t.type === 'bill' && t.dueDay && t.dueDay >= dayOfMonth && t.dueDay <= dayOfMonth + 14 && isMine(t));

  // Compute "Mezi námi" balance
  const led = computeLedger();
  let mezitext, mezisub, mezicls = 'accent';
  if (Math.abs(led.myCredit) < 1) {
    mezitext = '0';
    mezisub = '<em>vyrovnáno</em> · žádné dluhy';
  } else if (led.myCredit < 0) {
    mezitext = fmtNumOnly(Math.abs(led.myCredit));
    mezisub = 'dlužíš <em>' + escapeHtml(partnerName || 'partnerovi') + '</em>';
  } else {
    mezitext = fmtNumOnly(led.myCredit);
    mezisub = '<em>' + escapeHtml(partnerName || 'partner') + '</em> dluží tobě';
  }

  // Week ahead
  const weekKeys = [];
  for (let i = 1; i <= 7; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() + i);
    weekKeys.push(dateKey(d));
  }
  const weekTasks = tasks.filter(t => !t.done && t.dueDate && weekKeys.includes(t.dueDate) && isMine(t));
  const weekEvents = events.filter(e => weekKeys.includes(dateKey(new Date(e.start))) && isMine(e));
  const weekBills = tasks.filter(t => !t.done && t.type === 'bill' && t.dueDay && t.dueDay >= dayOfMonth + 1 && t.dueDay <= dayOfMonth + 7 && isMine(t));

  // Open ucty (otevřené účty)
  const ucty = getList('ucets').filter(u => !u.closed);

  // Build HTML
  let html = '<div class="app">';

  // Top
  html += '<div class="home-top">';
  html += '<div class="greeting-date">' + escapeHtml(dateStr) + '</div>';
  html += '<div class="home-row">';
  html += '<button class="avatar size-lg" onclick="navTo(\'more\')">' + escapeHtml(myInitial) + '</button>';
  html += '<div style="flex: 1; min-width: 0;">';
  html += '<div class="greeting-text">' + escapeHtml(greeting) + ',<br><span class="name">' + escapeHtml(myName) + '</span></div>';
  if (partnerName) {
    html += '<div class="together">spolu s <em>' + escapeHtml(partnerName) + '</em></div>';
  }
  html += '</div>';
  html += '</div>';
  html += '</div>';

  // Hairline
  html += '<hr class="hairline">';

  // DNES
  html += '<div class="section-label">D N E S</div>';
  html += '<div class="section-content">';
  if (todayTasks.length === 0 && todayEvents.length === 0) {
    html += '<div class="row-empty">volný den</div>';
  } else {
    todayEvents.sort((a,b) => new Date(a.start) - new Date(b.start));
    todayEvents.forEach(e => {
      const time = e.allDay ? '' : formatTimeCZ(new Date(e.start));
      html += '<div class="row" onclick="navTo(\'calendar\')">';
      html += '<div class="row-bullet"></div>';
      if (time) html += '<div class="row-time">' + escapeHtml(time) + '</div>';
      html += '<div class="row-content"><div class="row-title">' + escapeHtml(e.title || 'Termín') + '</div>';
      if (e.location) html += '<div class="row-meta">' + escapeHtml(e.location) + '</div>';
      html += '</div>';
      html += '</div>';
    });
    todayTasks.forEach(t => {
      html += '<div class="row" onclick="navTo(\'tasks\')">';
      html += '<div class="row-bullet"></div>';
      html += '<div class="row-content"><div class="row-title">' + escapeHtml(t.title) + '</div>';
      if (t.notes) html += '<div class="row-meta">' + escapeHtml(t.notes) + '</div>';
      html += '</div>';
      if (t.amount) html += '<div class="row-amount">' + fmtMoney(t.amount) + '</div>';
      html += '</div>';
    });
  }
  html += '</div>';

  // Hairline
  html += '<hr class="hairline">';

  // MEZI NAMI
  html += '<div class="section-label">M E Z I &nbsp; N Á M I</div>';
  html += '<div class="section-content" onclick="navTo(\'finance\')" style="cursor: pointer;">';
  html += '<div class="big-number">' + mezitext + '<span class="currency">Kč</span></div>';
  html += '<div class="big-sub">' + mezisub + '</div>';

  // Příští platba nájmu — kompaktní řádek
  const nextRentHome = computeNextRentInfo();
  if (nextRentHome) {
    let daysTxt;
    if (nextRentHome.daysUntil === 0) daysTxt = 'dnes';
    else if (nextRentHome.daysUntil === 1) daysTxt = 'zítra';
    else if (nextRentHome.daysUntil < 0) daysTxt = 'po termínu';
    else daysTxt = 'za ' + nextRentHome.daysUntil + (nextRentHome.daysUntil < 5 ? ' dny' : ' dní');

    const dShort = nextRentHome.date.getDate() + '. ' + (nextRentHome.date.getMonth() + 1) + '.';
    html += '<div style="margin-top: 12px; padding: 10px 12px; background: var(--surface-2); border-radius: 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px;">';
    html += '<div style="display: flex; flex-direction: column; gap: 2px; min-width: 0;">';
    html += '<div style="font-size: 11px; color: var(--muted); letter-spacing: 0.5px;">PŘÍŠTÍ NÁJEM · ' + escapeHtml(dShort) + ' · ' + escapeHtml(daysTxt) + '</div>';
    html += '<div style="font-size: 13px; color: var(--text);">' + escapeHtml(nextRentHome.payer) + ' → ' + escapeHtml(nextRentHome.receiver) + (nextRentHome.skippedCount > 0 ? ' <span style="color: var(--accent);">· ' + nextRentHome.skippedCount + ' předtím pokryto</span>' : '') + '</div>';
    html += '</div>';
    html += '<div style="font-family: var(--font-display, serif); font-size: 18px; color: var(--accent); font-weight: 600; white-space: nowrap;">' + fmtMoney(nextRentHome.amount) + '</div>';
    html += '</div>';
  }

  html += '<span class="link" style="margin-top: 12px; display: inline-block;">Zobrazit detail →</span>';
  html += '</div>';

  // Hairline
  html += '<hr class="hairline">';

  // TYDEN
  if (weekTasks.length > 0 || weekEvents.length > 0 || weekBills.length > 0) {
    html += '<div class="section-label">T Ý D E N</div>';
    html += '<div class="section-content">';

    // Combine and sort by date
    const weekItems = [];
    weekEvents.forEach(e => {
      const d = new Date(e.start);
      weekItems.push({
        date: d,
        sortKey: d.getTime(),
        type: 'event',
        title: e.title || 'Termín',
        meta: e.allDay ? '' : formatTimeCZ(d)
      });
    });
    weekTasks.forEach(t => {
      const d = new Date(t.dueDate);
      weekItems.push({
        date: d,
        sortKey: d.getTime(),
        type: 'task',
        title: t.title,
        meta: '',
        amount: t.amount
      });
    });
    weekBills.forEach(b => {
      const d = new Date(now.getFullYear(), now.getMonth(), b.dueDay);
      weekItems.push({
        date: d,
        sortKey: d.getTime(),
        type: 'bill',
        title: b.title,
        meta: 'splatnost',
        amount: b.amount
      });
    });
    weekItems.sort((a,b) => a.sortKey - b.sortKey);

    weekItems.slice(0, 6).forEach(it => {
      const dayName = days[it.date.getDay()].substring(0, 2);
      const dayNum = it.date.getDate();
      html += '<div class="row" onclick="navTo(\'' + (it.type === 'event' ? 'calendar' : 'tasks') + '\')">';
      html += '<div class="row-time">' + dayName + ' ' + dayNum + '.</div>';
      html += '<div class="row-content"><div class="row-title">' + escapeHtml(it.title) + '</div>';
      if (it.meta) html += '<div class="row-meta">' + escapeHtml(it.meta) + '</div>';
      html += '</div>';
      if (it.amount) html += '<div class="row-amount">' + fmtMoney(it.amount) + '</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '<hr class="hairline">';
  }

  // OTEVŘENÉ ÚČTY
  if (ucty.length > 0) {
    html += '<div class="section-label">O T E V Ř E N É &nbsp; Ú Č T Y</div>';
    ucty.forEach(u => {
      const myDebt = computeUcetDebtFor(u, currentUser.uid);
      html += '<div class="ucet" onclick="goDetail(\'ucet\', \'' + u.id + '\')">';
      html += '<div class="ucet-head">';
      html += '<div class="ucet-name">' + escapeHtml(u.name) + '</div>';
      html += '<span class="chip">otevřen</span>';
      html += '</div>';
      const peopleCount = (u.people || []).length;
      const peopleStr = peopleCount + ' ' + (peopleCount === 1 ? 'osoba' : peopleCount < 5 ? 'lidi' : 'lidí');
      html += '<div class="ucet-meta">' + peopleStr + '</div>';
      const total = computeUcetTotal(u);
      html += '<div class="ucet-stats">';
      html += '<div><div class="ucet-stat-label">Utraceno</div><div class="ucet-stat-value">' + fmtMoney(total) + '</div></div>';
      if (Math.abs(myDebt) > 1) {
        html += '<div><div class="ucet-stat-label">' + (myDebt > 0 ? 'Tobě dluží' : 'Dlužíš') + '</div><div class="ucet-stat-value accent">' + fmtMoney(Math.abs(myDebt)) + '</div></div>';
      } else {
        html += '<div><div class="ucet-stat-label">Tvůj stav</div><div class="ucet-stat-value">vyrovnáno</div></div>';
      }
      html += '</div>';
      html += '</div>';
    });
    html += '<hr class="hairline">';
  }

  // ===== PEJSCI — péče co potřebuje pozornost =====
  const pets = getList('pets');
  const petAlerts = [];
  pets.forEach(pet => {
    const items = getCareItemsForPet(pet);
    items.forEach(c => {
      if (!c.nextAt) return;
      const daysLeft = Math.ceil((c.nextAt - Date.now()) / (24*60*60*1000));
      const notify = c.notifyDaysBefore || 14;
      if (daysLeft <= notify) {
        petAlerts.push({
          petName: pet.name,
          petId: pet.id,
          title: c.title,
          daysLeft,
          contactId: c.contactId
        });
      }
    });
  });
  petAlerts.sort((a, b) => a.daysLeft - b.daysLeft);

  if (petAlerts.length > 0) {
    html += '<div class="section-label">P E J S C I</div>';
    html += '<div class="section-content">';
    petAlerts.slice(0, 5).forEach(a => {
      let statusText, statusColor;
      if (a.daysLeft < 0) {
        statusText = 'zpoždění ' + Math.abs(a.daysLeft) + ' dní · objednej!';
        statusColor = 'var(--danger)';
      } else if (a.daysLeft === 0) {
        statusText = 'dnes!';
        statusColor = 'var(--accent)';
      } else if (a.daysLeft <= 3) {
        statusText = 'za ' + a.daysLeft + (a.daysLeft === 1 ? ' den' : ' dny') + ' · objednej!';
        statusColor = 'var(--accent)';
      } else {
        statusText = 'za ' + a.daysLeft + ' dní';
        statusColor = 'var(--accent)';
      }

      html += '<div class="row" onclick="goDetail(\'pet\', \'' + a.petId + '\')">';
      html += '<div class="row-bullet" style="background: ' + statusColor + ';"></div>';
      html += '<div class="row-content">';
      html += '<div class="row-title">' + escapeHtml(a.petName) + ' — ' + escapeHtml(a.title) + '</div>';
      html += '<div class="row-meta" style="color: ' + statusColor + ';">' + escapeHtml(statusText) + '</div>';
      html += '</div>';
      // If linked contact, show call button
      if (a.contactId) {
        const contact = getList('contacts').find(c => c.id === a.contactId);
        if (contact && contact.phone) {
          const phoneClean = contact.phone.replace(/[^+\d]/g, '');
          html += '<a href="tel:' + escapeHtml(phoneClean) + '" onclick="event.stopPropagation()" style="background: rgba(212, 168, 71, 0.12); border: 1px solid var(--hairline); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 8px; text-decoration: none;" title="Zavolat ' + escapeHtml(contact.name) + '">';
          html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';
          html += '</a>';
        }
      }
      html += '</div>';
    });
    html += '</div>';
    html += '<hr class="hairline">';
  }

  // ===== TÝDENNÍ SOUHRN =====
  // Compute stats for the past 7 days
  const weekAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
  const allTasks = getList('tasks');
  const allTxns = getList('txns');
  const tasksDoneThisWeek = allTasks.filter(t => t.done && (t.doneAt || 0) > weekAgo).length;
  const txnsThisWeek = allTxns.filter(t => (t.at || 0) > weekAgo);
  const txnsTotalThisWeek = txnsThisWeek.reduce((s, t) => s + (t.amount || 0), 0);

  // Events upcoming this week
  const eventsUpcomingWeek = events.filter(e => {
    const d = new Date(e.start);
    return weekKeys.includes(dateKey(d));
  }).length;

  if (tasksDoneThisWeek > 0 || txnsThisWeek.length > 0) {
    html += '<div class="section-label">T E N T O &nbsp; T Ý D E N</div>';
    html += '<div class="section-content">';
    html += '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px;">';
    // Tasks done
    html += '<div style="padding: 16px; background: var(--surface); border: 1px solid var(--hairline); border-radius: 14px; text-align: center;">';
    html += '<div style="font-family: Fraunces, serif; font-size: 32px; font-weight: 300; color: var(--accent); letter-spacing: -1px; line-height: 1;">' + tasksDoneThisWeek + '</div>';
    html += '<div style="font-family: Fraunces, serif; font-style: italic; font-size: 12px; color: var(--text-3); margin-top: 6px;">' + (tasksDoneThisWeek === 1 ? 'odškrtnutý úkol' : tasksDoneThisWeek < 5 ? 'odškrtnuté úkoly' : 'odškrtnutých úkolů') + '</div>';
    html += '</div>';
    // Money flow
    html += '<div style="padding: 16px; background: var(--surface); border: 1px solid var(--hairline); border-radius: 14px; text-align: center;">';
    html += '<div style="font-family: Fraunces, serif; font-size: 28px; font-weight: 300; color: var(--accent); letter-spacing: -1px; line-height: 1;">' + fmtNumOnly(txnsTotalThisWeek) + '</div>';
    html += '<div style="font-family: Fraunces, serif; font-style: italic; font-size: 12px; color: var(--text-3); margin-top: 6px;">Kč v transakcích</div>';
    html += '</div>';
    html += '</div>';
    html += '</div>';
    html += '<hr class="hairline">';
  }

  // ===== AKTIVITA FEED =====
  const activities = getList('activity').sort((a, b) => (b.at || 0) - (a.at || 0)).slice(0, 5);
  if (activities.length > 0) {
    html += '<div class="section-label">A K T I V I T A</div>';
    html += '<div class="section-content">';
    activities.forEach(act => {
      const isMe = act.by === currentUser.uid;
      const byName = getMembers()[act.by] || '';
      const initial = getInitial(byName);
      const color = isMe ? 'var(--accent)' : 'var(--text-3)';

      html += '<div style="display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--hairline);">';
      html += '<div style="width: 28px; height: 28px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--hairline); display: flex; align-items: center; justify-content: center; font-family: Fraunces, serif; font-style: italic; font-size: 12px; color: ' + color + '; flex-shrink: 0;">' + escapeHtml(initial) + '</div>';
      html += '<div style="flex: 1; min-width: 0;">';
      html += '<div style="font-size: 13px; color: var(--text-2); line-height: 1.4;">' + escapeHtml(activityLabel(act)) + '</div>';
      html += '<div style="font-family: Fraunces, serif; font-style: italic; font-size: 11px; color: var(--text-3); margin-top: 2px;">' + escapeHtml(timeAgo(act.at)) + '</div>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '<hr class="hairline">';
  }

  // Padding bottom
  html += '<div style="padding: 32px 24px; text-align: center;">';
  html += '<div style="font-family: Fraunces, serif; font-style: italic; color: var(--text-3); font-size: 12px;">Domov · ' + escapeHtml(myName);
  if (partnerName) html += ' & ' + escapeHtml(partnerName);
  html += '</div>';
  html += '</div>';

  html += '</div>';
  return html;
}


// ============================================================
// TASKS
// ============================================================
function renderTasks() {
  const tasks = getList('tasks');
  const todayKey = dateKey(new Date());

  const myUid = currentUser.uid;
  const partnerUid = getPartnerUid();

  let filtered = tasks;
  if (currentFilter === 'today') filtered = tasks.filter(t => !t.done && (t.dueDate === todayKey || (t.type === 'bill' && t.dueDay === new Date().getDate())));
  else if (currentFilter === 'shopping') filtered = tasks.filter(t => t.type === 'shopping');
  else if (currentFilter === 'bill') filtered = tasks.filter(t => t.type === 'bill');
  else if (currentFilter === 'task') filtered = tasks.filter(t => t.type === 'task' || !t.type);
  else if (currentFilter === 'repeat') filtered = tasks.filter(t => t.repeat || t.type === 'bill');
  else if (currentFilter === 'mine') filtered = tasks.filter(t => t.assignedTo === myUid);
  else if (currentFilter === 'partner') filtered = tasks.filter(t => t.assignedTo === partnerUid);
  else if (currentFilter === 'shared') filtered = tasks.filter(t => !t.assignedTo);

  const active = filtered.filter(t => !t.done).sort((a,b) => {
    if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
    if (a.dueDate) return -1;
    if (b.dueDate) return 1;
    return (b.createdAt || 0) - (a.createdAt || 0);
  });
  const done = filtered.filter(t => t.done).sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));

  let html = '<div class="app">';

  // Header
  html += '<div class="page-header">';
  html += '<div class="page-title">Úkoly</div>';
  html += '</div>';

  // Filter chips
  html += '<div class="chips">';
  html += chipFilter('all', 'Vše');
  html += chipFilter('today', 'Dnes');
  html += chipFilter('mine', 'Pro mě');
  if (partnerUid) html += chipFilter('partner', getPartnerName());
  html += chipFilter('shared', 'Sdílené');
  html += chipFilter('task', 'Úkoly');
  html += chipFilter('shopping', 'Nákupy');
  html += chipFilter('bill', 'Splatnosti');
  html += chipFilter('repeat', 'Opakované');
  html += '</div>';

  // Active list
  if (active.length === 0 && done.length === 0) {
    html += '<div class="empty">Žádné úkoly. Přidej tlačítkem +</div>';
  } else if (active.length === 0) {
    html += '<div class="empty">Vše je hotovo ✓</div>';
  } else {
    active.forEach(t => html += taskRow(t));
  }

  // Done section (collapsible)
  if (done.length > 0) {
    html += '<div style="margin-top: 32px;"></div>';
    html += '<details>';
    html += '<summary style="cursor: pointer; padding: 0 24px; list-style: none;"><div class="section-label" style="padding: 0; cursor: pointer;">H O T O V O &nbsp;(' + done.length + ')</div></summary>';
    done.slice(0, 30).forEach(t => html += taskRow(t));
    html += '</details>';
  }

  html += '</div>';
  return html;
}

function chipFilter(id, label) {
  const active = currentFilter === id ? ' active' : '';
  return '<button class="chip-filter' + active + '" onclick="setFilter(\'' + id + '\')">' + escapeHtml(label) + '</button>';
}

function setFilter(f) {
  currentFilter = f;
  vibrate(8);
  renderScreen();
}

function taskRow(t) {
  const typeIcon = getTypeIconSVG(t.type);
  const doneClass = t.done ? ' done' : '';

  // Build meta string
  const repeatLabels = {
    daily: 'každý den',
    weekly: 'každý týden',
    monthly: 'každý měsíc',
    yearly: 'každý rok'
  };

  let metaHtml = '';
  if (t.type === 'bill') {
    metaHtml = 'splatnost ' + (t.dueDay || '') + '. v měsíci';
    if (t.repeat) metaHtml += ' · ' + (repeatLabels[t.repeat] || 'opakuje se');
  } else if (t.type === 'shopping') {
    metaHtml = 'nákupní seznam';
  } else if (t.dueDate) {
    const d = new Date(t.dueDate);
    const today = new Date();
    const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
    if (dateKey(d) === dateKey(today)) metaHtml = 'dnes';
    else if (dateKey(d) === dateKey(tomorrow)) metaHtml = 'zítra';
    else metaHtml = formatDateCZ(d);
    if (t.repeat) metaHtml += ' · ' + (repeatLabels[t.repeat] || 'opakuje se');
  } else if (t.repeat) {
    metaHtml = repeatLabels[t.repeat] || 'opakuje se';
  }
  if (t.notes) metaHtml = (metaHtml ? metaHtml + ' · ' : '') + t.notes;

  // Determine "for whom" indicator
  const myUid = currentUser.uid;
  const partnerUid = getPartnerUid();
  let assigneeHtml = '';
  let isPartnerOnly = false;
  if (t.assignedTo) {
    if (t.assignedTo === myUid) {
      const init = getInitial(getMyName());
      assigneeHtml = '<div style="width: 22px; height: 22px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--hairline); display: flex; align-items: center; justify-content: center; font-family: Fraunces, serif; font-style: italic; font-size: 11px; color: var(--accent); flex-shrink: 0;" title="Pro mě">' + init + '</div>';
    } else if (t.assignedTo === partnerUid) {
      const init = getInitial(getPartnerName());
      assigneeHtml = '<div style="width: 22px; height: 22px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--hairline); display: flex; align-items: center; justify-content: center; font-family: Fraunces, serif; font-style: italic; font-size: 11px; color: var(--text-3); flex-shrink: 0; opacity: 0.7;" title="Pro partnera">' + init + '</div>';
      isPartnerOnly = true;
    }
  }

  const opacityStyle = isPartnerOnly ? 'opacity: 0.65;' : '';

  let html = '<div class="swipe-wrapper">';
  html += '<div class="swipe-bg right"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Hotovo</div>';
  html += '<div class="swipe-bg left"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Smazat</div>';
  html += '<div class="swipeable" data-id="' + t.id + '" data-name="' + escapeHtml(t.title) + '" onclick="editTaskSheet(\'' + t.id + '\')" style="' + opacityStyle + '">';
  html += '<div class="check-circle' + (t.done ? ' done' : '') + '" onclick="event.stopPropagation(); toggleTask(\'' + t.id + '\')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>';
  if (typeIcon) html += '<div class="type-icon">' + typeIcon + '</div>';
  html += '<div class="row-content">';
  html += '<div class="row-title' + doneClass + '">' + escapeHtml(t.title) + '</div>';
  if (metaHtml) html += '<div class="row-meta">' + escapeHtml(metaHtml) + '</div>';
  html += '</div>';
  if (assigneeHtml) html += assigneeHtml;
  if (t.amount) html += '<div class="row-amount">' + fmtMoney(t.amount) + '</div>';
  html += '</div>';
  html += '</div>';
  return html;
}

// Open edit task sheet — also offer iPhone calendar export if has dueDate
function editTaskSheet(id) {
  const tasks = householdData.tasks || {};
  const t = tasks[id];
  if (!t) return;
  const myName = getMyName();
  const partnerName = getPartnerName();
  const myUid = currentUser.uid;
  const partnerUid = getPartnerUid();

  let formHtml = '<div class="field"><label>Název</label><input type="text" id="t-title" value="' + escapeHtml(t.title || '') + '"></div>';

  if (t.type === 'bill') {
    formHtml += '<div class="field-row">';
    formHtml += '<div class="field"><label>Den v měsíci</label><input type="number" inputmode="numeric" id="t-dueDay" value="' + (t.dueDay || '') + '" min="1" max="31"></div>';
    formHtml += '<div class="field"><label>Částka (Kč)</label><input type="number" inputmode="decimal" id="t-amount" value="' + (t.amount || '') + '"></div>';
    formHtml += '</div>';
  } else if (t.type !== 'shopping') {
    formHtml += '<div class="field"><label>Datum</label><input type="date" id="t-dueDate" value="' + (t.dueDate || '') + '"></div>';
  }
  formHtml += '<div class="field"><label>Poznámka</label><input type="text" id="t-notes" value="' + escapeHtml(t.notes || '') + '"></div>';

  // Repeat selector — only for regular tasks (bills already auto-repeat monthly)
  if (t.type !== 'bill' && t.type !== 'shopping') {
    formHtml += '<div class="field"><label>Opakovat</label>';
    formHtml += '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">';
    formHtml += '<button class="btn secondary" id="t-rep-none" onclick="selectRepeat(\'none\')" style="padding: 10px;">Jednorázově</button>';
    formHtml += '<button class="btn secondary" id="t-rep-daily" onclick="selectRepeat(\'daily\')" style="padding: 10px;">Každý den</button>';
    formHtml += '<button class="btn secondary" id="t-rep-weekly" onclick="selectRepeat(\'weekly\')" style="padding: 10px;">Každý týden</button>';
    formHtml += '<button class="btn secondary" id="t-rep-monthly" onclick="selectRepeat(\'monthly\')" style="padding: 10px;">Každý měsíc</button>';
    formHtml += '</div>';
    formHtml += '</div>';
  }

  // Pro koho selector
  if (partnerName) {
    formHtml += '<div class="field"><label>Pro koho</label>';
    formHtml += '<div class="field-row">';
    formHtml += '<button class="btn secondary" id="t-for-me" onclick="selectTaskFor(\'me\')">' + escapeHtml(myName) + '</button>';
    formHtml += '<button class="btn secondary" id="t-for-partner" onclick="selectTaskFor(\'partner\')">' + escapeHtml(partnerName) + '</button>';
    formHtml += '<button class="btn secondary" id="t-for-both" onclick="selectTaskFor(\'both\')">Oba</button>';
    formHtml += '</div></div>';
  }

  // iPhone Calendar export button (only if has date)
  if (t.dueDate || t.type === 'bill') {
    formHtml += '<button class="btn secondary" style="margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 10px;" onclick="exportTaskToICS(\'' + id + '\')">';
    formHtml += '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="10" y1="16" x2="14" y2="16"/></svg>';
    formHtml += 'Přidat do iPhone kalendáře';
    formHtml += '</button>';
  }

  formHtml += '<div class="field-row" style="margin-top: 16px;">';
  formHtml += '<button class="btn" onclick="updateTask(\'' + id + '\')">Uložit</button>';
  formHtml += '<button class="btn danger" onclick="deleteTaskConfirm(\'' + id + '\')">Smazat</button>';
  formHtml += '</div>';

  openSheet('<div class="sheet-title">Upravit</div>' + formHtml);

  // Initialize "for whom"
  let currentFor = 'both';
  if (t.assignedTo === myUid) currentFor = 'me';
  else if (t.assignedTo === partnerUid) currentFor = 'partner';
  setTimeout(() => {
    window._taskFor = currentFor;
    selectTaskFor(currentFor);
    // Initialize repeat selector
    if (t.type !== 'bill' && t.type !== 'shopping') {
      window._taskRepeat = t.repeat || 'none';
      selectRepeat(window._taskRepeat);
    }
  }, 50);
}

async function updateTask(id) {
  const t = (householdData.tasks || {})[id];
  if (!t) return;
  const title = document.getElementById('t-title').value.trim();
  if (!title) { showToast('Zadej název', true); return; }
  const updates = { title };

  if (t.type === 'bill') {
    const dd = parseInt(document.getElementById('t-dueDay').value, 10);
    const amt = parseFloat(document.getElementById('t-amount').value);
    updates.dueDay = dd || null;
    updates.amount = amt || null;
  } else if (t.type !== 'shopping') {
    const dueDate = document.getElementById('t-dueDate').value;
    updates.dueDate = dueDate || null;
  }
  const notes = (document.getElementById('t-notes') || {}).value;
  updates.notes = notes ? notes.trim() : null;

  // For whom
  const forWho = window._taskFor || 'both';
  updates.forWho = forWho;
  if (forWho === 'me') updates.assignedTo = currentUser.uid;
  else if (forWho === 'partner') updates.assignedTo = getPartnerUid();
  else updates.assignedTo = null;

  // Repeat (only for regular tasks)
  if (t.type !== 'bill' && t.type !== 'shopping') {
    const rep = window._taskRepeat || 'none';
    updates.repeat = rep === 'none' ? null : rep;
  }

  await fb.ref('households/' + userData.householdId + '/tasks/' + id).update(updates);
  closeSheet();
  showToast('Uloženo');
}

async function deleteTaskConfirm(id) {
  await fb.ref('households/' + userData.householdId + '/tasks/' + id).remove();
  closeSheet();
  showToast('Smazáno', true);
}

async function toggleTask(id) {
  const tasks = householdData.tasks || {};
  const t = tasks[id];
  if (!t) return;
  vibrate(10);
  const newDone = !t.done;
  await fb.ref('households/' + userData.householdId + '/tasks/' + id).update({ done: newDone, doneAt: newDone ? Date.now() : null });

  // If repeating task/bill and just marked done, create next occurrence
  if (newDone && t.repeat) {
    const nextData = createNextOccurrence(t);
    if (nextData) {
      await fb.ref('households/' + userData.householdId + '/tasks').push(nextData);
      // Show appropriate toast
      const repeatLabel = {
        daily: 'zítra znovu',
        weekly: 'za týden znovu',
        monthly: 'za měsíc znovu',
        yearly: 'za rok znovu'
      }[t.repeat] || 'znovu';
      showToast('Hotovo · ' + repeatLabel);
    } else {
      showToast(t.type === 'bill' ? 'Splaceno' : 'Hotovo');
    }
  } else if (newDone && t.type === 'bill' && t.dueDay) {
    // Bill without explicit repeat field but with dueDay → also recurring
    const nextData = createNextOccurrence(t);
    if (nextData) {
      await fb.ref('households/' + userData.householdId + '/tasks').push(nextData);
      showToast('Splaceno · za měsíc znovu');
    } else {
      showToast('Splaceno');
    }
  } else if (newDone) {
    showToast('Hotovo');
  }
}

// Create next occurrence of a recurring task
function createNextOccurrence(t) {
  // Skip if marking incomplete (un-done) — only create on completion
  // Build new task as a copy with shifted date
  const next = {
    title: t.title,
    type: t.type || 'task',
    done: false,
    createdAt: Date.now(),
    createdBy: t.createdBy || (currentUser ? currentUser.uid : null),
    repeat: t.repeat
  };

  // Copy optional fields
  if (t.notes) next.notes = t.notes;
  if (t.amount) next.amount = t.amount;
  if (t.assignedTo) next.assignedTo = t.assignedTo;
  if (t.forWho) next.forWho = t.forWho;

  // Compute next due date
  if (t.type === 'bill' && t.dueDay) {
    // For bills: just keep dueDay (it represents day of month, repeats monthly)
    next.dueDay = t.dueDay;
  } else if (t.dueDate) {
    // For tasks with explicit dueDate: shift it
    const d = new Date(t.dueDate);
    if (t.repeat === 'daily') d.setDate(d.getDate() + 1);
    else if (t.repeat === 'weekly') d.setDate(d.getDate() + 7);
    else if (t.repeat === 'monthly') d.setMonth(d.getMonth() + 1);
    else if (t.repeat === 'yearly') d.setFullYear(d.getFullYear() + 1);
    next.dueDate = dateKey(d);
  } else {
    // No explicit date: compute from today
    const d = new Date();
    if (t.repeat === 'daily') d.setDate(d.getDate() + 1);
    else if (t.repeat === 'weekly') d.setDate(d.getDate() + 7);
    else if (t.repeat === 'monthly') d.setMonth(d.getMonth() + 1);
    else if (t.repeat === 'yearly') d.setFullYear(d.getFullYear() + 1);
    next.dueDate = dateKey(d);
  }

  return next;
}

async function addTask(type) {
  const title = (document.getElementById('t-title') || {}).value;
  if (!title || !title.trim()) { showToast('Zadej název', true); return; }

  const data = {
    title: title.trim(),
    type: type,
    done: false,
    createdAt: Date.now(),
    createdBy: currentUser.uid,
    forWho: window._taskFor || 'both' // me | partner | both
  };

  // Convert 'me'/'partner' to actual UIDs
  if (data.forWho === 'me') data.assignedTo = currentUser.uid;
  else if (data.forWho === 'partner') data.assignedTo = getPartnerUid();
  // 'both' → no assignedTo, visible to both

  if (type === 'bill') {
    const dd = parseInt((document.getElementById('t-dueDay') || {}).value, 10);
    const amt = parseFloat((document.getElementById('t-amount') || {}).value);
    if (dd) data.dueDay = dd;
    if (amt) data.amount = amt;
    data.repeat = 'monthly';
  } else if (type === 'shopping') {
    const notes = (document.getElementById('t-notes') || {}).value;
    if (notes && notes.trim()) data.notes = notes.trim();
  } else {
    const dueDate = (document.getElementById('t-dueDate') || {}).value;
    const notes = (document.getElementById('t-notes') || {}).value;
    if (dueDate) data.dueDate = dueDate;
    if (notes && notes.trim()) data.notes = notes.trim();
    // Add repeat for regular tasks
    const rep = window._taskRepeat || 'none';
    if (rep !== 'none') data.repeat = rep;

  const ref = await fb.ref('households/' + userData.householdId + '/tasks').push(data);
  await logActivity('task_added', { title: data.title, type: data.type });
  closeSheet();
  showToast('Přidáno');

  if (data.dueDate) {
    setTimeout(() => {

  }
}

// Export task to iPhone Calendar
function exportTaskToICS(taskId) {
  const tasks = householdData.tasks || {};
  const t = tasks[taskId];
  if (!t) { showToast('Úkol nenalezen', true); return; }

  // Build "fake" event from task
  const fakeEvent = {
    title: (t.type === 'shopping' ? '🛒 ' : t.type === 'bill' ? '💰 ' : '✓ ') + t.title,
    start: t.dueDate ? (t.dueDate + 'T09:00:00') : new Date().toISOString(),
    allDay: true,
    notes: t.notes || ''
  };
  if (t.amount) fakeEvent.notes = (fakeEvent.notes ? fakeEvent.notes + '\n' : '') + 'Částka: ' + fmtMoney(t.amount);

  // Use the same ICS export logic with a synthesized event
  const dt = new Date(fakeEvent.start);
  const dtEnd = new Date(dt);
  dtEnd.setDate(dtEnd.getDate() + 1);

  function icsDate(d, allDay) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    if (allDay) return y + m + day;
    const h = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    return y + m + day + 'T' + h + min + '00';
  }

  function icsEscape(str) {
    if (!str) return '';
    return String(str).replace(/\\/g, '\\\\').replace(/,/g, '\\,').replace(/;/g, '\\;').replace(/\n/g, '\\n');
  }

  const uid = 'domov-task-' + taskId + '@domov.app';
  const dtStamp = icsDate(new Date(), false) + 'Z';

  let ics = 'BEGIN:VCALENDAR\r\n';
  ics += 'VERSION:2.0\r\n';
  ics += 'PRODID:-//Domov//CS\r\n';
  ics += 'CALSCALE:GREGORIAN\r\n';
  ics += 'METHOD:PUBLISH\r\n';
  ics += 'BEGIN:VEVENT\r\n';
  ics += 'UID:' + uid + '\r\n';
  ics += 'DTSTAMP:' + dtStamp + '\r\n';
  ics += 'DTSTART;VALUE=DATE:' + icsDate(dt, true) + '\r\n';
  ics += 'DTEND;VALUE=DATE:' + icsDate(dtEnd, true) + '\r\n';
  ics += 'SUMMARY:' + icsEscape(fakeEvent.title) + '\r\n';
  if (fakeEvent.notes) ics += 'DESCRIPTION:' + icsEscape(fakeEvent.notes) + '\r\n';
  ics += 'BEGIN:VALARM\r\n';
  ics += 'TRIGGER:-PT9H\r\n'; // 9h before midnight = 9am alert prev day? Better: morning of
  ics += 'ACTION:DISPLAY\r\n';
  ics += 'DESCRIPTION:Reminder\r\n';
  ics += 'END:VALARM\r\n';
  ics += 'END:VEVENT\r\n';
  ics += 'END:VCALENDAR\r\n';

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const filename = (t.title || 'ukol').replace(/[^a-zA-Z0-9_-]/g, '_').substring(0, 30) + '.ics';

  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 1000);

  closeSheet();
  vibrate(15);
  showToast('Otevírám kalendář...');
}

// CALENDAR / PLAN

let calendarView = 'week'; // 'week' or 'month'
let calendarOffset = 0; // 0 = current week/month, -1 = previous, +1 = next

// Expand recurring events into individual occurrences
// Returns array of events with start dates from -2 months to +12 months
function expandRecurringEvents(rawEvents, fromDate) {
  const result = [];
  const now = fromDate || new Date();
  const rangeStart = new Date(now); rangeStart.setMonth(rangeStart.getMonth() - 2);
  const rangeEnd = new Date(now); rangeEnd.setMonth(rangeEnd.getMonth() + 12);

  rawEvents.forEach(e => {
    if (!e.start) return;
    const baseStart = new Date(e.start);
    if (!e.repeat || e.repeat === 'none') {
      // Single occurrence
      result.push(e);
      return;
    }

    // Generate occurrences from baseStart forward to rangeEnd
    let occurrence = new Date(baseStart);
    let count = 0;
    const maxOccurrences = 200; // safety
    while (occurrence <= rangeEnd && count < maxOccurrences) {
      if (occurrence >= rangeStart) {
        // Clone event with new start time
        const occ = Object.assign({}, e, {
          start: occurrence.toISOString(),
          isRecurrence: count > 0,
          baseId: e.id
        });
        result.push(occ);
      }
      // Advance based on repeat type
      if (e.repeat === 'weekly') {
        occurrence.setDate(occurrence.getDate() + 7);
      } else if (e.repeat === 'monthly') {
        occurrence.setMonth(occurrence.getMonth() + 1);
      } else {
        break; // Unknown repeat type
      }
      count++;
    }
  });

  return result;
}

function renderCalendar() {
  const rawEvents = getList('events');
  const now = new Date();
  const selDate = calendarSelectedDate ? new Date(calendarSelectedDate) : new Date();
  const selKey = dateKey(selDate);
  const todayKey = dateKey(now);

  // Expand recurring events into individual occurrences
  // Show up to 6 months back and 12 months forward
  const events = expandRecurringEvents(rawEvents, now);

  // Compute event counts
  const eventCountByDay = {};
  events.forEach(e => {
    const k = dateKey(new Date(e.start));
    eventCountByDay[k] = (eventCountByDay[k] || 0) + 1;
  });

  // Day events for selected
  const dayEvents = events.filter(e => dateKey(new Date(e.start)) === selKey)
    .sort((a, b) => new Date(a.start) - new Date(b.start));

  const months = ['leden','únor','březen','duben','květen','červen','červenec','srpen','září','říjen','listopad','prosinec'];
  const monthsGen = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
  const dnames = ['neděle','pondělí','úterý','středa','čtvrtek','pátek','sobota'];

  let html = '<div class="app">';

  // Header with view switcher
  html += '<div class="page-header" style="padding-bottom: 8px;">';
  html += '<div class="page-title">Plán</div>';
  html += '<button class="btn-icon" onclick="toggleCalendarView()" title="Přepnout pohled">';

  }
  html += '</button>';
  html += '</div>';

  // Navigation bar (prev / month label / next / today)
  let navLabel;
  if (calendarView === 'week') {
    // Show week range
    const dow = (selDate.getDay() + 6) % 7;
    const monday = new Date(selDate); monday.setDate(selDate.getDate() - dow);
    const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
    if (monday.getMonth() === sunday.getMonth()) {
      navLabel = monday.getDate() + '. – ' + sunday.getDate() + '. ' + monthsGen[sunday.getMonth()];
    } else {
      navLabel = monday.getDate() + '. ' + monthsGen[monday.getMonth()] + ' – ' + sunday.getDate() + '. ' + monthsGen[sunday.getMonth()];
    }
  } else {
    navLabel = months[selDate.getMonth()] + ' ' + selDate.getFullYear();
  }

  html += '<div style="display: flex; align-items: center; gap: 8px; padding: 8px 24px 20px;">';

  html += '<div style="flex: 1; text-align: center; font-family: Fraunces, serif; font-size: 16px; color: var(--text); font-style: italic;">' + escapeHtml(navLabel) + '</div>';
  html += '<button class="btn-icon" onclick="calNav(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>';
  if (selKey !== todayKey) {
    html += '<button class="btn-icon" onclick="calToday()" title="Dnes" style="width: auto; padding: 0 12px;"><span style="font-family: Inter, sans-serif; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent);">DNES</span></button>';
  }
  html += '</div>';

  if (calendarView === 'week') {
    // ===== WEEK VIEW =====
    const dow = (selDate.getDay() + 6) % 7;
    const monday = new Date(selDate); monday.setDate(selDate.getDate() - dow);
    const weekDays = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday); d.setDate(monday.getDate() + i);
      weekDays.push(d);
    }

    html += '<div class="cal-week">';
    const dayNames = ['Po','Út','St','Čt','Pá','So','Ne'];
    weekDays.forEach((d, i) => {
      const k = dateKey(d);
      const isToday = k === todayKey;
      const isSelected = k === selKey;
      const cls = (isToday ? ' today' : '') + (isSelected ? ' selected' : '');
      const count = eventCountByDay[k] || 0;

      }
      html += '</button>';
    });

    });
    html += '</div>';

    // Days grid
    html += '<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 0 16px 16px;">';
    monthDays.forEach(d => {
      const k = dateKey(d);
      const isToday = k === todayKey;
      const isSelected = k === selKey;
      const isCurMonth = d.getMonth() === month;
      const count = eventCountByDay[k] || 0;
      let cellStyle = 'aspect-ratio: 1 / 1.2; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; font-family: Fraunces, serif; transition: all 0.2s; ';

async function addEvent() {

  const time = document.getElementById('e-time').value;
  const loc = document.getElementById('e-loc').value.trim();

  if (!title || !date) { showToast('Vyplň název a datum', true); return; }

  const start = new Date(date + 'T' + (time || '00:00') + ':00').toISOString();
  const forWho = window._eventFor || 'both';
  const repeat = window._eventRepeat || 'none';
  const data = {
    title,
    start,
    allDay: !time,
    createdAt: Date.now(),
    createdBy: currentUser.uid,
    forWho
  };
  if (loc) data.location = loc;
  if (notes) data.notes = notes;

// Export event to iPhone Calendar via .ics file
function exportEventToICS(id) {
  const events = householdData.events || {};
  const e = events[id];
  if (!e) { showToast('Termín nenalezen', true); return; }

  const dt = new Date(e.start);
  // For all-day events, end is next day
  // For timed events, default duration 1 hour
  const dtEnd = new Date(dt);
  if (e.allDay) {
    dtEnd.setDate(dtEnd.getDate() + 1);
  } else {
    dtEnd.setHours(dtEnd.getHours() + 1);
  }

  // Format dates in ICS format
  function icsDate(d, allDay) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    if (allDay) return y + m + day;
    const h = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    const s = '00';
    return y + m + day + 'T' + h + min + s;
  }

  // Escape ICS strings (commas, semicolons, newlines)
  function icsEscape(str) {
    if (!str) return '';
    return String(str).replace(/\\/g, '\\\\').replace(/,/g, '\\,').replace(/;/g, '\\;').replace(/\n/g, '\\n');
  }

  const uid = 'domov-' + id + '@domov.app';
  const now = new Date();
  const dtStamp = icsDate(now, false) + 'Z';

  let ics = 'BEGIN:VCALENDAR\r\n';
  ics += 'VERSION:2.0\r\n';
  ics += 'PRODID:-//Domov//CS\r\n';
  ics += 'CALSCALE:GREGORIAN\r\n';
  ics += 'METHOD:PUBLISH\r\n';
  ics += 'BEGIN:VEVENT\r\n';
  ics += 'UID:' + uid + '\r\n';
  ics += 'DTSTAMP:' + dtStamp + '\r\n';
  if (e.allDay) {
    ics += 'DTSTART;VALUE=DATE:' + icsDate(dt, true) + '\r\n';
    ics += 'DTEND;VALUE=DATE:' + icsDate(dtEnd, true) + '\r\n';
  } else {
    ics += 'DTSTART:' + icsDate(dt, false) + '\r\n';
    ics += 'DTEND:' + icsDate(dtEnd, false) + '\r\n';
  }
  ics += 'SUMMARY:' + icsEscape(e.title || 'Termín') + '\r\n';
  if (e.location) ics += 'LOCATION:' + icsEscape(e.location) + '\r\n';
  if (e.notes) ics += 'DESCRIPTION:' + icsEscape(e.notes) + '\r\n';
  // Recurrence rule
  if (e.repeat === 'weekly') {
    ics += 'RRULE:FREQ=WEEKLY\r\n';
  } else if (e.repeat === 'monthly') {
    ics += 'RRULE:FREQ=MONTHLY\r\n';
  }
  // Add 30-minute alert before event (default reminder)
  if (!e.allDay) {
    ics += 'BEGIN:VALARM\r\n';
    ics += 'TRIGGER:-PT30M\r\n';
    ics += 'ACTION:DISPLAY\r\n';
    ics += 'DESCRIPTION:Reminder\r\n';
    ics += 'END:VALARM\r\n';
  }
  ics += 'END:VEVENT\r\n';
  ics += 'END:VCALENDAR\r\n';

  // Create blob and trigger download/open
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);

  const filename = (e.title || 'termin').replace(/[^a-zA-Z0-9_-]/g, '_').substring(0, 30) + '.ics';

  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();

  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 1000);

  vibrate(15);
  showToast('Otevírám kalendář...');
}

  if (!title || !date) { showToast('Vyplň název a datum', true); return; }
  const start = new Date(date + 'T' + (time || '00:00') + ':00').toISOString();
