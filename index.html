<style>
/* ============================================================
   DOMOV — Martin Kováč style luxury app
   Espresso (dark) + Crème (light)
   ============================================================ */

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root, body, body.theme-espresso {
  --bg: #2A1810;
  --surface: #3D2817;
  --surface-2: #4A3220;
  --surface-3: #5C3F28;
  --text: #F5EFE0;
  --text-2: #C9B89A;
  --text-3: #8B7A5C;
  --accent: #D4A847;
  --accent-soft: #B8923A;
  --hairline: rgba(212, 168, 71, 0.18);
  --hairline-strong: rgba(212, 168, 71, 0.35);
  --positive: #7A8B5C;
  --warning: #D4A847;
  --danger: #C8553D;
  --nav-bg: rgba(42, 24, 16, 0.92);
}

body.theme-creme {
  --bg: #F5EFE0;
  --surface: #FFFFFF;
  --surface-2: #F0E8D4;
  --surface-3: #E8DEC4;
  --text: #2A1810;
  --text-2: #6B4F35;
  --text-3: #8B7A5C;
  --accent: #B8923A;
  --accent-soft: #9A7A2E;
  --hairline: rgba(184, 146, 58, 0.22);
  --hairline-strong: rgba(184, 146, 58, 0.4);
  --positive: #6B7A4D;
  --warning: #B8923A;
  --danger: #B5462E;
  --nav-bg: rgba(245, 239, 224, 0.85);
}

html, body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  transition: background 0.4s ease, color 0.4s ease;
}

body { padding-bottom: env(safe-area-inset-bottom, 0); }

h1, h2, h3, h4 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  letter-spacing: -0.5px;
  color: var(--text);
}

input, textarea, select, button { font-family: inherit; }

::-webkit-scrollbar { width: 0; display: none; }
* { scrollbar-width: none; }

.hidden { display: none !important; }

/* ============== APP ============== */
.app { padding-bottom: 100px; min-height: 100vh; }

/* ============== HEADER ============== */
.page-header {
  padding: env(safe-area-inset-top, 12px) 24px 12px;
  padding-top: max(env(safe-area-inset-top, 12px), 12px);
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 30;
  backdrop-filter: blur(10px);
}

.page-header.with-back { padding-bottom: 20px; }

.btn-back, .btn-icon {
  width: 40px;
  height: 40px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.15s, background 0.2s;
  flex-shrink: 0;
}

.btn-back:active, .btn-icon:active { transform: scale(0.94); }

.btn-back svg, .btn-icon svg {
  width: 18px;
  height: 18px;
  stroke: var(--text);
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.btn-icon svg { stroke: var(--text-2); }

.page-title {
  font-family: 'Fraunces', serif;
  font-size: 26px;
  font-weight: 400;
  letter-spacing: -0.5px;
  color: var(--text);
  flex: 1;
}

/* ============== HOME ============== */
.home-top { padding: 20px 24px 0; }

.home-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 4px;
}

.greeting-date {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--text-3);
  margin-bottom: 6px;
}

.greeting-text {
  font-family: 'Fraunces', serif;
  font-size: 32px;
  font-weight: 400;
  letter-spacing: -0.8px;
  line-height: 1.1;
  color: var(--text);
}

.greeting-text .name {
  color: var(--accent);
  font-style: italic;
}

.together {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--text-3);
  margin-top: 6px;
}

.together em {
  color: var(--text-2);
  font-style: italic;
}

/* Avatar with initial */
.avatar {
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--hairline-strong);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fraunces', serif;
  font-style: italic;
  color: var(--accent);
  flex-shrink: 0;
  cursor: pointer;
}

.avatar.size-sm { width: 28px; height: 28px; font-size: 13px; }
.avatar.size-md { width: 44px; height: 44px; font-size: 18px; }
.avatar.size-lg { width: 56px; height: 56px; font-size: 24px; }
.avatar.size-xl { width: 96px; height: 96px; font-size: 44px; }

/* ============== HAIRLINE ============== */
.hairline {
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--hairline-strong) 20%, var(--hairline) 50%, var(--hairline-strong) 80%, transparent 100%);
  margin: 28px 24px;
  border: none;
}

/* ============== SECTION ============== */
.section-label {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 4px;
  text-transform: uppercase;
  padding: 0 24px;
  margin-bottom: 14px;
  margin-top: 8px;
}

.section-content { padding: 0 24px; }

/* ============== ROWS (universal pattern) ============== */
.row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--hairline);
  cursor: pointer;
}

.row:last-child { border-bottom: none; }

.row-bullet {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

.row-time {
  font-family: 'Fraunces', serif;
  font-feature-settings: "tnum";
  font-size: 13px;
  color: var(--text-2);
  min-width: 50px;
}

.row-content { flex: 1; min-width: 0; }

.row-title {
  font-size: 15px;
  color: var(--text);
  letter-spacing: -0.2px;
  line-height: 1.4;
}

.row-title.done {
  color: var(--text-3);
  text-decoration: line-through;
  text-decoration-color: var(--text-3);
}

.row-meta {
  font-size: 12px;
  color: var(--text-3);
  font-family: 'Fraunces', serif;
  font-style: italic;
  margin-top: 2px;
}

.row-amount {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  color: var(--accent);
  font-weight: 500;
  flex-shrink: 0;
}

.row-arrow {
  font-family: 'Fraunces', serif;
  color: var(--text-3);
  font-size: 18px;
  flex-shrink: 0;
}

.row-empty {
  font-family: 'Fraunces', serif;
  font-style: italic;
  color: var(--text-3);
  font-size: 14px;
  padding: 12px 0;
}

/* ============== BIG NUMBER (mezi námi hero) ============== */
.big-number {
  font-family: 'Fraunces', serif;
  font-size: 48px;
  font-weight: 300;
  letter-spacing: -1.8px;
  line-height: 1;
  color: var(--accent);
  margin-bottom: 8px;
}

.big-number .currency {
  font-size: 22px;
  color: var(--text-3);
  margin-left: 6px;
  font-weight: 400;
}

.big-sub {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--text-2);
  margin-bottom: 14px;
}

.big-sub em {
  color: var(--text);
  font-style: italic;
}

.link {
  display: inline-block;
  font-size: 12px;
  color: var(--accent);
  border-bottom: 1px solid var(--hairline-strong);
  padding-bottom: 3px;
  cursor: pointer;
  letter-spacing: 0.3px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
}

.link:active { color: var(--accent-soft); }

/* ============== CARD ============== */
.card {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 16px;
  padding: 18px;
  margin: 0 24px 12px;
  transition: border-color 0.2s, transform 0.15s;
}

.card.clickable { cursor: pointer; }
.card.clickable:active { transform: scale(0.99); border-color: var(--hairline-strong); }

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}

.card-title {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.3px;
}

.card-meta {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 12px;
  color: var(--text-3);
}

.chip {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(212, 168, 71, 0.12);
  color: var(--accent);
  font-family: 'Inter', sans-serif;
}

.chip.muted { background: var(--surface-2); color: var(--text-3); }

/* ============== SWIPEABLE ROWS ============== */
.swipe-wrapper {
  position: relative;
  overflow: hidden;
  margin: 0 24px;
  border-bottom: 1px solid var(--hairline);
}

.swipe-wrapper:last-child { border-bottom: none; }

.swipe-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  pointer-events: none;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.5px;
}

.swipe-bg.right {
  background: linear-gradient(90deg, transparent 0%, var(--accent) 100%);
  justify-content: flex-end;
  padding-right: 24px;
  color: var(--bg);
}

.swipe-bg.left {
  background: linear-gradient(270deg, transparent 0%, var(--danger) 100%);
  justify-content: flex-start;
  padding-left: 24px;
  color: white;
}

.swipe-bg svg { width: 16px; height: 16px; margin: 0 6px; stroke: currentColor; fill: none; stroke-width: 2; }

.swipeable {
  background: var(--bg);
  position: relative;
  z-index: 1;
  transition: transform 0.05s ease;
  touch-action: pan-y;
  padding: 14px 0;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
}

.swipeable.dragging { transition: none; }
.swipeable.completing { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s; }

/* Checkbox circle */
.check-circle {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--text-3);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  background: transparent;
}

.check-circle.done {
  background: var(--accent);
  border-color: var(--accent);
}

.check-circle svg {
  width: 12px;
  height: 12px;
  stroke: var(--bg);
  stroke-width: 3;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  opacity: 0;
  transition: opacity 0.2s;
}

.check-circle.done svg { opacity: 1; }

/* Type icon for tasks (small SVG outline) */
.type-icon {
  width: 16px;
  height: 16px;
  color: var(--text-3);
  opacity: 0.7;
  flex-shrink: 0;
}

.type-icon svg { width: 100%; height: 100%; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

/* ============== TABS ============== */
.tabs {
  display: flex;
  padding: 0 24px;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--hairline);
}

.tab {
  flex: 1;
  text-align: center;
  padding: 14px 0;
  color: var(--text-3);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.2s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* Filter chips */
.chips {
  display: flex;
  gap: 8px;
  padding: 0 24px 20px;
  overflow-x: auto;
}

.chip-filter {
  padding: 8px 16px;
  border-radius: 999px;
  background: transparent;
  border: 1px solid var(--hairline-strong);
  color: var(--text-2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
}

.chip-filter.active {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

/* ============== BUTTONS ============== */
.btn {
  font-family: 'Inter', sans-serif;
  border: none;
  border-radius: 14px;
  padding: 14px 22px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  background: var(--accent);
  color: var(--bg);
  letter-spacing: 0.2px;
  transition: transform 0.15s;
  width: 100%;
}

.btn:active { transform: scale(0.98); }

.btn.secondary {
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--hairline-strong);
}

.btn.danger {
  background: transparent;
  color: var(--danger);
  border: 1px solid rgba(200, 85, 61, 0.3);
}

.btn-text {
  background: none;
  border: none;
  color: var(--text-3);
  font-size: 12px;
  cursor: pointer;
  padding: 4px 8px;
  text-decoration: underline;
  text-decoration-color: var(--hairline);
  text-underline-offset: 3px;
  font-family: 'Inter', sans-serif;
}

.btn-text:active { color: var(--accent); }

/* ============== INPUTS ============== */
input, textarea, select {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--hairline-strong);
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 14px;
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
  font-family: 'Inter', sans-serif;
}

body.theme-creme input,
body.theme-creme textarea,
body.theme-creme select {
  background: var(--surface);
}

input:focus, textarea:focus, select:focus { border-color: var(--accent); }

input::placeholder, textarea::placeholder {
  color: var(--text-3);
  font-family: 'Fraunces', serif;
  font-style: italic;
}

input[type="date"], input[type="time"], input[type="number"] { color-scheme: dark; }
body.theme-creme input[type="date"],
body.theme-creme input[type="time"],
body.theme-creme input[type="number"] { color-scheme: light; }

textarea { resize: vertical; min-height: 80px; }

label, .field-label {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 6px;
  display: block;
}

.field { margin-bottom: 12px; }

.field-row { display: flex; gap: 8px; }
.field-row > * { flex: 1; }

/* ============== FAB ============== */
.fab {
  position: fixed;
  bottom: 96px;
  right: 24px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  cursor: pointer;
  z-index: 50;
  box-shadow:
    0 1px 2px rgba(0, 0, 0, 0.1),
    0 8px 24px rgba(212, 168, 71, 0.3),
    0 24px 48px rgba(212, 168, 71, 0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.fab:active { transform: scale(0.92); }

.fab svg {
  width: 22px;
  height: 22px;
  stroke: var(--bg);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ============== BOTTOM NAV ============== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: var(--nav-bg);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  border-top: 1px solid var(--hairline);
  display: flex;
  justify-content: space-around;
  align-items: flex-start;
  padding-top: 12px;
  padding-bottom: env(safe-area-inset-bottom, 0);
  z-index: 40;
  transition: background 0.4s;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--text-3);
  cursor: pointer;
  padding: 6px 8px;
  background: none;
  border: none;
  flex: 1;
  transition: color 0.2s;
}

.nav-item.active { color: var(--accent); }

.nav-item svg {
  width: 22px;
  height: 22px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.nav-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.5px;
  font-family: 'Inter', sans-serif;
}

/* ============== TOAST ============== */
.toast {
  position: fixed;
  bottom: 180px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent);
  color: var(--bg);
  padding: 14px 22px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 200;
  box-shadow: 0 8px 32px rgba(212, 168, 71, 0.35);
  white-space: nowrap;
  max-width: 90%;
  font-family: 'Inter', sans-serif;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.danger {
  background: var(--danger);
  color: white;
  box-shadow: 0 8px 32px rgba(200, 85, 61, 0.4);
}

/* ============== MODAL / SHEET ============== */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.sheet-backdrop.show { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-radius: 28px 28px 0 0;
  padding: 12px 24px 32px;
  z-index: 110;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  max-height: 92vh;
  overflow-y: auto;
  padding-bottom: max(32px, env(safe-area-inset-bottom, 32px));
}

.sheet.show { transform: translateY(0); }

.sheet-handle {
  width: 36px;
  height: 4px;
  background: var(--surface-3);
  border-radius: 2px;
  margin: 0 auto 16px;
}

.sheet-title {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.4px;
  color: var(--text);
  text-align: center;
  margin-bottom: 8px;
}

.sheet-subtitle {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--text-3);
  text-align: center;
  margin-bottom: 24px;
}

.sheet-action {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px;
  background: var(--bg);
  border: 1px solid var(--hairline);
  border-radius: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: transform 0.15s;
  width: 100%;
  text-align: left;
}

<script>
// Firebase compat shim
window.fb = {
  init: (config) => firebase.initializeApp(config),
  auth: () => firebase.auth(),

<script>
// ============================================================
// CONFIG & STATE
// ============================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCufsar6Lpump_qaq9w9G68jzP1xisuass",
  authDomain: "domacnost-5ecc8.firebaseapp.com",
  databaseURL: "https://domacnost-5ecc8-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "domacnost-5ecc8",
  storageBucket: "domacnost-5ecc8.firebasestorage.app",
  messagingSenderId: "615390227950",
  appId: "1:615390227950:web:ec30ad213c196137c2f2ff"
};

let currentUser = null;
let userData = null;
let householdData = {};
let currentScreen = 'home';
let currentFilter = 'all';
let currentTab = 'mezi'; // for Finance: mezi | ucty | moje
let calendarSelectedDate = null;
let detailContext = null; // { type: 'pet'|'ucet', id }

// ============================================================
// INIT FIREBASE
// ============================================================
window.addEventListener('load', () => {
  try {
    fb.init(FIREBASE_CONFIG);
    fb.auth().onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        loadUserData();
      } else {
        currentUser = null;
        userData = null;
        showScreen('login');
      }
    });
  } catch (e) {
    alert('Chyba Firebase: ' + e.message);
    showScreen('login');
  }

  // Online/offline detection
  window.addEventListener('online', () => document.getElementById('conn-status').classList.add('hidden'));
  window.addEventListener('offline', () => document.getElementById('conn-status').classList.remove('hidden'));
});

function showScreen(name) {
  ['login-screen', 'household-screen', 'main-app'].forEach(s => {
    document.getElementById(s).classList.add('hidden');
  });
  if (name === 'login') document.getElementById('login-screen').classList.remove('hidden');
  else if (name === 'household') document.getElementById('household-screen').classList.remove('hidden');
  else if (name === 'main') document.getElementById('main-app').classList.remove('hidden');
}

// ============================================================
// AUTH
// ============================================================
function switchAuthTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('login-panel').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-panel').classList.toggle('hidden', tab !== 'register');
  document.getElementById('login-error').textContent = '';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Vyplň email a heslo'; return; }
  try {
    await fb.auth().signInWithEmailAndPassword(email, pass);
  } catch (e) {
    err.textContent = translateAuthErr(e.code);
  }
}

async function doRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-password').value;
  const pass2 = document.getElementById('reg-password2').value;
  const err = document.getElementById('login-error');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Vyplň email a heslo'; return; }
  if (pass.length < 6) { err.textContent = 'Heslo musí mít alespoň 6 znaků'; return; }
  if (pass !== pass2) { err.textContent = 'Hesla se neshodují'; return; }
  try {
    await fb.auth().createUserWithEmailAndPassword(email, pass);
  } catch (e) {
    err.textContent = translateAuthErr(e.code);
  }
}

async function resetPassword() {
  const email = document.getElementById('login-email').value.trim();
  const err = document.getElementById('login-error');
  if (!email) { err.textContent = 'Zadej email pro reset'; return; }
  try {
    await fb.auth().sendPasswordResetEmail(email);
    err.textContent = 'Odkaz na reset hesla byl odeslán';
    err.style.color = 'var(--accent)';
    setTimeout(() => { err.style.color = ''; err.textContent = ''; }, 4000);
  } catch (e) {
    err.textContent = translateAuthErr(e.code);
  }
}

function translateAuthErr(code) {
  const map = {
    'auth/invalid-email': 'Neplatný email',
    'auth/user-not-found': 'Uživatel neexistuje',
    'auth/wrong-password': 'Špatné heslo',
    'auth/invalid-credential': 'Špatný email nebo heslo',
    'auth/email-already-in-use': 'Tento email je už zaregistrovaný',
    'auth/weak-password': 'Slabé heslo (min. 6 znaků)',
    'auth/network-request-failed': 'Chyba připojení k internetu',
    'auth/too-many-requests': 'Příliš mnoho pokusů, zkus později'
  };
  return map[code] || 'Chyba: ' + code;
}

async function logout() {
  try { await fb.auth().signOut(); } catch (e) {}
}

// ============================================================
// USER DATA & HOUSEHOLD
// ============================================================
async function loadUserData() {
  try {
    const snap = await fb.ref('users/' + currentUser.uid).once('value');
    userData = snap.val();
    if (!userData || !userData.householdId) {
      showScreen('household');
    } else {
      subscribeToHousehold();
      showScreen('main');
      renderScreen();
    }
  } catch (e) {
    console.error('loadUserData error', e);
    showScreen('household');
  }
}

function subscribeToHousehold() {
  if (!userData || !userData.householdId) return;
  fb.ref('households/' + userData.householdId).on('value', snap => {
    householdData = snap.val() || {};
    if (currentScreen) renderScreen();
  });
}

function generateHouseholdCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
  return code;
}

async function createHousehold() {
  const name = document.getElementById('new-name').value.trim();
  const err = document.getElementById('household-error');
  err.textContent = '';
  if (!name) { err.textContent = 'Zadej své jméno'; return; }

  const code = generateHouseholdCode();
  const householdId = 'h_' + code;
  try {
    await fb.ref('households/' + householdId).set({
      createdAt: Date.now(),
      members: { [currentUser.uid]: name },
      profiles: {},
      tasks: {},
      events: {},
      txns: {},
      ucets: {},
      mineExpenses: {},
      pets: {},
      config: { rentEnabled: false, rentAmount: 10000 }
    });
    await fb.ref('users/' + currentUser.uid).set({
      householdId,
      name,
      email: currentUser.email
    });
    userData = { householdId, name, email: currentUser.email };
    subscribeToHousehold();
    showScreen('main');
    renderScreen();
  } catch (e) {
    err.textContent = 'Chyba: ' + e.message;
  }
}

async function joinHousehold() {
  const name = document.getElementById('join-name').value.trim();
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const err = document.getElementById('household-error');
  err.textContent = '';
  if (!name || !code) { err.textContent = 'Vyplň jméno i kód'; return; }
  const householdId = 'h_' + code;
  try {
    const snap = await fb.ref('households/' + householdId).once('value');
    if (!snap.exists()) { err.textContent = 'Domácnost s tímto kódem neexistuje'; return; }
    await fb.ref('households/' + householdId + '/members/' + currentUser.uid).set(name);
    await fb.ref('users/' + currentUser.uid).set({
      householdId,
      name,
      email: currentUser.email
    });
    userData = { householdId, name, email: currentUser.email };
    subscribeToHousehold();
    showScreen('main');
    renderScreen();
  } catch (e) {
    err.textContent = 'Chyba: ' + e.message;
  }
}

// ============================================================
// HELPERS
// ============================================================
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function getList(name) {
  const v = householdData[name];
  if (!v) return [];
  return Object.keys(v).map(k => ({ id: k, ...v[k] }));
}

function getMembers() { return householdData.members || {}; }

function getMyName() {
  if (!currentUser) return '';
  return getMembers()[currentUser.uid] || (userData && userData.name) || '';
}

function getPartnerUid() {
  const m = getMembers();
  return Object.keys(m).find(u => u !== currentUser.uid);
}

function getPartnerName() {
  const uid = getPartnerUid();
  return uid ? getMembers()[uid] : '';
}

function getInitial(name) {
  if (!name) return '·';
  return String(name).trim().charAt(0).toUpperCase() || '·';
}

function getMyTheme() {
  if (!currentUser) return 'espresso';
  const profiles = householdData.profiles || {};
  return (profiles[currentUser.uid] && profiles[currentUser.uid].theme) || 'espresso';
}

function applyTheme() {
  const theme = getMyTheme();
  document.body.classList.remove('theme-espresso', 'theme-creme');
  document.body.classList.add('theme-' + theme);
}

async function setMyTheme(theme) {
  if (!currentUser || !userData || !userData.householdId) return;
  await fb.ref('households/' + userData.householdId + '/profiles/' + currentUser.uid).update({ theme });
  applyTheme();
  vibrate(10);
}

function fmtMoney(n) {
  if (n === null || n === undefined || isNaN(n)) return '0 Kč';
  return Math.round(n).toLocaleString('cs-CZ').replace(/,/g, ' ') + ' Kč';
}

function fmtNumOnly(n) {
  if (n === null || n === undefined || isNaN(n)) return '0';
  return Math.round(n).toLocaleString('cs-CZ').replace(/,/g, ' ');
}

function dateKey(d) {
  if (!d) return '';
  if (typeof d === 'string') d = new Date(d);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function formatDateCZ(d) {
  if (!d) return '';
  if (typeof d === 'string') d = new Date(d);
  const months = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
  return d.getDate() + '. ' + months[d.getMonth()];
}

function formatTimeCZ(d) {
  if (!d) return '';
  if (typeof d === 'string') d = new Date(d);
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

function vibrate(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) {}
}

function showToast(msg, danger) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('danger', !!danger);
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ============================================================
// SHEET
// ============================================================
function openSheet(html) {
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = '<div class="sheet-handle"></div>' + html;
  document.getElementById('sheet-backdrop').classList.add('show');
  sheet.classList.add('show');
  vibrate(8);
}

function closeSheet() {
  document.getElementById('sheet-backdrop').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}

// ============================================================
// NAVIGATION
// ============================================================
function navTo(screen) {
  vibrate(8);
  currentScreen = screen;
  currentFilter = 'all';
  detailContext = null;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navItem = document.querySelector('.nav-item[data-target="' + screen + '"]');
  if (navItem) navItem.classList.add('active');
  renderScreen();
  window.scrollTo(0, 0);
}

function goDetail(type, id) {
  detailContext = { type, id };
  currentScreen = type + '-detail';
  renderScreen();
  window.scrollTo(0, 0);
}

function goBack() {
  detailContext = null;
  if (currentScreen.endsWith('-detail')) {
    const base = currentScreen.replace('-detail', '');
    if (base === 'pet') currentScreen = 'more';
    else if (base === 'ucet') currentScreen = 'finance';
    else currentScreen = 'home';
  } else {
    currentScreen = 'home';
  }
  renderScreen();
  window.scrollTo(0, 0);
}

// ============================================================
// MAIN RENDER DISPATCHER
// ============================================================
function renderScreen() {
  applyTheme();
  const container = document.getElementById('screen-container');
  let html = '';
  switch (currentScreen) {
    case 'home': html = renderHome(); break;
    case 'tasks': html = renderTasks(); break;
    case 'calendar': html = renderCalendar(); break;
    case 'finance': html = renderFinance(); break;
    case 'more': html = renderMore(); break;
    case 'pet-detail': html = renderPetDetail(); break;
    case 'ucet-detail': html = renderUcetDetail(); break;
    default: html = renderHome();
  }
  container.innerHTML = '<div class="screen">' + html + '</div>';

  // Attach swipe handlers and reset FAB after render
  setTimeout(() => {
    attachSwipeHandlers();
    const fab = document.getElementById('fab');
    if (fab) fab.onclick = onFabClick;
  }, 50);
}

// ============================================================
// HOME / DNES
// ============================================================
function renderHome() {
  const myName = getMyName();
  const partnerName = getPartnerName();
  const myInitial = getInitial(myName);
  const now = new Date();

  const days = ['neděle','pondělí','úterý','středa','čtvrtek','pátek','sobota'];
  const dateStr = days[now.getDay()] + ' ' + formatDateCZ(now);

  const hour = now.getHours();
  let greeting = 'Dobré ráno';
  if (hour >= 11 && hour < 17) greeting = 'Dobré odpoledne';
  else if (hour >= 17 && hour < 22) greeting = 'Dobrý večer';
  else if (hour >= 22 || hour < 5) greeting = 'Dobrou noc';

  // Today items
  const todayKey = dateKey(now);
  const tasks = getList('tasks');
  const events = getList('events');

  const todayTasks = tasks.filter(t => !t.done && t.dueDate === todayKey);
  const todayEvents = events.filter(e => {
    const d = new Date(e.start);
    return dateKey(d) === todayKey;
  });

  // Bills due this month — find those with dueDay between today and end of month
  const dayOfMonth = now.getDate();
  const billsDueSoon = tasks.filter(t => !t.done && t.type === 'bill' && t.dueDay && t.dueDay >= dayOfMonth && t.dueDay <= dayOfMonth + 14);

  // Compute "Mezi námi" balance
  const led = computeLedger();
  let mezitext, mezisub, mezicls = 'accent';
  if (Math.abs(led.myCredit) < 1) {
    mezitext = '0';
    mezisub = '<em>vyrovnáno</em> · žádné dluhy';
  } else if (led.myCredit < 0) {
    mezitext = fmtNumOnly(Math.abs(led.myCredit));
    mezisub = 'dlužíš <em>' + escapeHtml(partnerName || 'partnerovi') + '</em>';
  } else {
    mezitext = fmtNumOnly(led.myCredit);
    mezisub = '<em>' + escapeHtml(partnerName || 'partner') + '</em> dluží tobě';
  }

  // Week ahead
  const weekKeys = [];
  for (let i = 1; i <= 7; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() + i);
    weekKeys.push(dateKey(d));
  }
  const weekTasks = tasks.filter(t => !t.done && t.dueDate && weekKeys.includes(t.dueDate));
  const weekEvents = events.filter(e => weekKeys.includes(dateKey(new Date(e.start))));
  const weekBills = tasks.filter(t => !t.done && t.type === 'bill' && t.dueDay && t.dueDay >= dayOfMonth + 1 && t.dueDay <= dayOfMonth + 7);

  // Open ucty (otevřené účty)
  const ucty = getList('ucets').filter(u => !u.closed);

  // Build HTML
  let html = '<div class="app">';

  // Top
  html += '<div class="home-top">';
  html += '<div class="greeting-date">' + escapeHtml(dateStr) + '</div>';
  html += '<div class="home-row">';
  html += '<button class="avatar size-lg" onclick="navTo(\'more\')">' + escapeHtml(myInitial) + '</button>';
  html += '<div style="flex: 1; min-width: 0;">';
  html += '<div class="greeting-text">' + escapeHtml(greeting) + ',<br><span class="name">' + escapeHtml(myName) + '</span></div>';
  if (partnerName) {
    html += '<div class="together">spolu s <em>' + escapeHtml(partnerName) + '</em></div>';
  }
  html += '</div>';
  html += '</div>';
  html += '</div>';

  // Hairline
  html += '<hr class="hairline">';

  // DNES
  html += '<div class="section-label">D N E S</div>';
  html += '<div class="section-content">';
  if (todayTasks.length === 0 && todayEvents.length === 0) {
    html += '<div class="row-empty">volný den</div>';
  } else {
    todayEvents.sort((a,b) => new Date(a.start) - new Date(b.start));
    todayEvents.forEach(e => {
      const time = e.allDay ? '' : formatTimeCZ(new Date(e.start));
      html += '<div class="row" onclick="navTo(\'calendar\')">';
      html += '<div class="row-bullet"></div>';
      if (time) html += '<div class="row-time">' + escapeHtml(time) + '</div>';
      html += '<div class="row-content"><div class="row-title">' + escapeHtml(e.title || 'Termín') + '</div>';
      if (e.location) html += '<div class="row-meta">' + escapeHtml(e.location) + '</div>';
      html += '</div>';
      html += '</div>';
    });
    todayTasks.forEach(t => {
      html += '<div class="row" onclick="navTo(\'tasks\')">';
      html += '<div class="row-bullet"></div>';
      html += '<div class="row-content"><div class="row-title">' + escapeHtml(t.title) + '</div>';
      if (t.notes) html += '<div class="row-meta">' + escapeHtml(t.notes) + '</div>';
      html += '</div>';
      if (t.amount) html += '<div class="row-amount">' + fmtMoney(t.amount) + '</div>';
      html += '</div>';
    });
  }
  html += '</div>';

  // Hairline
  html += '<hr class="hairline">';

  // MEZI NAMI
  html += '<div class="section-label">M E Z I &nbsp; N Á M I</div>';
  html += '<div class="section-content" onclick="navTo(\'finance\')" style="cursor: pointer;">';
  html += '<div class="big-number">' + mezitext + '<span class="currency">Kč</span></div>';
  html += '<div class="big-sub">' + mezisub + '</div>';
  html += '<span class="link">Zobrazit detail →</span>';
  html += '</div>';

  // Hairline
  html += '<hr class="hairline">';

  // TYDEN
  if (weekTasks.length > 0 || weekEvents.length > 0 || weekBills.length > 0) {
    html += '<div class="section-label">T Ý D E N</div>';
    html += '<div class="section-content">';

    // Combine and sort by date
    const weekItems = [];
    weekEvents.forEach(e => {
      const d = new Date(e.start);
      weekItems.push({
        date: d,
        sortKey: d.getTime(),
        type: 'event',
        title: e.title || 'Termín',
        meta: e.allDay ? '' : formatTimeCZ(d)
      });
    });
    weekTasks.forEach(t => {
      const d = new Date(t.dueDate);
      weekItems.push({
        date: d,
        sortKey: d.getTime(),
        type: 'task',
        title: t.title,
        meta: '',
        amount: t.amount
      });
    });
    weekBills.forEach(b => {
      const d = new Date(now.getFullYear(), now.getMonth(), b.dueDay);
      weekItems.push({
        date: d,
        sortKey: d.getTime(),
        type: 'bill',
        title: b.title,
        meta: 'splatnost',
        amount: b.amount
      });
    });
    weekItems.sort((a,b) => a.sortKey - b.sortKey);

    weekItems.slice(0, 6).forEach(it => {
      const dayName = days[it.date.getDay()].substring(0, 2);
      const dayNum = it.date.getDate();
      html += '<div class="row" onclick="navTo(\'' + (it.type === 'event' ? 'calendar' : 'tasks') + '\')">';
      html += '<div class="row-time">' + dayName + ' ' + dayNum + '.</div>';
      html += '<div class="row-content"><div class="row-title">' + escapeHtml(it.title) + '</div>';
      if (it.meta) html += '<div class="row-meta">' + escapeHtml(it.meta) + '</div>';
      html += '</div>';
      if (it.amount) html += '<div class="row-amount">' + fmtMoney(it.amount) + '</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '<hr class="hairline">';
  }

  // OTEVŘENÉ ÚČTY
  if (ucty.length > 0) {
    html += '<div class="section-label">O T E V Ř E N É &nbsp; Ú Č T Y</div>';
    ucty.forEach(u => {
      const myDebt = computeUcetDebtFor(u, currentUser.uid);
      html += '<div class="ucet" onclick="goDetail(\'ucet\', \'' + u.id + '\')">';
      html += '<div class="ucet-head">';
      html += '<div class="ucet-name">' + escapeHtml(u.name) + '</div>';
      html += '<span class="chip">otevřen</span>';
      html += '</div>';
      const peopleCount = (u.people || []).length;
      const peopleStr = peopleCount + ' ' + (peopleCount === 1 ? 'osoba' : peopleCount < 5 ? 'lidi' : 'lidí');
      html += '<div class="ucet-meta">' + peopleStr + '</div>';
      const total = computeUcetTotal(u);
      html += '<div class="ucet-stats">';
      html += '<div><div class="ucet-stat-label">Utraceno</div><div class="ucet-stat-value">' + fmtMoney(total) + '</div></div>';
      if (Math.abs(myDebt) > 1) {
        html += '<div><div class="ucet-stat-label">' + (myDebt > 0 ? 'Tobě dluží' : 'Dlužíš') + '</div><div class="ucet-stat-value accent">' + fmtMoney(Math.abs(myDebt)) + '</div></div>';
      } else {
        html += '<div><div class="ucet-stat-label">Tvůj stav</div><div class="ucet-stat-value">vyrovnáno</div></div>';
      }
      html += '</div>';
      html += '</div>';
    });
    html += '<hr class="hairline">';
  }

  // Padding bottom
  html += '<div style="padding: 32px 24px; text-align: center;">';
  html += '<div style="font-family: Fraunces, serif; font-style: italic; color: var(--text-3); font-size: 12px;">Domov · ' + escapeHtml(myName);
  if (partnerName) html += ' & ' + escapeHtml(partnerName);
  html += '</div>';
  html += '</div>';

  html += '</div>';
  return html;
}


// ============================================================
// TASKS
// ============================================================
function renderTasks() {
  const tasks = getList('tasks');
  const todayKey = dateKey(new Date());

  let filtered = tasks;
  if (currentFilter === 'today') filtered = tasks.filter(t => !t.done && (t.dueDate === todayKey || (t.type === 'bill' && t.dueDay === new Date().getDate())));
  else if (currentFilter === 'shopping') filtered = tasks.filter(t => t.type === 'shopping');
  else if (currentFilter === 'bill') filtered = tasks.filter(t => t.type === 'bill');
  else if (currentFilter === 'task') filtered = tasks.filter(t => t.type === 'task' || !t.type);
  else if (currentFilter === 'repeat') filtered = tasks.filter(t => t.repeat || t.type === 'bill');

  const active = filtered.filter(t => !t.done).sort((a,b) => {
    if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
    if (a.dueDate) return -1;
    if (b.dueDate) return 1;
    return (b.createdAt || 0) - (a.createdAt || 0);
  });
  const done = filtered.filter(t => t.done).sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));

  let html = '<div class="app">';

  // Header
  html += '<div class="page-header">';
  html += '<div class="page-title">Úkoly</div>';
  html += '</div>';

  // Filter chips
  html += '<div class="chips">';
  html += chipFilter('all', 'Vše');
  html += chipFilter('today', 'Dnes');
  html += chipFilter('task', 'Úkoly');
  html += chipFilter('shopping', 'Nákupy');
  html += chipFilter('bill', 'Splatnosti');
  html += chipFilter('repeat', 'Opakované');
  html += '</div>';

  // Active list
  if (active.length === 0 && done.length === 0) {
    html += '<div class="empty">Žádné úkoly. Přidej tlačítkem +</div>';
  } else if (active.length === 0) {
    html += '<div class="empty">Vše je hotovo ✓</div>';
  } else {
    active.forEach(t => html += taskRow(t));
  }

  // Done section (collapsible)
  if (done.length > 0) {
    html += '<div style="margin-top: 32px;"></div>';
    html += '<details>';
    html += '<summary style="cursor: pointer; padding: 0 24px; list-style: none;"><div class="section-label" style="padding: 0; cursor: pointer;">H O T O V O &nbsp;(' + done.length + ')</div></summary>';
    done.slice(0, 30).forEach(t => html += taskRow(t));
    html += '</details>';
  }

  html += '</div>';
  return html;
}

function chipFilter(id, label) {
  const active = currentFilter === id ? ' active' : '';
  return '<button class="chip-filter' + active + '" onclick="setFilter(\'' + id + '\')">' + escapeHtml(label) + '</button>';
}

function setFilter(f) {
  currentFilter = f;
  vibrate(8);
  renderScreen();
}

function taskRow(t) {
  const typeIcon = getTypeIconSVG(t.type);
  const doneClass = t.done ? ' done' : '';

  let metaHtml = '';
  if (t.type === 'bill') {
    metaHtml = 'splatnost ' + (t.dueDay || '') + '. v měsíci';
    if (t.repeat) metaHtml += ' · opakuje se';
  } else if (t.type === 'shopping') {
    metaHtml = 'nákupní seznam';
  } else if (t.dueDate) {
    const d = new Date(t.dueDate);
    metaHtml = formatDateCZ(d);
    if (t.repeat) metaHtml += ' · opakuje se';
  } else if (t.repeat) {
    metaHtml = 'opakuje se';
  }
  if (t.notes) metaHtml = (metaHtml ? metaHtml + ' · ' : '') + t.notes;

  let html = '<div class="swipe-wrapper">';
  html += '<div class="swipe-bg right"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Hotovo</div>';
  html += '<div class="swipe-bg left"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Smazat</div>';
  html += '<div class="swipeable" data-id="' + t.id + '" data-name="' + escapeHtml(t.title) + '" onclick="editTask(\'' + t.id + '\')">';
  html += '<div class="check-circle' + (t.done ? ' done' : '') + '" onclick="event.stopPropagation(); toggleTask(\'' + t.id + '\')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>';
  if (typeIcon) html += '<div class="type-icon">' + typeIcon + '</div>';
  html += '<div class="row-content">';
  html += '<div class="row-title' + doneClass + '">' + escapeHtml(t.title) + '</div>';
  if (metaHtml) html += '<div class="row-meta">' + escapeHtml(metaHtml) + '</div>';
  html += '</div>';
  if (t.amount) html += '<div class="row-amount">' + fmtMoney(t.amount) + '</div>';
  html += '</div>';
  html += '</div>';
  return html;

// CALENDAR / PLAN

function renderCalendar() {
  const events = getList('events');
  const now = new Date();
  const selDate = calendarSelectedDate ? new Date(calendarSelectedDate) : new Date();
  const selKey = dateKey(selDate);

  // Find Monday of selected week
  const weekDays = [];
  const dow = (selDate.getDay() + 6) % 7; // 0=Mon
  const monday = new Date(selDate);
  monday.setDate(selDate.getDate() - dow);
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    weekDays.push(d);
  }

  // Day events for selected
  const dayEvents = events.filter(e => dateKey(new Date(e.start)) === selKey)
    .sort((a, b) => new Date(a.start) - new Date(b.start));

  // Week stats
  const eventCountByDay = {};
  events.forEach(e => {
    const k = dateKey(new Date(e.start));
    eventCountByDay[k] = (eventCountByDay[k] || 0) + 1;
  });

  let html = '<div class="app">';
  html += '<div class="page-header"><div class="page-title">Plán</div></div>';

  // Week label
  const months = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
  html += '<div class="section-label" style="margin-top: 0;">' + escapeHtml(months[selDate.getMonth()].toUpperCase().split('').join(' ')) + '</div>';

  // Week strip
  html += '<div class="cal-week">';
  const dayNames = ['Po','Út','St','Čt','Pá','So','Ne'];
  weekDays.forEach((d, i) => {
    const k = dateKey(d);
    const isToday = k === dateKey(now);
    const isSelected = k === selKey;
    const cls = (isToday ? ' today' : '') + (isSelected ? ' selected' : '');
    const count = eventCountByDay[k] || 0;
    html += '<button class="cal-day' + cls + '" onclick="selectCalDay(\'' + k + '\')">';
    html += '<div class="cal-day-name">' + dayNames[i] + '</div>';
    html += '<div class="cal-day-num">' + d.getDate() + '</div>';
    if (count > 0) {
      html += '<div class="cal-day-dots">';
      for (let j = 0; j < Math.min(count, 3); j++) html += '<div class="cal-day-dot"></div>';
      html += '</div>';
    }
    html += '</button>';
  });
  html += '</div>';

  // Selected day detail
  const dnames = ['neděle','pondělí','úterý','středa','čtvrtek','pátek','sobota'];
  html += '<div class="section-label">' + dnames[selDate.getDay()].toUpperCase().split('').join(' ') + '&nbsp; · &nbsp;' + selDate.getDate() + '. ' + months[selDate.getMonth()].toUpperCase() + '</div>';

  html += '<div class="section-content">';
  if (dayEvents.length === 0) {
    html += '<div class="row-empty">žádné termíny</div>';
  } else {
    dayEvents.forEach(e => {
      const time = e.allDay ? 'celý den' : formatTimeCZ(new Date(e.start));
      html += '<div class="timeline-row" onclick="editEvent(\'' + e.id + '\')">';
      html += '<div class="timeline-time">' + escapeHtml(time) + '</div>';
      html += '<div class="timeline-content">';
      html += '<div class="timeline-title">' + escapeHtml(e.title || 'Termín') + '</div>';
      if (e.location) html += '<div class="timeline-meta">' + escapeHtml(e.location) + '</div>';
      else if (e.notes) html += '<div class="timeline-meta">' + escapeHtml(e.notes) + '</div>';
      html += '</div>';
      html += '</div>';
    });
  }
  html += '</div>';

  html += '</div>';
  return html;
}

  vibrate(8);
  renderScreen();
}

function renderFinMezi() {
  const led = computeLedger();
  const partnerName = getPartnerName();
  const myName = getMyName();

  let html = '';

  // Hero
  html += '<div class="section-content">';
  let amount, sub;
  if (Math.abs(led.myCredit) < 1) {
    amount = '0';
    sub = '<em>vyrovnáno</em> · žádné dluhy';
  } else if (led.myCredit < 0) {
    amount = fmtNumOnly(Math.abs(led.myCredit));
    sub = 'dlužíš <em>' + escapeHtml(partnerName || 'partnerovi') + '</em>';
  } else {
    amount = fmtNumOnly(led.myCredit);
    sub = '<em>' + escapeHtml(partnerName || 'partner') + '</em> dluží tobě';
  }
  html += '<div class="big-number">' + amount + '<span class="currency">Kč</span></div>';
  html += '<div class="big-sub">' + sub + '</div>';

  if (Math.abs(led.myCredit) > 1) {
    const direction = led.myCredit < 0 ? 'Já posílám' : (partnerName + ' posílá');
    html += '<button class="btn" style="margin-top: 16px;" onclick="showSettleSheet()">Vyrovnat — ' + fmtMoney(Math.abs(led.myCredit)) + '</button>';
  }
  html += '</div>';

  html += '<hr class="hairline">';

  // Transactions
  const txns = getList('txns').sort((a,b) => (b.at || 0) - (a.at || 0));

  if (txns.length === 0) {
    html += '<div class="section-label">B E Z &nbsp; T R A N S A K C Í</div>';
    html += '<div class="empty">Zatím žádné transakce mezi vámi.<br><br>Zmáčkni + a přidej.</div>';
  } else {
    html += '<div class="section-label">P O S L E D N Í</div>';
    html += '<div class="section-content">';
    txns.slice(0, 30).forEach(t => {
      const d = new Date(t.at);
      const dateStr = d.getDate() + '. ' + (d.getMonth() + 1) + '.';
      const isMyMoneyOut = t.from === myName;
      const sign = isMyMoneyOut ? '−' : '+';
      const amtCls = isMyMoneyOut ? 'minus' : 'plus';

      html += '<div class="row" onclick="editTxn(\'' + t.id + '\')">';
      html += '<div class="row-time">' + dateStr + '</div>';
      html += '<div class="row-content">';
      html += '<div class="row-title">' + escapeHtml(t.title || 'Platba') + '</div>';
      const fromTo = (t.from || '?') + ' → ' + (t.to || '?');
      let metaTxt = fromTo;
      if (t.kind === 'rent') metaTxt = 'Nájem · ' + metaTxt;
      else if (t.kind === 'expense') metaTxt = 'Výdaj · ' + metaTxt;
      else metaTxt = 'Platba · ' + metaTxt;
      html += '<div class="row-meta">' + escapeHtml(metaTxt) + '</div>';
      html += '</div>';
      html += '<div class="row-amount" style="color: ' + (isMyMoneyOut ? 'var(--danger)' : 'var(--positive)') + ';">' + sign + fmtMoney(t.amount) + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  return html;
}

function showSettleSheet() {
  const led = computeLedger();
  const myName = getMyName();
  const partnerName = getPartnerName();
  const amt = Math.abs(led.myCredit);
  const fromName = led.myCredit < 0 ? myName : partnerName;
  const toName = led.myCredit < 0 ? partnerName : myName;

  openSheet(`
    <div class="sheet-title">Vyrovnat</div>
    <div class="sheet-subtitle">${escapeHtml(fromName)} pošle ${escapeHtml(toName)}</div>
    <div style="text-align: center; padding: 16px 0;">
      <div class="big-number">${fmtNumOnly(amt)}<span class="currency">Kč</span></div>
    </div>
    <button class="btn" onclick="confirmSettle('${escapeHtml(fromName)}', '${escapeHtml(toName)}', ${amt})">Označit jako vyrovnané</button>
    <button class="btn secondary" style="margin-top: 8px;" onclick="closeSheet()">Zrušit</button>
  `);
}

async function confirmSettle(from, to, amt) {
  await fb.ref('households/' + userData.householdId + '/txns').push({
    title: 'Vyrovnání',
    amount: amt,
    from, to,
    kind: 'payment',
    at: Date.now(),
    createdBy: currentUser.uid
  });
  closeSheet();
  showToast('Vyrovnáno ✓');
}

// Compute ledger
function computeLedger() {
  const txns = getList('txns');
  const myName = getMyName();
  let myCredit = 0;

  txns.forEach(t => {
    const amt = t.amount || 0;
    if (t.to === myName) myCredit += amt;
    else if (t.from === myName) myCredit -= amt;
  });

  return { myCredit, txns };
}

function renderUcetCard(u, dimmed) {
  const total = computeUcetTotal(u);
  const myDebt = computeUcetDebtFor(u, currentUser.uid);
  const peopleCount = (u.people || []).length;
  const peopleStr = peopleCount + ' ' + (peopleCount === 1 ? 'osoba' : peopleCount < 5 ? 'lidi' : 'lidí');

  let html = '<div class="ucet" onclick="goDetail(\'ucet\', \'' + u.id + '\')"';
  if (dimmed) html += ' style="opacity: 0.65;"';
  html += '>';
  html += '<div class="ucet-head">';
  html += '<div class="ucet-name">' + escapeHtml(u.name) + '</div>';
  html += '<span class="chip' + (dimmed ? ' muted' : '') + '">' + (dimmed ? 'uzavřen' : 'otevřen') + '</span>';
  html += '</div>';

  if (u.dateFrom || u.dateTo) {
    let metaParts = [];
    if (u.dateFrom) metaParts.push(formatDateCZ(new Date(u.dateFrom)));
    if (u.dateTo && u.dateTo !== u.dateFrom) metaParts.push(formatDateCZ(new Date(u.dateTo)));
    html += '<div class="ucet-meta">' + metaParts.join(' – ') + ' · ' + peopleStr + '</div>';
  } else {
    html += '<div class="ucet-meta">' + peopleStr + '</div>';
  }

  html += '<div class="ucet-stats">';
  html += '<div><div class="ucet-stat-label">Utraceno</div><div class="ucet-stat-value">' + fmtMoney(total) + '</div></div>';
  if (Math.abs(myDebt) > 1) {
    html += '<div><div class="ucet-stat-label">' + (myDebt > 0 ? 'Tobě dluží' : 'Dlužíš') + '</div><div class="ucet-stat-value accent">' + fmtMoney(Math.abs(myDebt)) + '</div></div>';
  } else {
    html += '<div><div class="ucet-stat-label">Tvůj stav</div><div class="ucet-stat-value">vyrovnáno</div></div>';
  }
  html += '</div>';
  html += '</div>';
  return html;
}

function computeUcetTotal(u) {
  const exps = (u && u.expenses) ? Object.values(u.expenses) : [];
  return exps.reduce((s, e) => s + (e.amount || 0), 0);
}

// Compute how much OTHERS owe to ME (positive) or I owe to others (negative)
function computeUcetDebtFor(u, myUid) {
  const exps = (u && u.expenses) ? Object.values(u.expenses) : [];
  const people = u.people || [];
  let net = 0;

  exps.forEach(e => {
    const amt = e.amount || 0;
    const splitFor = e.splitFor || people.map(p => p.uid);
    const perPerson = amt / splitFor.length;
    if (e.paidBy === myUid) net += amt; // I paid the whole thing
    if (splitFor.includes(myUid)) net -= perPerson; // I owe my share
  });

  return net;
}

// Compute who pays whom (simplified — minimize transfers)
function computeUcetSettlements(u) {
  const people = u.people || [];
  if (people.length < 2) return [];
  const expenses = u.expenses ? Object.values(u.expenses) : [];

  // Net balance per person: positive = they paid more than spent (others owe them)
  const balance = {};
  people.forEach(p => balance[p.uid] = 0);

  expenses.forEach(e => {
    const splitFor = e.splitFor || people.map(p => p.uid);
    const perPerson = (e.amount || 0) / splitFor.length;
    if (balance[e.paidBy] !== undefined) balance[e.paidBy] += (e.amount || 0);
    splitFor.forEach(uid => { if (balance[uid] !== undefined) balance[uid] -= perPerson; });
  });

  // Build settlements: people with negative balance pay people with positive
  const debtors = [];
  const creditors = [];
  Object.keys(balance).forEach(uid => {
    if (balance[uid] < -0.5) debtors.push({ uid, amount: -balance[uid] });
    else if (balance[uid] > 0.5) creditors.push({ uid, amount: balance[uid] });
  });

  debtors.sort((a, b) => b.amount - a.amount);
  creditors.sort((a, b) => b.amount - a.amount);

  const settlements = [];
  let i = 0, j = 0;
  while (i < debtors.length && j < creditors.length) {
    const pay = Math.min(debtors[i].amount, creditors[j].amount);
    if (pay > 0.5) {
      const fromP = people.find(p => p.uid === debtors[i].uid);
      const toP = people.find(p => p.uid === creditors[j].uid);
      settlements.push({
        from: fromP ? fromP.name : '?',
        to: toP ? toP.name : '?',
        amount: pay
      });
    }
    debtors[i].amount -= pay;
    creditors[j].amount -= pay;
    if (debtors[i].amount < 0.5) i++;
    if (creditors[j].amount < 0.5) j++;
  }

  return settlements;
}

  html += '<div class="section-label">V Z H L E D</div>';

  html += '<div class="theme-swatch espresso"></div>';
  html += '<div class="theme-name">Espresso</div>';
  html += '<div class="theme-desc">tmavá &amp; zlatá</div>';
  html += '</div>';
  html += '<div class="theme-option' + (theme === 'creme' ? ' active' : '') + '" onclick="setMyTheme(\'creme\')">';
  html += '<div class="theme-swatch creme"></div>';
  html += '<div class="theme-name">Crème</div>';
  html += '<div class="theme-desc">světlá &amp; zlatá</div>';
  html += '</div>';
  html += '</div>';

  // HOUSEHOLD
  html += '<hr class="hairline">';
  html += '<div class="section-label">D O M Á C N O S T</div>';
  html += '<div class="settings-row" onclick="showHouseholdCodeSheet()">';
  html += '<div class="settings-icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="1"/><path d="M14 14l5 5"/></svg></div>';
  html += '<div class="settings-content"><div class="settings-name">Kód domácnosti</div><div class="settings-value">' + escapeHtml(code) + '</div></div>';
  html += '<span class="row-arrow">›</span>';
  html += '</div>';

  // RENT
  html += '<hr class="hairline">';
  html += '<div class="section-label">N Á J E M</div>';
  html += '<div class="settings-row" onclick="showRentConfigSheet()">';
  html += '<div class="settings-icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>';
  html += '<div class="settings-content">';
  html += '<div class="settings-name">Pravidelný nájem</div>';
  if (config.rentEnabled) {
    html += '<div class="settings-value">' + fmtMoney(config.rentAmount || 10000) + ' · ' + escapeHtml(config.rentPayer || '?') + ' → ' + escapeHtml(config.rentReceiver || '?') + '</div>';
  } else {
    html += '<div class="settings-value">vypnuto</div>';
  }
  html += '</div>';
  html += '<span class="row-arrow">›</span>';

function showEditNameSheet() {
  const myName = getMyName();
  openSheet(`
    <div class="sheet-title">Změnit jméno</div>
    <div class="sheet-subtitle">jak tě uvidí partner</div>
    <div class="field"><input type="text" id="n-name" value="${escapeHtml(myName)}" autofocus></div>
    <button class="btn" style="margin-top: 16px;" onclick="saveName()">Uložit</button>
  `);
  setTimeout(() => { const i = document.getElementById('n-name'); if (i) { i.focus(); i.select(); } }, 100);
}

async function saveName() {
  const name = document.getElementById('n-name').value.trim();
  if (!name) { showToast('Zadej jméno', true); return; }
  await fb.ref('households/' + userData.householdId + '/members/' + currentUser.uid).set(name);
  await fb.ref('users/' + currentUser.uid + '/name').set(name);
  if (userData) userData.name = name;
  closeSheet();
  showToast('Uloženo');
}

function showHouseholdCodeSheet() {
  const code = userData.householdId.replace('h_', '');
  openSheet(`
    <div class="sheet-title">Kód domácnosti</div>
    <div class="sheet-subtitle">pošli partnerovi pro připojení</div>
    <div style="text-align: center; padding: 24px 0;">
      <div style="font-family: Fraunces, serif; font-size: 48px; letter-spacing: 8px; color: var(--accent); font-weight: 300;">${escapeHtml(code)}</div>
    </div>
    <button class="btn" onclick="copyCode('${escapeHtml(code)}')">Zkopírovat</button>
    <button class="btn secondary" style="margin-top: 8px;" onclick="closeSheet()">Zavřít</button>
  `);
}

function copyCode(code) {
  try {
    navigator.clipboard.writeText(code);
    showToast('Zkopírováno');
  } catch (e) {
    showToast('Nepodařilo se zkopírovat', true);
  }
}

function showRentConfigSheet() {
  const config = householdData.config || {};
  const myName = getMyName();
  const partnerName = getPartnerName();

  if (!partnerName) {
    showToast('Nejprve potřebuješ partnera', true);
    return;
  }

  const enabled = !!config.rentEnabled;
  const amount = config.rentAmount || 10000;
  const payer = config.rentPayer || myName;
  const receiver = config.rentReceiver || partnerName;
  const dayOfMonth = config.rentDayOfMonth || 1;

  openSheet(`
    <div class="sheet-title">Pravidelný nájem</div>
    <div class="sheet-subtitle">automaticky se přičte 1× měsíčně</div>
    <div class="field"><label>Částka (Kč)</label><input type="number" id="r-amount" value="${amount}"></div>
    <div class="field"><label>Den v měsíci</label><input type="number" id="r-day" value="${dayOfMonth}" min="1" max="28"></div>
    <div class="field"><label>Platí</label>
      <div class="field-row">
        <button class="btn ${payer === myName ? '' : 'secondary'}" id="r-payer-me" onclick="window._rentPayer='${escapeHtml(myName)}'; updateRentBtns()">${escapeHtml(myName)}</button>
        <button class="btn ${payer === partnerName ? '' : 'secondary'}" id="r-payer-pt" onclick="window._rentPayer='${escapeHtml(partnerName)}'; updateRentBtns()">${escapeHtml(partnerName)}</button>
      </div>
    </div>
    <button class="btn" style="margin-top: 16px;" onclick="saveRentConfig()">Uložit</button>
    ${enabled ? '<button class="btn danger" style="margin-top: 8px;" onclick="disableRent()">Vypnout</button>' : ''}
  `);
  window._rentPayer = payer;
}

function updateRentBtns() {
  const myName = getMyName();
  const meBtn = document.getElementById('r-payer-me');
  const ptBtn = document.getElementById('r-payer-pt');
  if (!meBtn || !ptBtn) return;
  if (window._rentPayer === myName) {
    meBtn.classList.remove('secondary');
    ptBtn.classList.add('secondary');
  } else {
    ptBtn.classList.remove('secondary');
    meBtn.classList.add('secondary');
  }
}

async function saveRentConfig() {
  const myName = getMyName();
  const partnerName = getPartnerName();
  const amount = parseFloat(document.getElementById('r-amount').value) || 10000;
  const day = parseInt(document.getElementById('r-day').value, 10) || 1;
  const payer = window._rentPayer || myName;
  const receiver = payer === myName ? partnerName : myName;

  await fb.ref('households/' + userData.householdId + '/config').update({
    rentEnabled: true,
    rentAmount: amount,
    rentDayOfMonth: day,
    rentPayer: payer,
    rentReceiver: receiver
  });
  closeSheet();
  showToast('Nájem nastaven');

  // Auto-create monthly rent transactions for past + current month
  await ensureRentTxns();
}

async function disableRent() {
  await fb.ref('households/' + userData.householdId + '/config/rentEnabled').set(false);
  closeSheet();
  showToast('Vypnuto');
}

async function ensureRentTxns() {
  const config = householdData.config || {};
  if (!config.rentEnabled) return;
  const startMonth = config.rentStartMonth; // YYYY-MM
  const now = new Date();
  // For now, just create one for current month if not exists
  const txns = getList('txns');
  const thisMonthKey = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  const exists = txns.some(t => t.kind === 'rent' && t.monthKey === thisMonthKey);
  if (!exists) {
    const dayOfMonth = config.rentDayOfMonth || 1;
    const at = new Date(now.getFullYear(), now.getMonth(), dayOfMonth).getTime();
    await fb.ref('households/' + userData.householdId + '/txns').push({
      title: 'Nájem · ' + ['leden','únor','březen','duben','květen','červen','červenec','srpen','září','říjen','listopad','prosinec'][now.getMonth()],
      amount: config.rentAmount,
      from: config.rentPayer,
      to: config.rentReceiver,
      kind: 'rent',
      monthKey: thisMonthKey,
      at,
      createdBy: currentUser.uid,
      auto: true
    });
  }
}

function confirmLogout() {
  openSheet(`

}

  openSheet(`
    <div class="sheet-title">Nový pejsek</div>
    <div class="sheet-subtitle">přidej do domácnosti</div>
    <div class="field"><label>Jméno</label><input type="text" id="p-name" placeholder="Bobík" autofocus></div>

async function addPet() {
  const name = document.getElementById('p-name').value.trim();
  const breed = document.getElementById('p-breed').value.trim();
  const year = parseInt(document.getElementById('p-year').value, 10);
  if (!name) { showToast('Zadej jméno', true); return; }
  const data = { name, createdAt: Date.now() };
  if (breed) data.breed = breed;
  if (year) data.birthYear = year;
  await fb.ref('households/' + userData.householdId + '/pets').push(data);
  closeSheet();
  showToast('Přidáno');
}

function renderPetDetail() {
  if (!detailContext || detailContext.type !== 'pet') return renderMore();
  const pets = householdData.pets || {};
  const p = pets[detailContext.id];
  if (!p) return renderMore();
  p.id = detailContext.id;

  const records = p.records ? Object.keys(p.records).map(k => ({ id: k, ...p.records[k] })) : [];
  records.sort((a, b) => (b.at || 0) - (a.at || 0));

  let html = '<div class="app">';
  html += '<div class="page-header with-back">';
  html += '<button class="btn-back" onclick="goBack()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>';
  html += '<div class="page-title">' + escapeHtml(p.name) + '</div>';
  html += '<button class="btn-icon" onclick="showEditPetSheet(\'' + p.id + '\')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>';
  html += '</div>';

  // Hero
  html += '<div class="pet-hero">';
  html += '<div class="avatar size-xl" style="margin: 0 auto;">' + escapeHtml(getInitial(p.name)) + '</div>';
  html += '<div class="pet-name">' + escapeHtml(p.name) + '</div>';
  let tagline = [];
  if (p.breed) tagline.push(p.breed);
  if (p.birthYear) {
    const age = new Date().getFullYear() - p.birthYear;
    tagline.push(age + (age === 1 ? ' rok' : age < 5 ? ' roky' : ' let'));
  }
  if (tagline.length) html += '<div class="pet-tagline">' + escapeHtml(tagline.join(' · ')) + '</div>';
  html += '</div>';

  html += '<hr class="hairline">';

  // Records
  html += '<div class="section-label">Z Á Z N A M Y</div>';
  if (records.length === 0) {
    html += '<div class="empty">Zatím žádné záznamy</div>';
  } else {
    html += '<div class="section-content">';
    records.forEach(r => {
      const d = new Date(r.at);
      html += '<div class="row">';
      html += '<div class="row-time">' + d.getDate() + '. ' + (d.getMonth() + 1) + '.</div>';
      html += '<div class="row-content">';
      html += '<div class="row-title">' + escapeHtml(r.title) + '</div>';
      if (r.note) html += '<div class="row-meta">' + escapeHtml(r.note) + '</div>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  html += '<div style="padding: 24px;">';
  html += '<button class="btn secondary" onclick="showAddPetRecordSheet(\'' + p.id + '\')" style="width: auto; padding: 10px 16px; font-size: 12px;">+ Přidat záznam</button>';
  html += '</div>';

  // Override FAB
  setTimeout(() => {
    const fab = document.getElementById('fab');
    if (fab) fab.onclick = () => showAddPetRecordSheet(p.id);
  }, 100);

  html += '</div>';
  return html;
}

  openSheet(`

    <div class="field"><label>Plemeno</label><input type="text" id="p-breed" value="${escapeHtml(p.breed || '')}"></div>

// ============================================================
// SWIPE HANDLERS
// ============================================================
function attachSwipeHandlers() {
  document.querySelectorAll('.swipeable').forEach(row => {
    if (row.dataset.swipeAttached) return;
    row.dataset.swipeAttached = '1';

    let startX = 0, startY = 0, currentX = 0;
    let dragging = false, vibrated = false, horizontal = null;

    function start(x, y) {
      startX = x;
      startY = y;
      currentX = 0;
      dragging = true;
      vibrated = false;
      horizontal = null;
      row.classList.add('dragging');
    }

    function move(x, y) {
      if (!dragging) return;
      const dx = x - startX;
      const dy = y - startY;
      if (horizontal === null && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
        horizontal = Math.abs(dx) > Math.abs(dy);
      }
      if (horizontal === false) return;
      currentX = Math.max(-180, Math.min(180, dx));
      row.style.transform = 'translateX(' + currentX + 'px)';
      if (Math.abs(currentX) > 80 && !vibrated) {
        vibrate(15);
        vibrated = true;
      }
      if (Math.abs(currentX) < 80 && vibrated) vibrated = false;
    }

    function end() {
      if (!dragging) return;
      dragging = false;
      row.classList.remove('dragging');
      row.classList.add('completing');

      const id = row.dataset.id;
      const name = row.dataset.name;

      if (currentX > 100) {
        row.style.transform = 'translateX(400px)';
        row.style.opacity = '0';
        vibrate([10, 20, 10]);
        setTimeout(() => {
          if (id) toggleTask(id);
        }, 200);
      } else if (currentX < -100) {
        row.style.transform = 'translateX(-400px)';
        row.style.opacity = '0';
        vibrate([10, 20, 10]);
        setTimeout(() => {
          if (id) {
            deleteTask(id);
            showToast((name || 'Úkol') + ' smazán', true);
          }
        }, 200);
      } else {
        row.style.transform = 'translateX(0)';
      }
      currentX = 0;
      setTimeout(() => row.classList.remove('completing'), 400);
    }

    row.addEventListener('touchstart', e => start(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    row.addEventListener('touchmove', e => move(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    row.addEventListener('touchend', end);
    row.addEventListener('touchcancel', end);

    // Mouse fallback
    let mouseDown = false;
    row.addEventListener('mousedown', e => {
      if (e.target.closest('.check-circle')) return;
      mouseDown = true;
      start(e.clientX, e.clientY);
    });
    document.addEventListener('mousemove', e => {
      if (mouseDown) move(e.clientX, e.clientY);
    });
    document.addEventListener('mouseup', () => {
      if (mouseDown) {
        mouseDown = false;
        end();
      }
    });
  });
}

// Reset FAB to default behavior on every render
function resetFabHandler() {
  const fab = document.getElementById('fab');
  if (fab) fab.onclick = onFabClick;
