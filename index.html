// ===== Tab 1: OVERVIEW =====
function renderFinOverview(led) {
  const cfg = led.config;
  const myName = getMyName();
  const partnerName = getPartnerName();
  const thisMonth = expensesForMonth(0);
  const lastMonth = expensesForMonth(-1);
  const thisTotal = totalAmount(thisMonth);
  const lastTotal = totalAmount(lastMonth);

  let html = '';

  // HERO: spent this month
  let trendText = '';
  if (lastTotal > 0) {
    const diff = thisTotal - lastTotal;
    const pct = Math.round(diff / lastTotal * 100);
    if (pct > 5) trendText = '<span class="fin-trend-up">↑ ' + pct + '%</span> více než minulý měsíc';
    else if (pct < -5) trendText = '<span class="fin-trend-down">↓ ' + Math.abs(pct) + '%</span> méně než minulý měsíc';
    else trendText = '~ stejně jako minulý měsíc';
  } else if (thisTotal > 0) {
    trendText = 'Tvůj první měsíc se sledováním ✨';
  }

  html += '<div class="fin-hero">' +
    '<div class="fin-hero-label">Moje výdaje · ' + monthLabel(new Date()) + '</div>' +
    '<div class="fin-hero-amount">' + fmtMoney(thisTotal) + '</div>' +
    (trendText ? '<div class="fin-hero-sub">' + trendText + '</div>' : '<div class="fin-hero-sub">Klepni na <strong>Moje výdaje</strong> a začni přidávat</div>') +
  '</div>';

  // Quick stats row
  const dayOfMonth = new Date().getDate();
  const avgPerDay = dayOfMonth > 0 ? thisTotal / dayOfMonth : 0;
  const txnCount = thisMonth.length;

  html += '<div class="fin-stat-row">' +
    '<div class="fin-stat purple"><div class="fin-stat-label">Průměrně/den</div><div class="fin-stat-value">' + fmtMoney(avgPerDay) + '</div><div class="fin-stat-sub">' + txnCount + ' transakcí</div></div>' +
    '<div class="fin-stat blue"><div class="fin-stat-label">Minulý měsíc</div><div class="fin-stat-value">' + fmtMoney(lastTotal) + '</div><div class="fin-stat-sub">' + lastMonth.length + ' transakcí</div></div>' +
  '</div>';

  // Housing status (if configured and I am the payer)
  if (cfg.startMonth && myName === cfg.payer) {
    let icon = '✅', text = '';
    if (led.currentMonthCovered && led.monthsAheadCount > 0) {
      icon = '✨';
      text = '<strong>Předplaceno ' + led.monthsAheadCount + ' ' + (led.monthsAheadCount === 1 ? 'měsíc' : led.monthsAheadCount < 5 ? 'měsíce' : 'měsíců') + ' dopředu</strong>';
      if (led.nextRentDue) text += ' · Další: ' + led.nextRentDue.label;
    } else if (led.currentMonthCovered) {
      text = '<strong>Tento měsíc zaplacen</strong>' + (led.nextRentDue ? ' · Další: ' + led.nextRentDue.label : '');
    } else {
      icon = '⚠️';
      text = '<strong>Chybí ' + fmtMoney(led.shortfall) + '</strong> za tento měsíc';
    }
    html += '<div class="prediction-card" onclick="setFinanceTab(\'between\')" style="cursor:pointer; margin: 0 20px 14px;"><span class="prediction-icon">' + icon + '</span><span class="prediction-text">🏡 ' + text + '</span></div>';
  }

  // Mutual balance
  const credit = led.myCredit;
  if (credit !== 0) {
    const balText = credit > 0
      ? '<strong>' + escapeHtml(partnerName) + '</strong> ti dluží <strong>' + fmtMoney(credit) + '</strong>'
      : 'Dlužíš <strong>' + escapeHtml(partnerName) + '</strong>ovi <strong>' + fmtMoney(Math.abs(credit)) + '</strong>';
    html += '<div class="prediction-card" onclick="setFinanceTab(\'between\')" style="cursor:pointer; margin: 0 20px 14px; background: ' + (credit > 0 ? 'rgba(129,199,132,0.12)' : 'rgba(239,83,80,0.10)') + '; border-color: ' + (credit > 0 ? 'rgba(129,199,132,0.3)' : 'rgba(239,83,80,0.25)') + ';"><span class="prediction-icon">👥</span><span class="prediction-text">' + balText + '</span></div>';
  }

  // 6-month trend chart
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const ex = expensesForMonth(-i);
    const tot = totalAmount(ex);
    const d = new Date();
    d.setMonth(d.getMonth() - i);
    months.push({ label: monthLabelShort(d).substring(0, 3), amount: tot, current: i === 0 });
  }
  const maxAmt = Math.max(...months.map(m => m.amount), 1);
  const hasData = months.some(m => m.amount > 0);

  html += '<div class="bar-chart"><div class="bar-chart-title"><span>📈 Trend posledních 6 měsíců</span><span style="color: rgba(255,255,255,0.5); font-size: 11px;">Moje výdaje</span></div>';
  if (hasData) {
    html += '<div class="bar-chart-bars">';
    months.forEach(m => {
      const pct = (m.amount / maxAmt) * 100;
      html += '<div class="bar-col">' +
        '<div class="bar-fill ' + (m.current ? 'current' : '') + '" style="height: ' + Math.max(pct, 4) + '%" data-amount="' + (m.amount > 0 ? fmtMoney(m.amount) : '') + '"></div>' +
        '<div class="bar-label ' + (m.current ? 'current' : '') + '">' + m.label + '</div>' +
      '</div>';
    });
    html += '</div>';
  } else {
    html += '<div style="padding: 20px 0; text-align: center; color: rgba(255,255,255,0.45); font-style: italic; font-size: 13px;">Zatím žádná data — začni přidávat výdaje na záložce <strong>💼 Moje výdaje</strong></div>';
  }
  html += '</div>';

  // Top categories this month
  if (thisTotal > 0) {
    const byCat = {};
    thisMonth.forEach(e => {
      const c = e.category || 'other';
      if (!byCat[c]) byCat[c] = { total: 0, count: 0 };
      byCat[c].total += e.amount || 0;
      byCat[c].count++;
    });
    const sorted = Object.entries(byCat).sort((a, b) => b[1].total - a[1].total);
    html += '<div class="section-title">🏆 Top kategorie · ' + monthLabelShort(new Date()) + '</div>';
    html += '<div class="cat-list">';
    sorted.slice(0, 5).forEach(([catId, data]) => {
      const cat = getExpCat(catId);
      const pct = (data.total / thisTotal) * 100;
      html += '<div class="cat-row">' +
        '<div class="cat-icon-circle ' + cat.cls + '">' + cat.icon + '</div>' +
        '<div class="cat-info">' +
          '<div style="display: flex; justify-content: space-between; align-items: baseline;"><span class="cat-name">' + cat.label + '</span><span class="cat-amount">' + fmtMoney(data.total) + '</span></div>' +
          '<div class="cat-count">' + data.count + ' ' + (data.count === 1 ? 'položka' : data.count < 5 ? 'položky' : 'položek') + ' · ' + Math.round(pct) + '%</div>' +
          '<div class="cat-bar-track ' + cat.cls + '"><div class="cat-bar-fill" style="width: ' + pct + '%;"></div></div>' +
        '</div>' +
      '</div>';
    });
    html += '</div>';
  }

  // Smart insights
  const insights = generateInsights(thisMonth, lastMonth, led);
  if (insights.length > 0) {
    html += '<div class="section-title" style="margin-top: 20px;">💡 Postřehy</div>';
    insights.forEach(ins => {
      html += '<div class="insight-card"><span class="insight-icon">' + ins.icon + '</span><span class="insight-text">' + ins.text + '</span></div>';
    });
  }

  return html;
}

function generateInsights(thisMonth, lastMonth, led) {
  const insights = [];
  const thisTotal = totalAmount(thisMonth);
  const lastTotal = totalAmount(lastMonth);

  // Compare biggest category vs last month
  if (thisMonth.length > 0 && lastMonth.length > 0) {
    const byCat = {};
    thisMonth.forEach(e => { const c = e.category || 'other'; byCat[c] = (byCat[c] || 0) + (e.amount || 0); });
    const lastByCat = {};
    lastMonth.forEach(e => { const c = e.category || 'other'; lastByCat[c] = (lastByCat[c] || 0) + (e.amount || 0); });
    Object.entries(byCat).forEach(([catId, amt]) => {
      const last = lastByCat[catId] || 0;
      if (last > 0 && amt > last * 1.3 && amt - last > 500) {
        const cat = getExpCat(catId);
        insights.push({
          icon: cat.icon,
          text: 'Tento měsíc jsi za <strong>' + cat.label.toLowerCase() + '</strong> utratil o <strong>' + fmtMoney(amt - last) + '</strong> více než minulý měsíc.'
        });
      }
    });
  }

  // Concentrated spending
  if (thisMonth.length >= 5) {
    const byCat = {};
    thisMonth.forEach(e => { const c = e.category || 'other'; byCat[c] = (byCat[c] || 0) + (e.amount || 0); });
    const sorted = Object.entries(byCat).sort((a,b) => b[1] - a[1]);
    const top3 = sorted.slice(0, 3).reduce((s, [, a]) => s + a, 0);
    const top3pct = (top3 / thisTotal) * 100;
    if (top3pct > 75) {
      insights.push({
        icon: '🎯',
        text: '<strong>' + Math.round(top3pct) + '%</strong> tvých výdajů jde do tří hlavních kategorií. Možná dobrý čas zamyslet se?'
      });
    }
  }

  // Most expensive day
  if (thisMonth.length > 3) {
    const byDay = {};
    thisMonth.forEach(e => { const d = new Date(e.at || 0); const k = d.toDateString(); byDay[k] = (byDay[k] || 0) + (e.amount || 0); });
    const sortedDays = Object.entries(byDay).sort((a,b) => b[1] - a[1]);
    if (sortedDays.length > 0 && sortedDays[0][1] > thisTotal * 0.25) {
      const d = new Date(sortedDays[0][0]);
      insights.push({
        icon: '📌',
        text: 'Nejdražší den: <strong>' + d.getDate() + '. ' + monthLabelShort(d) + '</strong> — ' + fmtMoney(sortedDays[0][1]) + '.'
      });
    }
  }

  return insights.slice(0, 3);
}

// ===== Tab 2: BETWEEN (housing + mutual) =====
function renderFinBetween(led) {
  const cfg = led.config;
  const myName = getMyName();
  const partnerName = getPartnerName();

  let html = '';

  if (!cfg.startMonth) {
    html += '<div class="prediction-card" style="margin: 20px;"><span class="prediction-icon">⚙️</span><span class="prediction-text">Nastav <strong>měsíční příspěvek</strong> a od kdy se počítá, abych ti mohl pomáhat sledovat stav.</span></div>';
    html += '<div style="padding: 0 20px;"><button class="btn btn-orange" onclick="showFundConfig()">⚙️ Nastavit příspěvek</button></div>';
    return html;
  }

  const credit = led.myCredit;
  const iAmPayer = myName === cfg.payer;

  // Housing status
  if (iAmPayer) {
    let statusClass, statusIcon, statusTitle, statusDetail;
    if (led.currentMonthCovered && led.monthsAheadCount > 0) {
      statusClass = 'positive'; statusIcon = '✨';
      statusTitle = 'Předplaceno ' + led.monthsAheadCount + ' ' + (led.monthsAheadCount === 1 ? 'měsíc' : led.monthsAheadCount < 5 ? 'měsíce' : 'měsíců') + ' dopředu';
      statusDetail = 'Do: <strong>' + monthLabel(fromAbsMonth(led.coveredUntilAbs)) + '</strong>' + (led.prepaidRemainder > 0 ? ' (+' + fmtMoney(led.prepaidRemainder) + ' navíc)' : '');
    } else if (led.currentMonthCovered) {
      statusClass = 'neutral'; statusIcon = '✅';
      statusTitle = 'Tento měsíc zaplacen';
      statusDetail = led.nextRentDue ? 'Další platba: <strong>' + led.nextRentDue.label + '</strong>' : '';
    } else {
      statusClass = 'negative'; statusIcon = '⚠️';
      statusTitle = 'Chybí zaplatit';
      statusDetail = '<strong>' + fmtMoney(led.shortfall) + '</strong> za tento měsíc';
    }
    html += '<div class="balance-card ' + statusClass + '"><div class="balance-label">🏡 Stav bydlení · ' + monthLabel(new Date()) + '</div><div class="balance-amount">' + statusIcon + ' ' + statusTitle + '</div><div class="balance-sub">' + statusDetail + '</div></div>';
    if (led.nextRentDue) {
      html += '<div class="prediction-card"><span class="prediction-icon">📅</span><span class="prediction-text">Další platba nájmu: <strong>' + led.nextRentDue.label + '</strong>' + (led.nextRentDue.amountToPay < cfg.monthlyAmount ? ' (stačí zaplatit jen <strong>' + fmtMoney(led.nextRentDue.amountToPay) + '</strong>)' : ' (<strong>' + fmtMoney(led.nextRentDue.amountToPay) + '</strong>)') + '</span></div>';
    }
  }

  // Mutual balance
  if (credit !== 0 || !iAmPayer) {
    let balClass = credit > 0 ? 'positive' : credit < 0 ? 'negative' : 'neutral';
    let balText;
    if (credit === 0) balText = '<div class="balance-amount">Vyrovnáno ✓</div>';
    else if (credit > 0) balText = '<div class="balance-amount">+' + fmtMoney(credit) + '</div><div class="balance-sub" style="color: #a5d6a7;">' + escapeHtml(partnerName) + ' ti dluží celkem</div>';
    else balText = '<div class="balance-amount">' + fmtMoney(credit) + '</div><div class="balance-sub" style="color: #ef9a9a;">Dlužíš ' + escapeHtml(partnerName) + 'ovi celkem</div>';
    html += '<div class="balance-card ' + balClass + '" style="margin-top: 8px;"><div class="balance-label">👥 Souhrnné saldo mezi vámi</div>' + balText + '<div class="balance-sub" style="font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 6px;">(včetně nájmu i osobních plateb)</div></div>';
  }

  // Quick action buttons
  html += '<div style="padding: 12px 20px; display: flex; gap: 8px;">';
  html += '<button class="btn btn-orange" style="flex: 1; margin: 0; padding: 12px;" onclick="showAddRent()">🏡 Zaplatit nájem</button>';
  html += '<button class="btn btn-teal" style="flex: 1; margin: 0; padding: 12px;" onclick="showAddPayment()">💳 Jiná platba</button>';
  html += '</div>';

  // Transaction history
  const txns = [...led.txns].reverse();
  if (txns.length > 0) {
    html += '<div class="section-title">📜 Historie transakcí (' + txns.length + ')</div>';
    html += '<div class="search-box"><input type="text" class="search-input" placeholder="Hledat v historii..." value="' + escAttr(historySearchMoney) + '" oninput="setMoneySearch(this.value)"></div>';
    let filtered = txns;
    if (historySearchMoney) {
      const q = historySearchMoney.toLowerCase();
      filtered = txns.filter(t =>
        (t.note || '').toLowerCase().includes(q) ||
        (t.from || '').toLowerCase().includes(q) ||
        (t.to || '').toLowerCase().includes(q) ||
        String(t.amount || '').includes(q)
      );
    }
    html += '<div class="list">';
    filtered.forEach(t => html += txnCard(t, cfg));
    if (filtered.length === 0) html += '<div class="empty">Nic nenalezeno</div>';
    html += '</div>';
  } else {
    html += '<div class="empty" style="padding: 32px 20px;">Zatím žádné transakce.<br>Klepni na <strong>🏡 Zaplatit nájem</strong> nebo <strong>💳 Jiná platba</strong>.</div>';
  }

  html += '<div style="padding: 20px; text-align: center;"><button class="link-btn" onclick="showFundConfig()">⚙️ Upravit nastavení nájmu</button></div>';
  return html;
}

// ===== Tab 3: MINE (personal expenses) =====
function renderFinMine() {
  const allExpenses = getMyExpenses();
  const monthExp = expensesForMonth(expenseMonthOffset).sort((a,b) => (b.at || 0) - (a.at || 0));
  const monthTotal = totalAmount(monthExp);

  // Header with month switcher
  const targetDate = new Date();
  targetDate.setMonth(targetDate.getMonth() + expenseMonthOffset);
  const monthName = monthLabel(targetDate);
  const isCurrentMonth = expenseMonthOffset === 0;

  let html = '<div class="cal-nav" style="padding: 12px 20px;">' +
    '<button onclick="changeExpenseMonth(-1)">‹</button>' +
    '<div class="cal-month-label">' + monthName + '</div>' +
    (!isCurrentMonth ? '<button class="today-btn" onclick="changeExpenseMonth(999)">Tento měsíc</button>' : '') +
    '<button onclick="changeExpenseMonth(1)" ' + (isCurrentMonth ? 'style="opacity:0.3;" disabled' : '') + '>›</button>' +
  '</div>';

  // Hero card
  let trendText = '';
  if (isCurrentMonth) {
    const lastTotal = totalAmount(expensesForMonth(-1));
    if (lastTotal > 0) {
      const diff = monthTotal - lastTotal;
      const pct = Math.round(diff / lastTotal * 100);
      if (Math.abs(pct) > 5) trendText = (pct > 0 ? '↑' : '↓') + ' ' + Math.abs(pct) + '% vs. minulý';
    }
  }

  html += '<div class="fin-hero" style="margin-top: 0;">' +
    '<div class="fin-hero-label">Celkem v ' + monthName + '</div>' +
    '<div class="fin-hero-amount">' + fmtMoney(monthTotal) + '</div>' +
    '<div class="fin-hero-sub">' + monthExp.length + ' ' + (monthExp.length === 1 ? 'transakce' : monthExp.length < 5 ? 'transakce' : 'transakcí') + (trendText ? ' · ' + trendText : '') + '</div>' +
  '</div>';

  // Category filter chips
  if (allExpenses.length > 0) {
    html += '<div style="padding: 0 20px 8px; display: flex; gap: 6px; overflow-x: auto;">';
    html += '<button class="tab ' + (expenseFilter === 'all' ? 'active' : '') + '" style="flex-shrink:0;" onclick="setExpenseFilter(\'all\')">Vše</button>';
    EXPENSE_CATEGORIES.forEach(c => {
      const has = monthExp.some(e => (e.category || 'other') === c.id);
      if (!has) return;
      html += '<button class="tab ' + (expenseFilter === c.id ? 'active' : '') + '" style="flex-shrink:0;" onclick="setExpenseFilter(\'' + c.id + '\')">' + c.icon + ' ' + c.label + '</button>';
    });
    html += '</div>';

    // Search
    html += '<div class="search-box"><input type="text" class="search-input" placeholder="Hledat v mých výdajích..." value="' + escAttr(expenseSearch) + '" oninput="setExpenseSearch(this.value)"></div>';

    // Category breakdown for the month
    if (monthExp.length > 0) {
      const byCat = {};
      monthExp.forEach(e => { const c = e.category || 'other'; if (!byCat[c]) byCat[c] = { total: 0, count: 0 }; byCat[c].total += e.amount || 0; byCat[c].count++; });
      const sorted = Object.entries(byCat).sort((a,b) => b[1].total - a[1].total);
      html += '<div class="section-title">Podle kategorií</div><div class="cat-list">';
      sorted.forEach(([catId, data]) => {
        const cat = getExpCat(catId);
        const pct = (data.total / monthTotal) * 100;
        html += '<div class="cat-row" onclick="setExpenseFilter(\'' + catId + '\')" style="cursor: pointer;">' +
          '<div class="cat-icon-circle ' + cat.cls + '">' + cat.icon + '</div>' +
          '<div class="cat-info">' +
            '<div style="display: flex; justify-content: space-between; align-items: baseline;"><span class="cat-name">' + cat.label + '</span><span class="cat-amount">' + fmtMoney(data.total) + '</span></div>' +
            '<div class="cat-count">' + data.count + ' · ' + Math.round(pct) + '%</div>' +
            '<div class="cat-bar-track ' + cat.cls + '"><div class="cat-bar-fill" style="width: ' + pct + '%;"></div></div>' +
          '</div>' +
        '</div>';
      });
      html += '</div>';
    }
  }

  // Expense list
  let filtered = monthExp;
  if (expenseFilter !== 'all') filtered = filtered.filter(e => (e.category || 'other') === expenseFilter);
  if (expenseSearch) {
    const q = expenseSearch.toLowerCase();
    filtered = filtered.filter(e => (e.note || '').toLowerCase().includes(q) || (e.merchant || '').toLowerCase().includes(q));
  }

  if (allExpenses.length === 0) {
    html += '<div class="empty" style="padding: 40px 20px;">💼 Tady jsou tvé osobní výdaje.<br><br>Klepni dole na <strong>+</strong> a začni přidávat — appka ti pak ukáže <strong>kolik utrácíš a za co</strong>.</div>';
  } else if (filtered.length === 0) {
    html += '<div class="empty" style="padding: 24px 20px;">Žádné výdaje pro filtry</div>';
  } else {
    html += '<div class="section-title">Seznam výdajů (' + filtered.length + ')</div><div class="list">';
    filtered.forEach(e => html += myExpenseCard(e));
    html += '</div>';
  }

  return html;
}

function myExpenseCard(e) {
  const cat = getExpCat(e.category || 'other');
  const dateStr = fmtDate(e.at, false);
  return '<div class="card">' +
    '<div class="cat-icon-circle ' + cat.cls + '" style="width:40px;height:40px;font-size:20px;">' + cat.icon + '</div>' +
    '<div class="card-body">' +
      '<div class="card-title">' + escapeHtml(e.note || cat.label) + '</div>' +
      '<div class="card-meta">' +
        '<span>' + cat.label + '</span>' +
        '<span>· ' + dateStr + '</span>' +
        (e.merchant ? '<span>· ' + escapeHtml(e.merchant) + '</span>' : '') +
      '</div>' +
    '</div>' +
    '<div class="amount" style="font-size: 16px;">' + fmtMoney(e.amount) + '</div>' +
    '<button class="del-btn" onclick="deleteMyExpense(\'' + e.id + '\', \'' + escAttr((e.note || cat.label) + ' — ' + fmtMoney(e.amount)) + '\')">🗑️</button>' +
  '</div>';
}

function changeExpenseMonth(delta) {
  if (delta === 999) expenseMonthOffset = 0;
  else expenseMonthOffset = Math.min(0, expenseMonthOffset + delta);
  expenseFilter = 'all';
  expenseSearch = '';
  renderScreen();
}
window.changeExpenseMonth = changeExpenseMonth;

function setExpenseFilter(f) { expenseFilter = f; renderScreen(); }
window.setExpenseFilter = setExpenseFilter;

function setExpenseSearch(v) {
  expenseSearch = v;
  renderScreen();
  setTimeout(() => { const inp = document.querySelectorAll('.search-input'); if (inp.length) { const last = inp[inp.length-1]; last.focus(); last.setSelectionRange(v.length, v.length); } }, 0);
}
window.setExpenseSearch = setExpenseSearch;

function showAddMyExpense() {

function renderBills() {
  const bills = getList('expenses').sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
  const active = bills.filter(b => !b.paid);
  const paid = bills.filter(b => b.paid).sort((a,b) => (b.paidAt || 0) - (a.paidAt || 0));
  const total = active.reduce((s, b) => s + (b.amount || 0), 0);

  let html = header('Společné výdaje', 'Nájem, energie, služby...') + '<div class="app">';
  html += '<div class="balance-card" style="background: linear-gradient(135deg, rgba(100, 181, 246, 0.2), rgba(25, 118, 210, 0.1));"><div class="balance-label">K zaplacení tento měsíc</div><div class="balance-amount">' + fmtMoney(total) + '</div><div class="balance-sub" style="color: #90caf9;">Napůl = ' + fmtMoney(total / 2) + ' / osoba</div></div>';

  if (active.length > 0) {
    html += '<div class="section-title">K zaplacení (' + active.length + ')</div><div class="list">';
    active.forEach(b => html += billCard(b));
    html += '</div>';
  } else {
    html += '<div class="empty" style="padding: 32px 20px;">✨ Vše zaplaceno — čistý stůl!</div>';
  }
  if (paid.length > 0) {
    html += '<details style="margin-top: 12px;"><summary class="section-title"><span><span class="chev">▶</span>Historie (' + paid.length + ')</span></summary><div class="list" style="margin-top: 8px;">';
    paid.slice(0, 30).forEach(b => html += billCard(b));
    html += '</div></details>';
  }
  html += '</div><button class="fab" onclick="showAddBill()">+</button>';
  return html;
}

function billCard(b) {
  const today = new Date().getDate();
  const overdue = b.dueDay && today > b.dueDay && !b.paid;
  return '<div class="card ' + (b.paid ? 'done' : '') + '" style="' + (overdue ? 'border-color: rgba(239,83,80,0.3); background: rgba(239,83,80,0.06);' : '') + '"><button class="checkbox ' + (b.paid ? 'checked' : '') + '" onclick="toggleBill(\'' + b.id + '\')"></button><div class="card-body"><div class="card-title ' + (b.paid ? 'done' : '') + '">' + escapeHtml(b.name) + '</div><div class="card-meta"><span>Platí ' + escapeHtml(b.paidBy || '?') + '</span>' + (b.dueDay ? '<span style="' + (overdue ? 'color: #ef5350;' : '') + '">· do ' + b.dueDay + '. v měsíci' + (overdue ? ' (zpoždění!)' : '') + '</span>' : '') + (b.paid && b.paidAt ? '<span>· zaplaceno ' + fmtDate(b.paidAt) + '</span>' : '') + '</div></div><div class="amount">' + fmtMoney(b.amount) + '</div><button class="del-btn" onclick="deleteBill(\'' + b.id + '\', \'' + escAttr(b.name) + '\')">🗑️</button></div>';
}

const SHOP_CATEGORIES = [
  { id: 'fruit', label: 'Ovoce a zelenina', icon: '🥕' },
  { id: 'meat', label: 'Maso a ryby', icon: '🥩' },
  { id: 'dairy', label: 'Mléčné výrobky', icon: '🧀' },

  { id: 'drugstore', label: 'Drogerie', icon: '🧴' },
  { id: 'pets', label: 'Pro pejsky', icon: '🐾' },

];

function renderShopping() {
  const items = getList('shopping').sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
  const active = items.filter(i => !i.done);
  const done = items.filter(i => i.done);

  let html = header('Nákupy') + '<div class="app"><div style="padding: 16px 20px; display: flex; gap: 8px;"><input type="text" id="shop-input" placeholder="Přidat položku..." onkeydown="if(event.key===\'Enter\') addShoppingItem()"><button class="btn-small" style="background: linear-gradient(135deg, #81c784, #4caf50); color: white; padding: 12px 18px; font-size: 20px;" onclick="addShoppingItem()">+</button></div>';

  if (active.length > 0) {
    const byCat = {};
    active.forEach(i => { const c = i.category || 'other'; if (!byCat[c]) byCat[c] = []; byCat[c].push(i); });
    SHOP_CATEGORIES.forEach(cat => {
      const list = byCat[cat.id];
      if (!list || list.length === 0) return;
      html += '<div class="shop-category-header"><span class="shop-category-icon">' + cat.icon + '</span><span>' + cat.label + ' (' + list.length + ')</span></div>';
      html += '<div class="list" style="margin-top: 0;">';
      list.forEach(i => {
        html += '<div class="card"><button class="checkbox" onclick="toggleShopping(\'' + i.id + '\')"></button><div class="card-body"><div class="card-title">' + escapeHtml(i.name) + '</div>' + (i.addedBy ? '<div class="card-meta"><span style="font-size: 11px; color: rgba(255,255,255,0.35);">přidal ' + escapeHtml(i.addedBy) + '</span></div>' : '') + '</div><button class="del-btn" onclick="deleteShopping(\'' + i.id + '\')">🗑️</button></div>';
      });
      html += '</div>';
    });
  }

  if (done.length > 0) {
    html += '<details style="margin-top: 16px;"><summary class="section-title"><span><span class="chev">▶</span>Nakoupeno (' + done.length + ')</span><button class="link-btn" onclick="clearDoneShopping(event)">vymazat vše</button></summary><div class="list" style="margin-top: 8px;">';
    done.forEach(i => {
      html += '<div class="card done"><button class="checkbox checked" onclick="toggleShopping(\'' + i.id + '\')"></button><div class="card-body"><div class="card-title done">' + escapeHtml(i.name) + '</div>' + (i.doneBy ? '<div class="card-meta"><span class="badge badge-green">✓ Koupil ' + escapeHtml(i.doneBy) + '</span></div>' : '') + '</div></div>';
    });
    html += '</div></details>';
  }

  if (items.length === 0) html += '<div class="empty">Prázdný seznam</div>';
  html += '</div>';
  return html;
}

  { id: 'vaccine', label: 'Očkování', icon: '💉' },
  { id: 'deworm', label: 'Odčervení', icon: '💊' },
  { id: 'vet', label: 'Veterinární kontrola', icon: '🩺' },
  { id: 'flea', label: 'Proti klíšťatům', icon: '🛡️' },

  { id: 'weight', label: 'Vážení', icon: '⚖️' },
  { id: 'medication', label: 'Léky', icon: '💊' },

function renderPets() {
  const pets = getList('pets').sort((a,b) => (a.createdAt || 0) - (b.createdAt || 0));
  let html = header('Pejsci', pets.length > 0 ? pets.map(p => p.name).join(' · ') : 'Přidej svého pejska') + '<div class="app">';
  if (pets.length === 0) html += '<div class="empty">Zatím žádný pejsek 🐾<br><br>Klepni na + dole pro přidání.</div>';
  else pets.forEach(p => html += petCard(p));
  html += '</div><button class="fab" onclick="showAddPet()">+</button>';
  return html;
}

function petCard(p) {
  const records = p.records || [];
  const now = Date.now();
  const upcoming = records.filter(r => r.nextDate).map(r => ({ ...r, daysUntil: Math.ceil((new Date(r.nextDate).getTime() - now) / (1000*60*60*24)) })).sort((a,b) => a.daysUntil - b.daysUntil);

  let nextInfo = '';
  if (upcoming.length > 0) {
    const next = upcoming[0];
    const urgCls = next.daysUntil < 0 ? 'urgent' : next.daysUntil <= 14 ? '' : 'ok';
    const daysText = next.daysUntil < 0 ? 'Před ' + Math.abs(next.daysUntil) + ' dny! (zmeškáno)' : next.daysUntil === 0 ? 'Dnes!' : next.daysUntil === 1 ? 'Zítra' : 'Za ' + next.daysUntil + ' dní';
    const respChip = next.responsible ? ' ' + ownerChipHtml(next.responsible) : '';
    nextInfo = '<div class="pet-next ' + urgCls + '"><span>⏰</span><span><strong>' + daysText + ':</strong> ' + escapeHtml(next.type) + ' <span style="color: rgba(255,255,255,0.5);">(' + fmtDate(next.nextDate, false) + ')</span>' + respChip + '</span></div>';
  }

  let recordsHtml = '';
  if (records.length > 0) {
    recordsHtml = '<div class="pet-records-title">Záznamy</div>';
    const sorted = [...records].sort((a,b) => {
      if (a.nextDate && b.nextDate) return new Date(a.nextDate) - new Date(b.nextDate);
      if (a.nextDate) return -1; if (b.nextDate) return 1;
      return new Date(b.lastDate || 0) - new Date(a.lastDate || 0);
    });
    sorted.forEach((r) => {
      const origIdx = records.indexOf(r);
      const rt = PET_RECORD_TYPES.find(x => x.label === r.type) || { icon: '📝' };
      const respChip = r.responsible ? '<div style="margin-top: 4px;">' + ownerChipHtml(r.responsible) + '</div>' : '';
      recordsHtml += '<div class="pet-record"><span class="pet-record-icon">' + rt.icon + '</span><div class="pet-record-body"><div class="pet-record-name">' + escapeHtml(r.type) + (r.notes ? ' <span style="color: rgba(255,255,255,0.5); font-size: 12px; font-style: italic;">— ' + escapeHtml(r.notes) + '</span>' : '') + '</div><div class="pet-record-dates">' + (r.lastDate ? 'Provedeno: ' + fmtDate(r.lastDate, false) : '') + (r.lastDate && r.nextDate ? ' · ' : '') + (r.nextDate ? 'Příště: ' + fmtDate(r.nextDate, false) : '') + '</div>' + respChip + '</div><button class="del-btn" onclick="deletePetRecord(\'' + p.id + '\', ' + origIdx + ')">🗑️</button></div>';
    });
  }

  let vetBlock = '';
  if (p.vetName || p.vetAddress || p.vetPhone) {
    vetBlock = '<div style="background: rgba(0,0,0,0.2); border-radius: 12px; padding: 10px 12px; margin-bottom: 8px; font-size: 13px;"><div style="font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.4); font-weight: 600; margin-bottom: 6px;">Veterinář</div>' + (p.vetName ? '<div style="margin-bottom: 4px;">' + escapeHtml(p.vetName) + '</div>' : '') + '<div class="contact-row">' + (p.vetAddress ? '<a class="contact-btn addr" href="' + mapsUrl(p.vetAddress) + '" target="_blank">📍 ' + escapeHtml(p.vetAddress.length > 25 ? p.vetAddress.substring(0,25) + '…' : p.vetAddress) + '</a>' : '') + (p.vetPhone ? '<a class="contact-btn phone" href="tel:' + escapeHtml(p.vetPhone.replace(/\s/g,'')) + '">📞 ' + escapeHtml(p.vetPhone) + '</a>' : '') + '</div></div>';
  }

  return '<div class="pet-card"><div class="pet-header"><div class="pet-avatar">🐶</div><div style="flex: 1;"><div class="pet-name">' + escapeHtml(p.name) + '</div>' + (p.breed ? '<div class="pet-breed">' + escapeHtml(p.breed) + (p.birthYear ? ' · ' + (new Date().getFullYear() - p.birthYear) + ' let' : '') + '</div>' : '') + '</div><button class="del-btn" onclick="deletePet(\'' + p.id + '\', \'' + escAttr(p.name) + '\')">🗑️</button></div>' + nextInfo + vetBlock + recordsHtml + '<div class="pet-actions"><button class="btn-small" style="background: linear-gradient(135deg, #ffb74d, #f57c00); color: white; flex: 1;" onclick="showAddPetRecord(\'' + p.id + '\')">+ Záznam</button><button class="btn-small" style="background: rgba(255,255,255,0.1); color: white;" onclick="showEditPet(\'' + p.id + '\')">Upravit</button></div></div>';
}

async function addPetRecord(petId) {
  const p = getList('pets').find(x => x.id === petId);
  if (!p) return;
  const type = document.querySelector('#m-type-grid .option.active')?.dataset.v || 'Jiné';
  const lastDate = document.getElementById('m-last').value;
  const nextDate = document.getElementById('m-next').value;
  const notes = document.getElementById('m-notes').value.trim();
  const respChoice = document.querySelector('#m-resp-grid .owner-option.active')?.dataset.v || 'shared';
  const responsible = respChoice === 'me' ? getMyName() : respChoice === 'partner' ? getPartnerName() : 'shared';
  const records = p.records || [];
  records.push({
    type, lastDate, nextDate, notes, responsible,
    vetName: p.vetName || '', vetAddress: p.vetAddress || '', vetPhone: p.vetPhone || '',
    addedBy: getMyName(), addedAt: Date.now()
  });
  await saveItem('pets', { records }, petId);
  await logActivity('přidal záznam pro ' + p.name, type);
  closeModal();
}

async function deletePetRecord(petId, idx) {
  const p = getList('pets').find(x => x.id === petId);
  if (!p) return;
  if (!confirm('Smazat tento záznam?')) return;
  const records = [...(p.records || [])];
  records.splice(idx, 1);
  await saveItem('pets', { records }, petId);
  await logActivity('smazal záznam pro ' + p.name, '');
}
window.deletePetRecord = deletePetRecord;

function renderMeals() {
  const meals = householdData.meals || {};
  const today = new Date();
  const day = today.getDay();
  const diffToMonday = day === 0 ? -6 : 1 - day;
  const monday = new Date(today);
  monday.setDate(today.getDate() + diffToMonday + mealWeekOffset * 7);
  monday.setHours(0, 0, 0, 0);
  const days = [];
  for (let i = 0; i < 7; i++) { const d = new Date(monday); d.setDate(monday.getDate() + i); days.push(d); }
  const dayLabels = ['Po','Út','St','Čt','Pá','So','Ne'];
  const mealTypes = [{ id: 'breakfast', label: 'Snídaně' }, { id: 'lunch', label: 'Oběd' }, { id: 'dinner', label: 'Večeře' }];

  let html = header('Jídelníček') + '<div class="app"><div class="week-nav"><button onclick="changeWeek(-1)">←</button><span style="font-weight: 500;">' + (mealWeekOffset === 0 ? 'Tento týden' : mealWeekOffset === 1 ? 'Příští týden' : mealWeekOffset === -1 ? 'Minulý týden' : (mealWeekOffset > 0 ? '+' : '') + mealWeekOffset + ' týdnů') + '</span><button onclick="changeWeek(1)">→</button></div><div style="padding: 0 20px;">';

  days.forEach((d, i) => {
    const key = d.toISOString().split('T')[0];
    const dayMeals = meals[key] || {};
    const isToday = d.toDateString() === new Date().toDateString();

function renderMaintenance() {
  const items = getList('maintenance').sort((a,b) => {
    if (!a.nextDate && !b.nextDate) return 0;
    if (!a.nextDate) return 1;
    if (!b.nextDate) return -1;

  });
  let html = header('Domácí údržba') + '<div class="app"><div class="list">';
  items.forEach(m => {
    let daysUntil = null, urgent = false, overdue = false;
    if (m.nextDate) {
      daysUntil = Math.ceil((new Date(m.nextDate).getTime() - Date.now()) / (1000*60*60*24));
      overdue = daysUntil < 0;
      urgent = daysUntil >= 0 && daysUntil <= 30;
    }
    const bg = overdue ? 'rgba(239, 83, 80, 0.1)' : urgent ? 'rgba(255, 183, 77, 0.1)' : 'rgba(255,255,255,0.04)';

// ============================================================
// UTILITIES
// ============================================================
function escapeHtml(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function escAttr(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function fmtMoney(n) {
  if (!n && n !== 0) return '0 Kč';
  return Math.round(n).toLocaleString('cs-CZ') + ' Kč';
}
function fmtDate(d, includeTime) {
  const date = typeof d === 'number' ? new Date(d) : new Date(d);
  const opts = { day: 'numeric', month: 'short' };
  if (includeTime) { opts.hour = '2-digit'; opts.minute = '2-digit'; }
  return date.toLocaleString('cs-CZ', opts);
}
function pluralCZ(n) {
  if (n === 1) return 'položka';
  if (n >= 2 && n <= 4) return 'položky';
  return 'položek';
}
function mapsUrl(address) {
  // On iOS, maps:// opens Apple Maps. On Android/desktop, https://maps.google.com works.
  const encoded = encodeURIComponent(address);
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  return isIOS ? 'maps://?q=' + encoded : 'https://www.google.com/maps/search/?api=1&query=' + encoded;
}

    btn.onclick = () => {
      grid.querySelectorAll('.option').forEach(b => {
        b.classList.remove('active', 'active-orange', 'active-pink', 'active-green', 'active-blue', 'active-purple');
      });
      btn.classList.add('active');
      if (activeClass) btn.classList.add(activeClass);
    };
  });
}

// ============================================================
// ONLINE/OFFLINE
// ============================================================
window.addEventListener('online', () => document.getElementById('conn-status').classList.add('hidden'));
window.addEventListener('offline', () => document.getElementById('conn-status').classList.remove('hidden'));
if (!navigator.onLine) document.getElementById('conn-status').classList.remove('hidden');

window.resetConfig = () => {
  if (confirm('Smazat Firebase nastavení a začít znovu?')) {
    localStorage.removeItem('firebase-config');
    location.reload();
  }
};
</script>
</body>
</html>
